<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Phenom Careers Fixture</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f8f6;
      color: #12221c;
    }

    body {
      margin: 0;
    }

    main {
      max-width: 1080px;
      margin: 0 auto;
      padding: 48px;
    }

    .culture-card {
      border: 1px solid #bed5ca;
      background: #ffffff;
      padding: 36px;
    }

    .culture-card h1 {
      max-width: 720px;
      margin: 0;
      font-size: 40px;
      line-height: 1.1;
    }

    .culture-card p {
      max-width: 700px;
      margin: 18px 0 0;
      font-size: 18px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <main>
    <section class="culture-card" data-evidence-id="phenom-culture">
      <h1>Make every talent moment more personal.</h1>
      <p>Employees are shown as builders of intelligent experiences, with emphasis on product pace, customer outcomes, and collaborative problem solving across teams.</p>
    </section>
  </main>
</body>
</html>
