<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Symphony Talent Careers Fixture</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f8fb;
      color: #16202a;
    }

    body {
      margin: 0;
    }

    main {
      max-width: 1080px;
      margin: 0 auto;
      padding: 48px;
    }

    .evp-hero {
      border: 1px solid #cdd8e2;
      background: #ffffff;
      padding: 40px;
    }

    .eyebrow {
      margin: 0 0 12px;
      color: #496f9e;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h1 {
      max-width: 720px;
      margin: 0;
      font-size: 42px;
      line-height: 1.08;
    }

    .evp-hero p {
      max-width: 700px;
      margin: 18px 0 0;
      font-size: 18px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <main>
    <section class="evp-hero" data-evidence-id="symphony-hero">
      <p class="eyebrow">Symphony Talent fixture</p>
      <h1>Build talent experiences with people who care about craft and impact.</h1>
      <p>Teams connect creative storytelling, recruitment marketing technology, and client partnership to help employers reach candidates with more relevant experiences.</p>
    </section>
  </main>
</body>
</html>
