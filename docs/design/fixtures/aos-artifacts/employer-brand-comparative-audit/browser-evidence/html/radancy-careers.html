<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Radancy Careers Fixture</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8f6f4;
      color: #241b16;
    }

    body {
      margin: 0;
    }

    main {
      max-width: 1080px;
      margin: 0 auto;
      padding: 48px;
    }

    .proof-block {
      border: 1px solid #d8ccc2;
      background: #ffffff;
      padding: 36px;
    }

    .proof-block h1 {
      max-width: 720px;
      margin: 0;
      font-size: 40px;
      line-height: 1.1;
    }

    .proof-block p {
      max-width: 700px;
      margin: 18px 0 0;
      font-size: 18px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <main>
    <section class="proof-block" data-evidence-id="radancy-proof">
      <h1>Work on enterprise hiring programs with global reach.</h1>
      <p>The fixture emphasizes scale, established client programs, and specialist recruitment marketing expertise as employer brand proof points.</p>
    </section>
  </main>
</body>
</html>
