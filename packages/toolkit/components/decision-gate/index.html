<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Decision Gate</title>
  <link rel="stylesheet" href="../../controls/defaults.css">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="gate-root"></div>
  <script type="module">
    import { createDecisionGate } from './index.js';
    import { declareManifest, emitReady } from '../../runtime/manifest.js';
    import { wireBridge } from '../../runtime/bridge.js';

    window.__gateResult = undefined;
    wireBridge();
    declareManifest({
      name: 'decision-gate',
      title: 'Decision Gate',
      accepts: [],
      emits: [],
      defaultSize: { w: 520, h: 360 },
    });

    const params = new URLSearchParams(location.search);
    let request = null;
    function decodeBase64Json(value) {
      const bytes = Uint8Array.from(atob(value), (char) => char.charCodeAt(0));
      return JSON.parse(new TextDecoder().decode(bytes));
    }
    try {
      if (params.has('requestB64')) {
        request = decodeBase64Json(params.get('requestB64'));
      } else if (params.has('request')) {
        request = JSON.parse(decodeURIComponent(params.get('request')));
      }
    } catch (e) {
      request = null;
    }

    createDecisionGate(document.getElementById('gate-root'), { request });
    window.setTimeout(() => emitReady(), 100);
  </script>
</body>
</html>
