<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Decision Gate</title>
  <link rel="stylesheet" href="../../controls/defaults.css">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="gate-root"></div>
  <script type="module">
    import { createDecisionGate } from './index.js';
    import { declareManifest, emitReady } from '../../runtime/manifest.js';
    import { wireBridge } from '../../runtime/bridge.js';

    window.__gateResult = undefined;
    wireBridge();
    declareManifest({
      name: 'decision-gate',
      title: 'Decision Gate',
      accepts: [],
      emits: [],
      defaultSize: { w: 520, h: 360 },
    });

    const params = new URLSearchParams(location.search);
    let request = null;
    try {
      if (params.has('requestB64')) {
        request = JSON.parse(atob(params.get('requestB64')));
      } else if (params.has('request')) {
        request = JSON.parse(decodeURIComponent(params.get('request')));
      }
    } catch (e) {
      window.__gateResult = JSON.stringify({ result: null, status: 'dismissed' });
    }

    if (request) {
      createDecisionGate(document.getElementById('gate-root'), { request });
      window.setTimeout(() => emitReady(), 100);
    } else if (window.__gateResult === undefined) {
      window.__gateResult = JSON.stringify({ result: null, status: 'dismissed' });
    }
  </script>
</body>
</html>
