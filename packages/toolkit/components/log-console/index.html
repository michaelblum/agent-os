<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../_base/theme.css">
  <style>
    html, body { margin: 0; background: transparent; font-family: -apple-system, var(--font-mono); }

    #entries {
      padding: 4px 0;
    }

    .entry {
      padding: 2px 10px;
      line-height: 1.5;
      border-bottom: 1px solid rgba(50, 50, 70, 0.15);
      display: flex;
      gap: 8px;
    }
    .entry:hover { background: var(--bg-hover); }

    .ts { color: var(--text-header); flex-shrink: 0; font-size: var(--font-size-small); }
    .level { flex-shrink: 0; font-size: var(--font-size-small); font-weight: 600; min-width: 36px; }
    .level.info  { color: var(--accent-green); }
    .level.warn  { color: var(--accent-yellow); }
    .level.error { color: var(--accent-red); }
    .level.debug { color: #88a; }
    .msg { flex: 1; word-break: break-word; }
  </style>
</head>
<body>
<script type="module">
import { mountPanel, Single } from '../../panel/index.js'
import LogConsole from './index.js'
mountPanel({ title: 'Log', layout: Single(LogConsole) })
</script>
</body>
</html>
