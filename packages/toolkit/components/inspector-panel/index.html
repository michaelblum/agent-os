<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../_base/theme.css">
  <style>
    html, body { margin: 0; background: transparent; font-family: -apple-system, var(--font-mono); }
    .aos-content { padding: 10px 12px; }

    .row { display: flex; margin-bottom: 4px; line-height: 1.4; }
    .label {
      color: var(--text-label);
      min-width: 52px;
      flex-shrink: 0;
      font-size: var(--font-size-small);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .value {
      color: var(--text-primary);
      word-break: break-word;
      flex: 1;
    }
    .role-badge {
      display: inline-block;
      background: var(--accent-purple);
      color: var(--accent-blue);
      padding: 1px 6px;
      border-radius: 3px;
      font-weight: 600;
      font-size: var(--font-size-base);
    }
    .path {
      color: var(--text-secondary);
      font-size: var(--font-size-small);
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid var(--border-subtle);
    }
    .path span { color: #bbb; }
    .path .sep { color: var(--text-muted); margin: 0 3px; }
    .bounds {
      color: var(--accent-green);
      font-size: var(--font-size-small);
      font-family: var(--font-mono);
    }
    .empty {
      color: var(--text-muted);
      text-align: center;
      padding: 20px;
      font-style: italic;
    }
  </style>
</head>
<body>
<script type="module">
import { mountPanel, Single } from '../../panel/index.js'
import InspectorPanel from './index.js'
mountPanel({ title: 'AX Inspector', layout: Single(InspectorPanel) })
</script>
</body>
</html>
