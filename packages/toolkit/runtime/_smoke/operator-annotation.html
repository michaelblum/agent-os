<!doctype html>
<meta charset="utf-8">
<title>AOS Operator Annotation Fixture</title>
<body>
  <main>
    <button id="commit" type="button">Commit</button>
    <button id="cancel" type="button">Cancel</button>
    <textarea id="comment" aria-label="Annotation comment"></textarea>
    <output id="status">idle</output>
  </main>
  <script type="module">
    import {
      operatorAnnotationMenuFromLocation,
      operatorAnnotationStatusMenuItems,
      routeOperatorAnnotationMenuAction,
    } from '../operator-annotation-menu.js'
    import { createOperatorAnnotationSurface } from '../operator-annotation-surface.js'

    const menu = operatorAnnotationMenuFromLocation(window.location)
    const status = document.querySelector('#status')
    const surface = createOperatorAnnotationSurface({
      createPendingAnnotation: window.__aosCreatePendingAnnotation || (async () => ({
        annotation: {
          id: 'fixture-pending-annotation',
          path: '/tmp/aos-operator-annotation-fixture.json',
        },
      })),
    })
    window.__aosOperatorAnnotationFixture = surface
    window.__aosOperatorAnnotationMenu = menu

    const host = {
      post(type, payload) {
        if (type === 'set_menu_items') return
        if (type === 'canvas.send') {
          surface.handleMessage(payload.message)
          status.value = 'selection_annotation'
        }
      },
    }

    document.querySelector('#comment').addEventListener('input', (event) => {
      surface.updateComment(event.target.value)
    })
    document.querySelector('#commit').addEventListener('click', async () => {
      await surface.commit()
      status.value = surface.snapshot().status
    })
    document.querySelector('#cancel').addEventListener('click', () => {
      surface.cancel()
      status.value = 'cancelled'
    })

    window.headsup = window.headsup || {}
    window.headsup.statusItemReady = true
    window.headsup.receive = function receive(encoded) {
      const message = JSON.parse(atob(encoded))
      routeOperatorAnnotationMenuAction(message, menu, host)
    }
    host.post('set_menu_items', { items: operatorAnnotationStatusMenuItems(menu) })
  </script>
</body>
