<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    html, body { margin: 0; padding: 8px; background: #111; color: #ddd;
                 font-family: ui-monospace, monospace; font-size: 12px; }
    .ok { color: #4ade80; } .err { color: #f87171; }
    pre { white-space: pre-wrap; word-break: break-all; }
  </style>
</head>
<body>
<h3>runtime lifecycle timeout smoke</h3>
<pre id="log"></pre>
<script type="module">
import { wireBridge, esc, declareManifest, emitReady, emitLifecycleComplete }
  from '../index.js'

const log = document.getElementById('log')
const params = new URLSearchParams(window.location.search)
const ackResume = params.get('ack_resume') !== '0'
const ackExit = params.get('ack_exit') !== '0'
const ackEnter = params.get('ack_enter') !== '0'

window.__smokeState = {
  ackExit,
  ackEnter,
  events: [],
}

const lines = []
function say(line, ok = true) {
  lines.push(`<span class="${ok ? 'ok' : 'err'}">${esc(line)}</span>`)
  log.innerHTML = lines.join('\n')
}

function record(type) {
  const ts = Date.now()
  window.__smokeState.events.push({ type, ts })
  window.__smokeState[`${type}At`] = ts
  say(`${type} @ ${ts}`)
  return ts
}

declareManifest({
  name: 'runtime-lifecycle-timeout-smoke',
  accepts: ['lifecycle'],
  emits: ['ready', 'lifecycle.complete'],
})

wireBridge((msg) => {
  record(`received_${msg.type}_${msg.action || 'none'}`)
  if (msg.type !== 'lifecycle') return
  if (msg.action === 'resume' && ackResume) {
    emitLifecycleComplete('resume')
  } else if (msg.action === 'exit' && ackExit) {
    emitLifecycleComplete('exit')
  } else if (msg.action === 'enter' && ackEnter) {
    emitLifecycleComplete('enter')
  }
})

document.body.dataset.ready = '1'
emitReady()
record('ready')
</script>
</body>
</html>
