<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    html, body { margin: 0; padding: 8px; background: #111; color: #ddd;
                 font-family: ui-monospace, monospace; font-size: 12px; }
    .ok { color: #4ade80; } .err { color: #f87171; }
    pre { white-space: pre-wrap; word-break: break-all; }
  </style>
</head>
<body>
<h3>runtime lifecycle smoke</h3>
<pre id="log"></pre>
<script type="module">
import {
  wireBridge,
  emit,
  esc,
  declareManifest,
  emitReady,
  emitLifecycleComplete,
} from '../index.js'

const log = document.getElementById('log')
const params = new URLSearchParams(window.location.search)
const resumeDelayMs = Number(params.get('resume_delay_ms') || '350')
const exitDelayMs = Number(params.get('exit_delay_ms') || '250')
const emitResumeComplete = params.get('emit_resume_complete') !== '0'
const emitExitComplete = params.get('emit_exit_complete') !== '0'
let resumeAfterSuspendMs = 50

window.__smokeState = {
  resumeDelayMs,
  exitDelayMs,
  emitResumeComplete,
  emitExitComplete,
  events: [],
}

const lines = []
function say(line, ok = true) {
  lines.push(`<span class="${ok ? 'ok' : 'err'}">${esc(line)}</span>`)
  log.innerHTML = lines.join('\n')
}

function record(type) {
  const ts = Date.now()
  window.__smokeState.events.push({ type, ts })
  window.__smokeState[`${type}At`] = ts
  say(`${type} @ ${ts}`)
  return ts
}

window.startResumeCycle = function startResumeCycle(resumeAfterMs = 50) {
  record('resumeCycleStarted')
  resumeAfterSuspendMs = resumeAfterMs
  emit('canvas.suspend')
  return 'ok'
}

declareManifest({
  name: 'runtime-lifecycle-smoke',
  accepts: ['lifecycle'],
  emits: ['ready', 'lifecycle.complete'],
})

wireBridge((msg) => {
  record(`received_${msg.type}_${msg.action || 'none'}`)
  if (msg.type !== 'lifecycle') return

  if (msg.action === 'suspend') {
    setTimeout(() => {
      record('resumeRequested')
      emit('canvas.resume')
    }, resumeAfterSuspendMs)
  } else if (msg.action === 'resume') {
    setTimeout(() => {
      record('resumeCompleted')
      if (emitResumeComplete) {
        emitLifecycleComplete('resume')
      }
    }, resumeDelayMs)
  } else if (msg.action === 'exit') {
    setTimeout(() => {
      record('exitCompleted')
      if (emitExitComplete) {
        emitLifecycleComplete('exit')
      }
    }, exitDelayMs)
  }
})

document.body.dataset.ready = '1'
emitReady()
record('ready')
</script>
</body>
</html>
