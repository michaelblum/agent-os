<!DOCTYPE html>
<html style="background:transparent">
<head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
* { margin: 0; padding: 0; }
html, body { background: transparent !important; overflow: hidden; width: 100%; height: 100%; }
canvas { background: transparent !important; }
</style>
</head>
<body>
<script>
// ============================================================
// Avatar Skin — Celestial (default)
//
// Data-driven renderer with preset system. Every visual property
// (spin, bob, aura, ghosts, colors) is controlled by presets.
// Behavior slots apply presets. The avatar creation studio (future)
// edits presets, not code.
//
// Ghost trail system ported from celestial omega.js.
// ============================================================

var W = window.innerWidth, H = window.innerHeight;

// --- Scene setup ---
var scene = new THREE.Scene();
// FOV 50 at z=5 gives ~4.7 units of visible height.
// Aura sprites are scaled to fit within this (max ~4x).
var camera = new THREE.PerspectiveCamera(50, W / H, 0.1, 100);
camera.position.set(0, 0, 5);

var renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true, premultipliedAlpha: false });
renderer.setSize(W, H);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setClearColor(0x000000, 0);
document.body.appendChild(renderer.domElement);

// --- Avatar group (everything moves together) ---
var avatarGroup = new THREE.Group();
scene.add(avatarGroup);

// --- Core geometry: icosahedron ---
var coreGeo = new THREE.IcosahedronGeometry(0.6, 1);
var coreMat = new THREE.MeshPhongMaterial({
  color: 0x8844ff,
  emissive: 0x4400aa,
  emissiveIntensity: 0.5,
  transparent: true,
  opacity: 0.85,
  shininess: 100,
  wireframe: false
});
var coreMesh = new THREE.Mesh(coreGeo, coreMat);
avatarGroup.add(coreMesh);

// --- Wireframe overlay (used for ghost cloning) ---
var wireMat = new THREE.MeshBasicMaterial({
  color: 0xbb66ff,
  wireframe: true,
  transparent: true,
  opacity: 0.3
});
var wireMesh = new THREE.Mesh(coreGeo, wireMat);
wireMesh.scale.set(1.02, 1.02, 1.02);
avatarGroup.add(wireMesh);

// --- Inner glow (additive sprite) ---
var glowCanvas = document.createElement('canvas');
glowCanvas.width = 256; glowCanvas.height = 256;
var gCtx = glowCanvas.getContext('2d');
var gradient = gCtx.createRadialGradient(128, 128, 0, 128, 128, 128);
gradient.addColorStop(0, 'rgba(188, 100, 255, 0.8)');
gradient.addColorStop(0.3, 'rgba(140, 60, 255, 0.4)');
gradient.addColorStop(0.6, 'rgba(100, 40, 255, 0.15)');
gradient.addColorStop(1, 'rgba(60, 20, 255, 0)');
gCtx.fillStyle = gradient;
gCtx.fillRect(0, 0, 256, 256);

var glowTexture = new THREE.CanvasTexture(glowCanvas);
var glowSprite = new THREE.Sprite(new THREE.SpriteMaterial({
  map: glowTexture, color: 0xcc88ff, transparent: true,
  blending: THREE.AdditiveBlending, depthWrite: false
}));
glowSprite.scale.set(2.5, 2.5, 1);
avatarGroup.add(glowSprite);

// --- Outer aura (desktop light casting) ---
var auraCanvas = document.createElement('canvas');
auraCanvas.width = 512; auraCanvas.height = 512;
var aCtx = auraCanvas.getContext('2d');
var aGrad = aCtx.createRadialGradient(256, 256, 0, 256, 256, 256);
aGrad.addColorStop(0, 'rgba(180, 100, 255, 0.25)');
aGrad.addColorStop(0.15, 'rgba(140, 70, 255, 0.15)');
aGrad.addColorStop(0.35, 'rgba(100, 50, 255, 0.06)');
aGrad.addColorStop(0.55, 'rgba(80, 30, 255, 0.02)');
aGrad.addColorStop(0.75, 'rgba(0, 0, 0, 0)');  // RGB must be 0 at alpha 0 to prevent bleed
aGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
aCtx.fillStyle = aGrad;
aCtx.fillRect(0, 0, 512, 512);

var auraTexture = new THREE.CanvasTexture(auraCanvas);
var auraSprite = new THREE.Sprite(new THREE.SpriteMaterial({
  map: auraTexture, color: 0xcc88ff, transparent: true,
  blending: THREE.AdditiveBlending, depthWrite: false
}));
auraSprite.scale.set(4, 4, 1);
// Start aura sprite tiny — scales up after 2s delay to avoid the
// squared-off flash that occurs during initial texture compositing.
auraSprite.scale.set(0.01, 0.01, 1);
avatarGroup.add(auraSprite);
setTimeout(function() { state._auraReady = true; }, 2000);

// --- Lights ---
var pointLight = new THREE.PointLight(0xbb77ff, 2, 10);
avatarGroup.add(pointLight);
scene.add(new THREE.AmbientLight(0x222244, 0.3));

// ============================================================
// Stellation geometry — ported from celestial _legacy/js/geometry.js
// Extrudes each face's centroid outward by `factor`.
// ============================================================
function createStellatedGeometry(baseGeometry, factor) {
  var nonIndexed = baseGeometry.toNonIndexed();
  if (Math.abs(factor) < 0.01) { nonIndexed.computeVertexNormals(); return nonIndexed; }
  var posAttr = nonIndexed.getAttribute('position');
  var count = posAttr.count;
  var newVerts = [];
  var vA = new THREE.Vector3(), vB = new THREE.Vector3(), vC = new THREE.Vector3();
  var centroid = new THREE.Vector3(), normal = new THREE.Vector3();
  var cb = new THREE.Vector3(), ab = new THREE.Vector3();
  for (var i = 0; i < count; i += 3) {
    vA.fromBufferAttribute(posAttr, i);
    vB.fromBufferAttribute(posAttr, i + 1);
    vC.fromBufferAttribute(posAttr, i + 2);
    centroid.copy(vA).add(vB).add(vC).divideScalar(3);
    cb.subVectors(vC, vB); ab.subVectors(vA, vB);
    normal.crossVectors(cb, ab).normalize();
    var peak = new THREE.Vector3().copy(centroid).add(normal.clone().multiplyScalar(factor));
    newVerts.push(vA.x, vA.y, vA.z, vB.x, vB.y, vB.z, peak.x, peak.y, peak.z);
    newVerts.push(vB.x, vB.y, vB.z, vC.x, vC.y, vC.z, peak.x, peak.y, peak.z);
    newVerts.push(vC.x, vC.y, vC.z, vA.x, vA.y, vA.z, peak.x, peak.y, peak.z);
  }
  var geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(newVerts, 3));
  geo.computeVertexNormals();
  return geo;
}

// Cache base geometry for stellation rebuilds
var baseGeo = new THREE.IcosahedronGeometry(0.6, 1);

// ============================================================
// Radial menu geometry factory
// ============================================================
function createMenuGeometry(type) {
  switch (type) {
    case 'torus':       return new THREE.TorusGeometry(0.3, 0.12, 16, 32);
    case 'tetrahedron': return new THREE.TetrahedronGeometry(0.35);
    case 'box':         return new THREE.BoxGeometry(0.4, 0.4, 0.4);
    case 'octahedron':  return new THREE.OctahedronGeometry(0.35);
    case 'dodecahedron': return new THREE.DodecahedronGeometry(0.35);
    case 'icosahedron': return new THREE.IcosahedronGeometry(0.35, 0);
    case 'sphere':      return new THREE.SphereGeometry(0.3, 16, 16);
    case 'torusknot':   return new THREE.TorusKnotGeometry(0.25, 0.08, 64, 8);
    case 'cylinder':    return new THREE.CylinderGeometry(0.25, 0.25, 0.4, 16);
    default:            return new THREE.IcosahedronGeometry(0.35, 0);
  }
}

// ============================================================
// State — ALL visual properties. Presets write directly to this.
// ============================================================
var state = {
  // Spin
  idleSpinSpeed: 0.008,
  // Bob
  bobAmplitude: 0.15,
  bobSpeed: 0.5,
  // Aura
  auraIntensity: 1.0,
  auraReach: 1.0,
  auraPulseRate: 0.003,
  // Scale (for ingress/egress transitions)
  scaleMultiplier: 1.0,
  // Hue
  hueShift: 0,
  hueSpeed: 0.0005,
  // Ghost trail
  ghostsEnabled: false,
  ghostCount: 12,
  ghostMode: 'edgeScatter',
  ghostDuration: 1.5,
  // Stellation
  stellationFactor: 0,
  stellationTarget: 0,
  stellationBase: 0,
  _stellationDirty: false,
  _idleFrozen: false,
  // Transition animation (internal)
  _transition: null,  // { from, to, duration, elapsed, easing, onComplete }
  // Internal ghost state (not preset-driven)
  _ghosts: [],
  _ghostTimer: 0,
  _lastPos: new THREE.Vector3(),
  _lastPosInit: false
};

// ============================================================
// Radial Menu State
// ============================================================
var radialMenu = {
  active: false,
  items: [],           // config items
  meshes: [],          // { group, solid, wire, glow, angle, config, highlightT, spinSpeed }
  beam: null,          // gamma-ray mesh
  beamAngle: 0,
  originAngle: 0,      // drag direction
  arcRadius: 1.5,
  arcSpan: 50 * Math.PI / 180,  // 50 degrees — tight row with marginal spacing
  highlightedIndex: -1,
  highlightThreshold: 12 * Math.PI / 180,  // ±12 degrees
  _flashParticles: [],
  _selectionAnim: null,
  canvasMapping: null   // { offsetX, offsetY, scaleX, scaleY } for screen→scene coords
};

var currentSlot = 'idle';

// ============================================================
// Gamma-Ray Beam — single cylinder, additive blend, not parented to avatarGroup
// ============================================================
function createBeam() {
  // Beam length matches arcRadius so it stops at the shapes
  var beamLen = 1.3;  // slightly shorter than arcRadius (1.5) so it doesn't poke through
  var beamGeo = new THREE.CylinderGeometry(0.02, 0.02, beamLen, 8, 1, true);
  // Shift geometry so one end is at origin (beam emits from center)
  beamGeo.translate(0, beamLen / 2, 0);
  var beamMat = new THREE.MeshBasicMaterial({
    transparent: true, opacity: 0.6, side: THREE.DoubleSide,
    depthWrite: true, depthTest: true
  });
  var beam = new THREE.Mesh(beamGeo, beamMat);
  beam.visible = false;
  beam.renderOrder = 0;
  scene.add(beam);
  return beam;
}

var gammaBeam = createBeam();

// ============================================================
// Radial Menu — open, track, close, select
// ============================================================

// Convert screen pixel coords (relative to canvas) to Three.js scene coords
function screenToScene(sx, sy) {
  var m = radialMenu.canvasMapping;
  if (!m) return { x: 0, y: 0 };
  return {
    x: (sx - m.offsetX) * m.scaleX,
    y: -(sy - m.offsetY) * m.scaleY  // flip Y: screen Y down, scene Y up
  };
}

function openRadialMenu(angle, items, canvasSize, avatarOffset) {
  if (radialMenu.active) closeRadialMenu();

  // Compute canvas mapping: how screen pixels map to scene units
  // The avatar is centered in the original canvas. When the canvas expands,
  // we need to know where the avatar center is in the new canvas.
  var visibleHeight = 2 * Math.tan((50 * Math.PI / 180) / 2) * 5; // FOV 50, z=5
  var visibleWidth = visibleHeight * (canvasSize[0] / canvasSize[1]);
  radialMenu.canvasMapping = {
    offsetX: avatarOffset[0],
    offsetY: avatarOffset[1],
    scaleX: visibleWidth / canvasSize[0],
    scaleY: visibleHeight / canvasSize[1]
  };

  radialMenu.active = true;
  radialMenu.items = items;
  radialMenu.originAngle = angle;
  radialMenu.highlightedIndex = -1;

  // Spawn menu item meshes in arc
  var n = items.length;
  var startAngle = angle - radialMenu.arcSpan / 2;
  var step = n > 1 ? radialMenu.arcSpan / (n - 1) : 0;

  for (var i = 0; i < n; i++) {
    var item = items[i];
    var itemAngle = n > 1 ? startAngle + step * i : angle;
    var ix = Math.cos(itemAngle) * radialMenu.arcRadius;
    var iy = Math.sin(itemAngle) * radialMenu.arcRadius;

    var color = new THREE.Color(item.color || '#ffffff');

    // Solid mesh
    var geo = createMenuGeometry(item.geometry || 'icosahedron');
    var mat = new THREE.MeshPhongMaterial({
      color: color, emissive: color.clone().multiplyScalar(0.3),
      emissiveIntensity: 0.5, transparent: true, opacity: 0.85, shininess: 80
    });
    var solid = new THREE.Mesh(geo, mat);

    // Wireframe overlay
    var wireMat2 = new THREE.MeshBasicMaterial({
      color: color.clone().multiplyScalar(1.5), wireframe: true,
      transparent: true, opacity: 0.3
    });
    var wire = new THREE.Mesh(geo, wireMat2);
    wire.scale.set(1.03, 1.03, 1.03);

    // Small glow sprite
    var glowMat2 = new THREE.SpriteMaterial({
      map: glowTexture, color: color, transparent: true,
      blending: THREE.AdditiveBlending, depthWrite: false
    });
    var glow = new THREE.Sprite(glowMat2);
    glow.scale.set(1.2, 1.2, 1);

    var group = new THREE.Group();
    group.add(solid);
    group.add(wire);
    group.add(glow);
    group.position.set(ix, iy, 0);
    group.scale.set(0.01, 0.01, 0.01);  // spawn at zero, animate in
    group.renderOrder = 1;  // render after beam so shapes occlude it
    scene.add(group);

    radialMenu.meshes.push({
      group: group, solid: solid, wire: wire, glow: glow,
      angle: itemAngle, config: item,
      highlightT: 0, spinSpeed: 0,
      baseScale: 0.5,  // 0.5x of avatar size — fits tight row
      targetScale: 0.5,
      _spawnT: 0, _spawnDelay: i * 0.05, _spawned: false
    });
  }

  // Show gamma-ray beam, pointed at the center of the arc
  gammaBeam.visible = true;
  gammaBeam.material.color.copy(new THREE.Color().setHSL(state.hueShift, 0.8, 0.6));
  radialMenu.beamAngle = angle;
  gammaBeam.rotation.z = angle - Math.PI / 2;

  // Revert stellation
  state.stellationTarget = state.stellationBase;
}

function closeRadialMenu() {
  if (!radialMenu.active) return;
  radialMenu.active = false;
  radialMenu.highlightedIndex = -1;

  // Remove all menu meshes
  for (var i = 0; i < radialMenu.meshes.length; i++) {
    var m = radialMenu.meshes[i];
    scene.remove(m.group);
    m.solid.geometry.dispose(); m.solid.material.dispose();
    m.wire.material.dispose();
    m.glow.material.dispose();
  }
  radialMenu.meshes = [];

  // Hide beam
  gammaBeam.visible = false;

  // Clear flash particles
  for (var i = 0; i < radialMenu._flashParticles.length; i++) {
    scene.remove(radialMenu._flashParticles[i].mesh);
    radialMenu._flashParticles[i].mesh.material.dispose();
  }
  radialMenu._flashParticles = [];
  radialMenu._selectionAnim = null;
  radialMenu.canvasMapping = null;
}

function trackRadialMenu(screenX, screenY) {
  if (!radialMenu.active) return;
  var sc = screenToScene(screenX, screenY);
  var angle = Math.atan2(sc.y, sc.x);
  radialMenu.beamAngle = angle;

  // Update beam rotation (cylinder extends along Y, need to rotate to point at angle)
  gammaBeam.rotation.z = angle - Math.PI / 2;

  // Beam color follows hue
  gammaBeam.material.color.setHSL(state.hueShift, 0.8, 0.6);

  // Distance from center for minimum distance check
  var dist = Math.sqrt(sc.x * sc.x + sc.y * sc.y);
  var minDist = radialMenu.arcRadius * 0.3;

  // Find highlighted item
  var bestIdx = -1;
  var bestDelta = Infinity;
  for (var i = 0; i < radialMenu.meshes.length; i++) {
    var m = radialMenu.meshes[i];
    var delta = angleDelta(angle, m.angle);
    if (Math.abs(delta) < radialMenu.highlightThreshold && Math.abs(delta) < bestDelta && dist > minDist) {
      bestDelta = Math.abs(delta);
      bestIdx = i;
    }
  }
  radialMenu.highlightedIndex = bestIdx;
}

// Shortest signed angle between two angles
function angleDelta(a, b) {
  var d = a - b;
  while (d > Math.PI) d -= 2 * Math.PI;
  while (d < -Math.PI) d += 2 * Math.PI;
  return d;
}

function queryRadialHighlight() {
  return radialMenu.highlightedIndex;
}

function selectRadialItem(index, generation) {
  if (index < 0 || index >= radialMenu.meshes.length) {
    closeRadialMenu();
    return null;
  }
  var selected = radialMenu.meshes[index];
  var config = selected.config;

  // Start selection animation — completion emits selection_complete event
  radialMenu._selectionAnim = {
    index: index,
    elapsed: 0,
    duration: 0.4,
    flashFired: false,
    generation: generation || 0,
    config: config
  };

  return config;
}

// Fire mini supernova at position
function fireMenuFlash(x, y, color) {
  for (var i = 0; i < 20; i++) {
    var angle = Math.random() * Math.PI * 2;
    var speed = 0.3 + Math.random() * 1.5;
    var s = new THREE.Sprite(new THREE.SpriteMaterial({
      map: glowTexture, color: new THREE.Color(color),
      blending: THREE.AdditiveBlending, depthWrite: false
    }));
    s.position.set(x, y, 0);
    s.scale.set(0.3, 0.3, 1);
    scene.add(s);
    radialMenu._flashParticles.push({
      mesh: s,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 0.6,
      maxLife: 0.6
    });
  }
  // Bright center flash
  var flash = new THREE.Sprite(new THREE.SpriteMaterial({
    map: glowTexture, color: 0xffffff,
    blending: THREE.AdditiveBlending, depthWrite: false
  }));
  flash.position.set(x, y, 0);
  flash.scale.set(2.0, 2.0, 1);
  scene.add(flash);
  radialMenu._flashParticles.push({
    mesh: flash, vx: 0, vy: 0, life: 0.3, maxLife: 0.3
  });
}

// Update radial menu animations per frame
function updateRadialMenu(dt) {
  if (!radialMenu.active && radialMenu._flashParticles.length === 0) return;

  // Beam turbulence
  if (gammaBeam.visible) {
    var t = clock.elapsedTime;
    var turb = (Math.sin(t * 3.0) + Math.sin(t * 5.2 + 1.3)) * 0.5;
    gammaBeam.material.opacity = 0.6 + turb * 0.2;
    gammaBeam.scale.x = 0.8 + turb * 0.2;
  }

  // Spawn animation (staggered scale-in)
  for (var i = 0; i < radialMenu.meshes.length; i++) {
    var m = radialMenu.meshes[i];
    if (!m._spawned) {
      m._spawnT += dt;
      if (m._spawnT >= m._spawnDelay) {
        var spawnProgress = Math.min((m._spawnT - m._spawnDelay) / 0.3, 1.0);
        var eased = easeOutBack(spawnProgress);
        var s = m.baseScale * eased;
        m.group.scale.set(s, s, s);
        if (spawnProgress >= 1.0) m._spawned = true;
      }
    }
  }

  // Highlight interpolation
  for (var i = 0; i < radialMenu.meshes.length; i++) {
    var m = radialMenu.meshes[i];
    var isHighlighted = (i === radialMenu.highlightedIndex);
    var targetHL = isHighlighted ? 1.0 : 0.0;
    m.highlightT += (targetHL - m.highlightT) * Math.min(dt * 8.0, 1.0);

    // Scale: base → base + 0.15
    if (m._spawned && !radialMenu._selectionAnim) {
      var s = m.baseScale + m.highlightT * 0.15;
      m.group.scale.set(s, s, s);
    }

    // Spin: 0 → 0.08
    m.spinSpeed = m.highlightT * 0.08;
    m.solid.rotation.y += m.spinSpeed;
    m.solid.rotation.x += m.spinSpeed * 0.3;
    m.wire.rotation.copy(m.solid.rotation);

    // Emissive boost when highlighted
    if (m.solid.material.emissiveIntensity !== undefined) {
      m.solid.material.emissiveIntensity = 0.3 + m.highlightT * 0.7;
    }
  }

  // Selection animation
  if (radialMenu._selectionAnim) {
    var anim = radialMenu._selectionAnim;
    anim.elapsed += dt;
    var progress = Math.min(anim.elapsed / anim.duration, 1.0);
    var eased = easeInBack(progress);

    for (var i = 0; i < radialMenu.meshes.length; i++) {
      var m = radialMenu.meshes[i];
      if (i === anim.index) {
        // Selected: accelerating spin + collapse
        m.solid.rotation.y += 0.05 + progress * 0.3;
        m.wire.rotation.copy(m.solid.rotation);
        var s = m.baseScale * (1.0 - eased);
        m.group.scale.set(Math.max(s, 0.01), Math.max(s, 0.01), Math.max(s, 0.01));
      } else {
        // Others: shrink in place
        var shrink = m.baseScale * (1.0 - eased * 1.2);
        shrink = Math.max(shrink, 0.01);
        m.group.scale.set(shrink, shrink, shrink);
      }
    }

    // Fire flash at midpoint
    if (progress > 0.3 && !anim.flashFired) {
      anim.flashFired = true;
      var sm = radialMenu.meshes[anim.index];
      fireMenuFlash(sm.group.position.x, sm.group.position.y, sm.config.color || '#ffffff');
    }

    // Fade beam
    gammaBeam.material.opacity = 0.7 * (1.0 - progress);

    if (progress >= 1.0) {
      // Emit selection_complete with item config + generation for native side
      var gen = anim.generation || 0;
      var cfg = anim.config || {};
      emit('selection_complete', {
        generation: gen,
        item: {
          name: cfg.name,
          geometry: cfg.geometry,
          color: cfg.color,
          index: anim.index
        }
      });
      // Keep flash particles alive, close menu structure
      var particles = radialMenu._flashParticles;
      radialMenu._flashParticles = [];  // temporarily detach
      closeRadialMenu();
      radialMenu._flashParticles = particles;  // reattach

      // Unfreeze idle
      state._idleFrozen = false;
    }
  }

  // Update flash particles
  for (var i = radialMenu._flashParticles.length - 1; i >= 0; i--) {
    var p = radialMenu._flashParticles[i];
    p.life -= dt;
    if (p.life <= 0) {
      scene.remove(p.mesh);
      p.mesh.material.dispose();
      radialMenu._flashParticles.splice(i, 1);
      continue;
    }
    var t = p.life / p.maxLife;
    p.mesh.material.opacity = t;
    p.mesh.position.x += p.vx * dt;
    p.mesh.position.y += p.vy * dt;
    p.vx *= 0.95; p.vy *= 0.95;
    var sc = 0.3 * t;
    p.mesh.scale.set(sc, sc, 1);
  }
}

// ============================================================
// Presets — one per behavior slot. Data, not code.
// The avatar creation studio will edit these.
// ============================================================
var presets = {
  idle:              { idleSpinSpeed: 0.008, bobAmplitude: 0.15, bobSpeed: 0.5,
                       auraIntensity: 1.0, auraPulseRate: 0.003, auraReach: 1.0,
                       hueSpeed: 0.0005, ghostsEnabled: false },

  fast_travel:       { idleSpinSpeed: 0.08, bobAmplitude: 0.05, bobSpeed: 2.0,
                       auraIntensity: 1.5, auraPulseRate: 0.01, auraReach: 1.2,
                       hueSpeed: 0.003,
                       ghostsEnabled: true, ghostCount: 12, ghostMode: 'edgeScatter',
                       ghostDuration: 1.5 },

  standby:           { idleSpinSpeed: 0.005, bobAmplitude: 0.1, bobSpeed: 0.4,
                       auraIntensity: 0.8, auraPulseRate: 0.002, auraReach: 0.9,
                       hueSpeed: 0.0003, ghostsEnabled: false },

  thinking:          { idleSpinSpeed: 0.003, bobAmplitude: 0.08, bobSpeed: 0.3,
                       auraIntensity: 0.7, auraPulseRate: 0.015, auraReach: 0.8,
                       hueSpeed: 0.001, ghostsEnabled: false },

  talking:           { idleSpinSpeed: 0.02, bobAmplitude: 0.2, bobSpeed: 1.0,
                       auraIntensity: 1.5, auraPulseRate: 0.008, auraReach: 1.1,
                       hueSpeed: 0.001, ghostsEnabled: false },

  error:             { idleSpinSpeed: 0.04, bobAmplitude: 0.3, bobSpeed: 2.0,
                       auraIntensity: 1.8, auraPulseRate: 0.02, auraReach: 1.3,
                       hueSpeed: 0, ghostsEnabled: false },

  look_at_me:        { idleSpinSpeed: 0.015, bobAmplitude: 0.25, bobSpeed: 1.5,
                       auraIntensity: 2.0, auraPulseRate: 0.01, auraReach: 1.4,
                       hueSpeed: 0.002, ghostsEnabled: false },

  parking:           { idleSpinSpeed: 0.03, bobAmplitude: 0.05, bobSpeed: 1.0,
                       auraIntensity: 1.2, auraPulseRate: 0.005, auraReach: 1.0,
                       hueSpeed: 0.001,
                       ghostsEnabled: true, ghostCount: 8, ghostMode: 'shrink',
                       ghostDuration: 1.0 },

  unparking:         { idleSpinSpeed: 0.06, bobAmplitude: 0.15, bobSpeed: 1.5,
                       auraIntensity: 1.3, auraPulseRate: 0.008, auraReach: 1.1,
                       hueSpeed: 0.002,
                       ghostsEnabled: true, ghostCount: 6, ghostMode: 'fade',
                       ghostDuration: 0.8 },

  possess_mouse:     { idleSpinSpeed: 0.1, bobAmplitude: 0.02, bobSpeed: 3.0,
                       auraIntensity: 2.0, auraPulseRate: 0.005, auraReach: 0.6,
                       hueSpeed: 0.002,
                       ghostsEnabled: true, ghostCount: 6, ghostMode: 'fade',
                       ghostDuration: 0.5 },

  possess_keyboard:  { idleSpinSpeed: 0.06, bobAmplitude: 0.03, bobSpeed: 2.0,
                       auraIntensity: 1.8, auraPulseRate: 0.01, auraReach: 0.7,
                       hueSpeed: 0.001, ghostsEnabled: false },

  highlighting:      { idleSpinSpeed: 0.02, bobAmplitude: 0.05, bobSpeed: 1.0,
                       auraIntensity: 1.3, auraPulseRate: 0.006, auraReach: 1.0,
                       hueSpeed: 0.001,
                       ghostsEnabled: true, ghostCount: 10, ghostMode: 'fade',
                       ghostDuration: 2.0 },

  release:           { idleSpinSpeed: 0.008, bobAmplitude: 0.15, bobSpeed: 0.5,
                       auraIntensity: 1.0, auraPulseRate: 0.003, auraReach: 1.0,
                       hueSpeed: 0.0005, ghostsEnabled: false },

  // --- Lifecycle transitions ---
  summoned:          { idleSpinSpeed: 0.12, bobAmplitude: 0.0, bobSpeed: 0.0,
                       auraIntensity: 2.5, auraPulseRate: 0.02, auraReach: 1.8,
                       hueSpeed: 0.004, scaleMultiplier: 1.0,
                       ghostsEnabled: true, ghostCount: 8, ghostMode: 'edgeScatter',
                       ghostDuration: 1.0 },

  dismissed:         { idleSpinSpeed: 0.15, bobAmplitude: 0.0, bobSpeed: 0.0,
                       auraIntensity: 2.0, auraPulseRate: 0.015, auraReach: 0.5,
                       hueSpeed: 0.005, scaleMultiplier: 0.0,
                       ghostsEnabled: true, ghostCount: 10, ghostMode: 'shrink',
                       ghostDuration: 0.6 }
};

// ============================================================
// Generic behavior handler — one function, not N handlers
// ============================================================
function applyBehavior(slot, data) {
  var preset = presets[slot] || presets['idle'];
  var keys = Object.keys(preset);

  // Summoned: start at scale 0, animate to 1 with overshoot
  if (slot === 'summoned') {
    state.scaleMultiplier = 0.0;
    for (var i = 0; i < keys.length; i++) {
      if (keys[i] !== 'scaleMultiplier') state[keys[i]] = preset[keys[i]];
    }
    startTransition(0.0, 1.0, 0.6, easeOutBack, function() {
      applyBehavior('idle', {});
    });
    currentSlot = slot;
    return;
  }

  // Dismissed: animate from current scale to 0
  if (slot === 'dismissed') {
    for (var i = 0; i < keys.length; i++) {
      if (keys[i] !== 'scaleMultiplier') state[keys[i]] = preset[keys[i]];
    }
    startTransition(state.scaleMultiplier, 0.0, 0.4, easeInBack);
    currentSlot = slot;
    return;
  }

  // Normal: apply all preset values directly
  for (var i = 0; i < keys.length; i++) {
    state[keys[i]] = preset[keys[i]];
  }
  currentSlot = slot;
}

// ============================================================
// Transition engine — smoothly interpolates scaleMultiplier
// between presets. Used for summoned/dismissed lifecycle.
// ============================================================
function easeOutBack(t) {
  var c1 = 1.70158, c3 = c1 + 1;
  return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
}

function easeInBack(t) {
  var c1 = 1.70158, c3 = c1 + 1;
  return c3 * t * t * t - c1 * t * t;
}

function startTransition(from, to, duration, easing, onComplete) {
  state._transition = {
    prop: 'scaleMultiplier',
    from: from, to: to,
    duration: duration, elapsed: 0,
    easing: easing || function(t) { return t; },
    onComplete: onComplete || null
  };
}

function updateTransition(dt) {
  var t = state._transition;
  if (!t) return;
  t.elapsed += dt;
  var progress = Math.min(t.elapsed / t.duration, 1.0);
  var eased = t.easing(progress);
  state[t.prop] = t.from + (t.to - t.from) * eased;
  if (progress >= 1.0) {
    state[t.prop] = t.to;
    var cb = t.onComplete;
    state._transition = null;
    if (cb) cb();
  }
}

// ============================================================
// Ghost Trail System — ported from celestial omega.js
// Activated by any preset with ghostsEnabled: true.
// Mode, count, duration come from the active preset.
// ============================================================

function spawnGhost() {
  // Clone wireframe geometry for independent vertex manipulation
  var ghostGeo = wireMesh.geometry.clone();
  var origPositions = new Float32Array(ghostGeo.attributes.position.array);

  // Compute centroid for edgeScatter
  var cx = 0, cy = 0, cz = 0;
  var posCount = origPositions.length / 3;
  for (var i = 0; i < origPositions.length; i += 3) {
    cx += origPositions[i]; cy += origPositions[i+1]; cz += origPositions[i+2];
  }
  cx /= posCount; cy /= posCount; cz /= posCount;

  // Ghost material — independent so opacity changes don't affect avatar
  var ghostMat = new THREE.MeshBasicMaterial({
    wireframe: true, transparent: true, opacity: 0.8,
    depthWrite: false, blending: THREE.AdditiveBlending
  });

  // Copy current hue color
  var hueColor = new THREE.Color().setHSL(state.hueShift, 0.8, 0.6);
  ghostMat.color.copy(hueColor);

  var ghostMesh = new THREE.Mesh(ghostGeo, ghostMat);

  // Copy world transform from avatarGroup
  ghostMesh.position.copy(avatarGroup.position);
  ghostMesh.quaternion.copy(coreMesh.quaternion);
  ghostMesh.scale.copy(wireMesh.scale);

  scene.add(ghostMesh);

  state._ghosts.push({
    mesh: ghostMesh,
    life: state.ghostDuration,
    maxLife: state.ghostDuration,
    startScale: 1.02,
    originalPositions: origPositions,
    centroid: new THREE.Vector3(cx, cy, cz),
    randomAxis: new THREE.Vector3(
      Math.random() - 0.5, Math.random() - 0.5, Math.random() - 0.5
    ).normalize()
  });
}

function updateGhosts(dt) {
  if (!state.ghostsEnabled) {
    cleanupGhosts();
    return;
  }

  // Detect movement
  if (!state._lastPosInit) {
    state._lastPos.copy(avatarGroup.position);
    state._lastPosInit = true;
  }
  var delta = avatarGroup.position.distanceTo(state._lastPos);
  state._lastPos.copy(avatarGroup.position);

  // Spawn when moving
  if (delta > 0.01) {
    state._ghostTimer -= dt;
    if (state._ghostTimer <= 0) {
      spawnGhost();
      state._ghostTimer = state.ghostDuration / Math.max(state.ghostCount, 1);
    }
  }

  // Update existing ghosts
  for (var i = state._ghosts.length - 1; i >= 0; i--) {
    var ghost = state._ghosts[i];
    ghost.life -= dt;

    if (ghost.life <= 0) {
      scene.remove(ghost.mesh);
      ghost.mesh.geometry.dispose();
      ghost.mesh.material.dispose();
      state._ghosts.splice(i, 1);
      continue;
    }

    var progress = ghost.life / ghost.maxLife; // 1 = born, 0 = dead

    switch (state.ghostMode) {
      case 'fade':
        ghost.mesh.material.opacity = progress * 0.8;
        break;

      case 'shrink':
        ghost.mesh.scale.setScalar(ghost.startScale * progress);
        break;

      case 'edgeScatter': {
        ghost.mesh.material.opacity = progress * 0.8;
        var positions = ghost.mesh.geometry.attributes.position.array;
        var orig = ghost.originalPositions;
        var t = 1 - progress;
        for (var v = 0; v < positions.length; v += 3) {
          positions[v]     = orig[v]     + (orig[v]     - ghost.centroid.x) * t * 2.0;
          positions[v + 1] = orig[v + 1] + (orig[v + 1] - ghost.centroid.y) * t * 2.0;
          positions[v + 2] = orig[v + 2] + (orig[v + 2] - ghost.centroid.z) * t * 2.0;
        }
        ghost.mesh.geometry.attributes.position.needsUpdate = true;
        break;
      }

      case 'vertexDissolve': {
        ghost.mesh.material.opacity = progress * 0.8;
        var positions = ghost.mesh.geometry.attributes.position.array;
        var orig = ghost.originalPositions;
        var t = 1 - progress;
        for (var v = 0; v < positions.length; v += 3) {
          positions[v]     = orig[v]     + (Math.random() - 0.5) * 0.5 * t;
          positions[v + 1] = orig[v + 1] + (Math.random() - 0.5) * 0.5 * t;
          positions[v + 2] = orig[v + 2] + (Math.random() - 0.5) * 0.5 * t;
        }
        ghost.mesh.geometry.attributes.position.needsUpdate = true;
        break;
      }

      case 'scaleWarp': {
        ghost.mesh.material.opacity = progress * 0.8;
        var t = 1 - progress;
        var stretchFactor = 1 + t * 2;
        var compressFactor = 1 / Math.sqrt(stretchFactor);
        var axis = ghost.randomAxis;
        ghost.mesh.scale.set(
          ghost.startScale * (1 + Math.abs(axis.x) * (stretchFactor - 1) + (1 - Math.abs(axis.x)) * (compressFactor - 1)),
          ghost.startScale * (1 + Math.abs(axis.y) * (stretchFactor - 1) + (1 - Math.abs(axis.y)) * (compressFactor - 1)),
          ghost.startScale * (1 + Math.abs(axis.z) * (stretchFactor - 1) + (1 - Math.abs(axis.z)) * (compressFactor - 1))
        );
        break;
      }

      default:
        ghost.mesh.material.opacity = progress * 0.8;
    }
  }

  // Cap ghost count
  while (state._ghosts.length > state.ghostCount) {
    var oldest = state._ghosts.shift();
    scene.remove(oldest.mesh);
    oldest.mesh.geometry.dispose();
    oldest.mesh.material.dispose();
  }
}

function cleanupGhosts() {
  for (var i = 0; i < state._ghosts.length; i++) {
    scene.remove(state._ghosts[i].mesh);
    state._ghosts[i].mesh.geometry.dispose();
    state._ghosts[i].mesh.material.dispose();
  }
  state._ghosts.length = 0;
  state._ghostTimer = 0;
  state._lastPosInit = false;
}

// ============================================================
// Animation loop
// ============================================================
var clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  // getDelta() must be called first — getElapsedTime() calls getDelta()
  // internally and resets the timer, making a subsequent getDelta() return ~0.
  var dt = clock.getDelta();
  var elapsed = clock.elapsedTime;

  // Stellation interpolation
  if (Math.abs(state.stellationFactor - state.stellationTarget) > 0.001) {
    state.stellationFactor += (state.stellationTarget - state.stellationFactor) * Math.min(dt * 4.0, 1.0);
    state._stellationDirty = true;
  }
  if (state._stellationDirty) {
    var newGeo = createStellatedGeometry(baseGeo, state.stellationFactor);
    coreMesh.geometry.dispose();
    coreMesh.geometry = newGeo;
    wireMesh.geometry.dispose();
    wireMesh.geometry = newGeo;
    state._stellationDirty = false;
  }

  // Spin (frozen when holding mousedown or menu open)
  if (!state._idleFrozen) {
    coreMesh.rotation.y += state.idleSpinSpeed;
    coreMesh.rotation.x += state.idleSpinSpeed * 0.3;
  }
  wireMesh.rotation.copy(coreMesh.rotation);

  // Bob (frozen when idle is frozen)
  var bob = state._idleFrozen ? 0 : Math.sin(elapsed * state.bobSpeed * Math.PI * 2) * state.bobAmplitude;
  avatarGroup.position.y = bob;

  // Aura pulse
  var pulse = 1.0 + Math.sin(elapsed * state.auraPulseRate * Math.PI * 2000) * 0.15 * state.auraIntensity;
  // Inner glow — always active
  glowSprite.scale.set(2.5 * state.auraReach * pulse, 2.5 * state.auraReach * pulse, 1);

  // Outer aura — starts at 0, ramps up after 2s delay to avoid initial flash
  if (state._auraReady) {
    if (!state._auraScale) state._auraScale = 0.01;
    state._auraScale = Math.min(state._auraScale + 0.02, 1.0);  // ramp over ~50 frames
    var auraTarget = 4 * state.auraReach * pulse;
    auraSprite.scale.set(auraTarget * state._auraScale, auraTarget * state._auraScale, 1);
  }

  // Hue rotation
  state.hueShift += state.hueSpeed;
  if (state.hueShift > 1) state.hueShift -= 1;
  var hueColor = new THREE.Color().setHSL(state.hueShift, 0.8, 0.6);
  coreMat.emissive.copy(hueColor).multiplyScalar(0.5);
  coreMat.color.copy(hueColor);
  wireMat.color.copy(hueColor).multiplyScalar(1.5);
  glowSprite.material.color.copy(hueColor);
  auraSprite.material.color.copy(hueColor);
  pointLight.color.copy(hueColor);

  // Transition animation (scale, etc.)
  updateTransition(dt);

  // Apply scale multiplier to entire avatar group
  var s = state.scaleMultiplier;
  avatarGroup.scale.set(s, s, s);

  // Ghost trail
  updateGhosts(dt);

  // Radial menu
  updateRadialMenu(dt);

  renderer.render(scene, camera);
}

animate();

// --- Resize ---
window.addEventListener('resize', function() {
  W = window.innerWidth; H = window.innerHeight;
  camera.aspect = W / H;
  camera.updateProjectionMatrix();
  renderer.setSize(W, H);
});

// ============================================================
// headsup message protocol
// ============================================================
window.headsup = {
  manifest: {
    name: 'celestial',
    version: '1.0',
    slots: Object.keys(presets),
    accepts: ['behavior', 'mood', 'color', 'preset_override', 'load_skin',
              'stellate', 'radial_open', 'radial_track', 'radial_close', 'radial_select', 'radial_query'],
    emits: ['ready', 'behavior_complete', 'menu_select', 'radial_highlight']
  },
  receive: function(b64) {
    try {
      var bytes = Uint8Array.from(atob(b64), function(c) { return c.charCodeAt(0); });
      var msg = JSON.parse(new TextDecoder().decode(bytes));

      if (msg.type === 'behavior') {
        applyBehavior(msg.slot, msg.data || {});
        emit('behavior_complete', { slot: msg.slot });

      } else if (msg.type === 'preset_override') {
        // Override specific properties for a slot
        if (msg.slot && presets[msg.slot]) {
          var keys = Object.keys(msg.data || {});
          for (var i = 0; i < keys.length; i++) {
            presets[msg.slot][keys[i]] = msg.data[keys[i]];
          }
        }

      } else if (msg.type === 'load_skin') {
        // Replace entire preset set
        if (msg.presets) {
          var slots = Object.keys(msg.presets);
          for (var i = 0; i < slots.length; i++) {
            presets[slots[i]] = msg.presets[slots[i]];
          }
        }

      } else if (msg.type === 'mood') {
        // Legacy mood support — map to behavior slots
        var moodMap = { active: 'talking', idle: 'idle', thinking: 'thinking' };
        if (moodMap[msg.payload]) applyBehavior(moodMap[msg.payload], {});

      } else if (msg.type === 'color') {
        state.hueSpeed = 0;
        var c = new THREE.Color(msg.payload);
        coreMat.color.copy(c);
        coreMat.emissive.copy(c).multiplyScalar(0.5);
        glowSprite.material.color.copy(c);
        auraSprite.material.color.copy(c);
        pointLight.color.copy(c);

      } else if (msg.type === 'stellate') {
        if (msg.target !== undefined) state.stellationTarget = msg.target;
        if (msg.freezeIdle !== undefined) state._idleFrozen = msg.freezeIdle;

      } else if (msg.type === 'radial_open') {
        openRadialMenu(msg.angle, msg.items, msg.canvasSize, msg.avatarOffset);

      } else if (msg.type === 'radial_track') {
        trackRadialMenu(msg.x, msg.y);

      } else if (msg.type === 'radial_close') {
        closeRadialMenu();
        state._idleFrozen = false;
        state.stellationTarget = state.stellationBase;

      } else if (msg.type === 'radial_select') {
        selectRadialItem(msg.index, msg.generation);

      } else if (msg.type === 'radial_select_at') {
        // Atomic: resolve highlight from coords + select in one message
        trackRadialMenu(msg.x, msg.y);
        var idx = radialMenu.highlightedIndex;
        if (idx >= 0) {
          selectRadialItem(idx, msg.generation);
        } else {
          // No item highlighted — close and notify
          closeRadialMenu();
          state._idleFrozen = false;
          state.stellationTarget = state.stellationBase;
          emit('menu_closed', { generation: msg.generation || 0 });
        }

      } else if (msg.type === 'radial_query') {
        emit('radial_highlight', { index: radialMenu.highlightedIndex });
      }
    } catch(e) {}
  }
};

function emit(type, payload) {
  if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.headsup) {
    window.webkit.messageHandlers.headsup.postMessage(
      payload !== undefined ? { type: type, payload: payload } : { type: type }
    );
  }
}

// Auto-play summoned transition on load.
// Start invisible — the ingress animation (or a brief delay) will reveal us.
// This prevents the white-flash from WKWebView before Three.js clears to transparent.
state.scaleMultiplier = 0.0;
avatarGroup.scale.set(0, 0, 0);
renderer.domElement.style.opacity = '0';

setTimeout(function() {
  renderer.domElement.style.opacity = '1';
  applyBehavior('summoned', {});
}, 200);

emit('ready', window.headsup.manifest);
</script>
</body>
</html>
