<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: transparent; overflow: hidden; }
.highlight {
  position: absolute;
  inset: 0;
  border: 3px solid rgba(255, 120, 0, 0.95);
  border-radius: 10px;
  box-shadow:
    0 0 12px rgba(255, 120, 0, 0.6),
    0 0 30px rgba(255, 80, 0, 0.25),
    inset 0 0 12px rgba(255, 120, 0, 0.1);
  animation: agent-pulse 1s ease-in-out infinite alternate;
  pointer-events: none;
}
/* Corner markers — clearly artificial, not native */
.corner { position: absolute; width: 14px; height: 14px; pointer-events: none; }
.corner::before, .corner::after {
  content: '';
  position: absolute;
  background: rgba(255, 200, 50, 0.95);
  border-radius: 1px;
}
.tl { top: -2px; left: -2px; }
.tl::before { width: 14px; height: 3px; top: 0; left: 0; }
.tl::after { width: 3px; height: 14px; top: 0; left: 0; }
.tr { top: -2px; right: -2px; }
.tr::before { width: 14px; height: 3px; top: 0; right: 0; }
.tr::after { width: 3px; height: 14px; top: 0; right: 0; }
.bl { bottom: -2px; left: -2px; }
.bl::before { width: 14px; height: 3px; bottom: 0; left: 0; }
.bl::after { width: 3px; height: 14px; bottom: 0; left: 0; }
.br { bottom: -2px; right: -2px; }
.br::before { width: 14px; height: 3px; bottom: 0; right: 0; }
.br::after { width: 3px; height: 14px; bottom: 0; right: 0; }
@keyframes agent-pulse {
  from {
    border-color: rgba(255, 120, 0, 0.95);
    box-shadow: 0 0 12px rgba(255, 120, 0, 0.6), 0 0 30px rgba(255, 80, 0, 0.25);
  }
  to {
    border-color: rgba(255, 180, 0, 0.95);
    box-shadow: 0 0 18px rgba(255, 180, 0, 0.7), 0 0 40px rgba(255, 140, 0, 0.3);
  }
}
</style>
</head>
<body>
<div class="highlight">
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
</div>
</body>
</html>
