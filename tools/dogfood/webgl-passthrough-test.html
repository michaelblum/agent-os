<!DOCTYPE html>
<html>
<head>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: transparent; }
  canvas { display: block; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 0);
document.body.appendChild(renderer.domElement);

// Icosahedron with wireframe — similar to what the avatar will look like
const geo = new THREE.IcosahedronGeometry(0.6, 0);
const mat = new THREE.MeshPhongMaterial({
  color: 0xbc13fe, emissive: 0x4a2b6e, transparent: true, opacity: 0.8
});
const mesh = new THREE.Mesh(geo, mat);

const wireGeo = new THREE.EdgesGeometry(geo);
const wireMat = new THREE.LineBasicMaterial({ color: 0xbc13fe, transparent: true, opacity: 0.9 });
const wire = new THREE.LineSegments(wireGeo, wireMat);

const group = new THREE.Group();
group.add(mesh);
group.add(wire);
scene.add(group);

// Aura sprite
const spriteMat = new THREE.SpriteMaterial({
  color: 0xbc13fe, transparent: true, opacity: 0.3,
  blending: THREE.AdditiveBlending, depthWrite: false
});
const sprite = new THREE.Sprite(spriteMat);
sprite.scale.set(3, 3, 1);
group.add(sprite);

const light = new THREE.PointLight(0xffffff, 1.5, 10);
light.position.set(2, 2, 5);
scene.add(light);
scene.add(new THREE.AmbientLight(0x444444));

// Move the object around the screen to test passthrough during animation
let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.01;
  group.position.x = Math.sin(t) * 2;
  group.position.y = Math.cos(t * 0.7) * 1.5;
  group.rotation.x += 0.01;
  group.rotation.y += 0.015;
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
