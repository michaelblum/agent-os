<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  background: transparent;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  height: 100%;
  width: 100%;
}
body { position: relative; }
/* Shadow: drawn via <canvas> to bypass WKWebView's broken box-shadow
   and filter compositing in transparent windows. */
.card-shadow {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
}
.light-rig {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 3;
  transition: opacity 0.3s ease;
}
.light-rig.dismissed { opacity: 0; }
.light-pole {
  position: absolute;
  left: 50%;
  top: 8px;
  width: 86px;
  height: 4px;
  margin-left: -43px;
  border-radius: 999px;
  background: linear-gradient(180deg, rgba(255,255,255,0.55), rgba(255,255,255,0.18));
}
.light-hook {
  position: absolute;
  width: 18px;
  height: 18px;
  border: 2px solid rgba(255,255,255,0.45);
  border-top: none;
  border-left-color: transparent;
  border-radius: 0 0 12px 12px;
  transform: translate(-50%, -2px);
  opacity: 0.8;
}
.light-cord {
  position: absolute;
  width: 2px;
  transform-origin: 50% 0;
  border-radius: 999px;
  background: linear-gradient(180deg, rgba(255,255,255,0.7), rgba(255,255,255,0.16));
  box-shadow: 0 0 6px rgba(255,255,255,0.08);
}
.lightbulb {
  position: absolute;
  width: 34px;
  height: 44px;
  border: none;
  padding: 0;
  cursor: pointer;
  background: transparent;
  pointer-events: auto;
  transform-origin: 50% 12%;
}
.lightbulb:focus-visible {
  outline: 2px solid rgba(100,210,255,0.8);
  outline-offset: 3px;
}
.lightbulb-glow {
  position: absolute;
  left: 50%;
  top: 12px;
  width: 60px;
  height: 60px;
  margin-left: -30px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,244,214,0.35), rgba(255,244,214,0.12) 35%, rgba(255,244,214,0) 72%);
  opacity: 0.85;
  transition: opacity 0.15s ease;
}
.lightbulb-glass {
  position: absolute;
  left: 50%;
  top: 10px;
  width: 28px;
  height: 28px;
  margin-left: -14px;
  border-radius: 50% 50% 46% 46%;
  background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.92), rgba(255,244,214,0.95) 35%, rgba(255,214,130,0.52) 70%, rgba(255,188,82,0.28));
  border: 1px solid rgba(255,255,255,0.42);
  box-shadow: inset -6px -8px 12px rgba(0,0,0,0.12);
}
.lightbulb-base {
  position: absolute;
  left: 50%;
  top: 32px;
  width: 18px;
  height: 12px;
  margin-left: -9px;
  border-radius: 3px 3px 6px 6px;
  background: linear-gradient(180deg, rgba(182,186,196,0.95), rgba(92,98,112,0.95));
  box-shadow: inset 0 -1px 0 rgba(0,0,0,0.28);
}
.lightbulb-base::before,
.lightbulb-base::after {
  content: '';
  position: absolute;
  left: 3px;
  right: 3px;
  height: 1px;
  background: rgba(30,30,34,0.35);
}
.lightbulb-base::before { top: 3px; }
.lightbulb-base::after { top: 7px; }
.card {
  background: rgba(22, 22, 26, 0.96);
  color: #e8e8ed;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.12);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  overflow: hidden;
  transition: opacity 0.3s ease, transform 0.3s ease;
  display: flex;
  flex-direction: column;
  position: absolute;
  inset: 16px;
  isolation: isolate;
  z-index: 1;
}
.card-lighting {
  position: absolute;
  inset: 0;
  border-radius: inherit;
  pointer-events: none;
  z-index: 0;
  opacity: 0.95;
}
.card > :not(.card-lighting) {
  position: relative;
  z-index: 1;
}
.card.dismissed {
  opacity: 0;
  transform: translateY(8px) scale(0.97);
  pointer-events: none;
}
.card-shadow.dismissed {
  opacity: 0;
}

/* --- Header (drag handle) --- */
.header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 14px 20px 0;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: #86868b;
  font-weight: 600;
  cursor: grab;
  user-select: none;
  -webkit-user-select: none;
  flex-shrink: 0;
}
.header:active { cursor: grabbing; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: #86868b; }
.dot.active { background: #30d158; animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

/* --- Tab bar --- */
.tabs {
  display: flex;
  gap: 2px;
  padding: 10px 20px 0;
  flex-shrink: 0;
}
.tab {
  padding: 6px 16px;
  font-size: 12px;
  font-weight: 500;
  color: #86868b;
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  position: relative;
  transition: color 0.15s, border-color 0.15s;
}
.tab:hover { color: #b0b0b5; }
.tab.active { color: #f5f5f7; border-bottom-color: #64d2ff; }
.tab-badge {
  position: absolute;
  top: 2px;
  right: 2px;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #ff453a;
  color: #fff;
  font-size: 9px;
  font-weight: 700;
  display: none;
  align-items: center;
  justify-content: center;
  line-height: 1;
}

/* --- Tab panels --- */
.panel { display: none; padding: 0 20px 16px; flex: 1; overflow: hidden; }
.panel.active { display: flex; flex-direction: column; }

/* --- Chat panel --- */
.messages {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 14px 0 10px;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.15) transparent;
}
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

.msg {
  padding: 10px 14px;
  border-radius: 12px;
  max-width: 92%;
  word-wrap: break-word;
  overflow-wrap: break-word;
  font-size: 14px;
  line-height: 1.5;
  animation: msgIn 0.2s ease;
}
@keyframes msgIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

.msg.assistant {
  align-self: flex-start;
  background: rgba(100, 210, 255, 0.06);
  border: 1px solid rgba(100, 210, 255, 0.12);
}
.msg.user {
  align-self: flex-end;
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 255, 255, 0.08);
  color: #d0d0d5;
}
.msg.status {
  align-self: center;
  background: transparent;
  border: none;
  color: #86868b;
  font-style: italic;
  font-size: 12px;
  padding: 4px 0;
}

/* --- Markdown rendering --- */
.msg p { margin: 0 0 8px; }
.msg p:last-child { margin-bottom: 0; }
.msg strong { color: #64d2ff; }
.msg em { color: #b0b0b5; }
.msg code {
  background: rgba(255,255,255,0.08);
  padding: 1px 5px;
  border-radius: 4px;
  font-family: 'SF Mono', 'Menlo', monospace;
  font-size: 12px;
}
.msg pre {
  background: rgba(0,0,0,0.3);
  padding: 10px 12px;
  border-radius: 8px;
  overflow-x: auto;
  margin: 8px 0;
}
.msg pre code {
  background: none;
  padding: 0;
  font-size: 12px;
  line-height: 1.5;
}
.msg a { color: #64d2ff; text-decoration: underline; }
.msg ul, .msg ol { padding-left: 20px; margin: 6px 0; }
.msg li { margin: 2px 0; }
.msg blockquote {
  border-left: 3px solid rgba(100,210,255,0.3);
  padding-left: 12px;
  color: #a0a0a5;
  margin: 8px 0;
}

/* --- Numbered options (for AskUserQuestion) --- */
.options { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
.opt-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.04);
  color: #f5f5f7;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.15s ease;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  text-align: left;
  width: 100%;
}
.opt-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(100,210,255,0.4); }
.opt-btn:active { transform: scale(0.98); }
.opt-num {
  width: 22px; height: 22px;
  border-radius: 6px;
  background: rgba(100,210,255,0.15);
  color: #64d2ff;
  font-size: 12px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.opt-label { flex: 1; }
.opt-desc { font-size: 12px; color: #86868b; margin-top: 2px; }

/* --- Todo list (for TodoWrite) --- */
.todo-list { display: flex; flex-direction: column; gap: 4px; margin-top: 8px; }
.todo-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px; border-radius: 6px;
  background: rgba(255,255,255,0.03);
  font-size: 13px;
}
.todo-icon { width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; flex-shrink: 0; }
.todo-item.pending .todo-icon { border: 2px solid rgba(255,255,255,0.25); }
.todo-item.in_progress .todo-icon { border: 2px solid #64d2ff; background: rgba(100,210,255,0.15); color: #64d2ff; animation: pulse 2s infinite; }
.todo-item.completed .todo-icon { border: 2px solid #30d158; background: rgba(48,209,88,0.15); color: #30d158; }
.todo-item.completed .todo-text { color: #86868b; text-decoration: line-through; }

/* --- Thinking (collapsible) --- */
.thinking-block {
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
  margin-top: 6px;
  overflow: hidden;
}
.thinking-header {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 10px;
  cursor: pointer;
  color: #86868b;
  font-size: 12px;
  user-select: none;
  -webkit-user-select: none;
}
.thinking-header:hover { color: #b0b0b5; }
.thinking-arrow { transition: transform 0.15s; font-size: 10px; }
.thinking-block.open .thinking-arrow { transform: rotate(90deg); }
.thinking-body {
  display: none;
  padding: 8px 10px;
  border-top: 1px solid rgba(255,255,255,0.06);
  font-size: 12px;
  line-height: 1.5;
  color: #a0a0a5;
  max-height: 200px;
  overflow-y: auto;
}
.thinking-block.open .thinking-body { display: block; }

/* --- Tool use card (generic) --- */
.tool-card {
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  padding: 10px 12px;
  margin-top: 6px;
  background: rgba(255,255,255,0.02);
}
.tool-card-header {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: #86868b;
  margin-bottom: 6px;
}
.tool-card-icon { color: #64d2ff; }
.tool-card-name { font-weight: 600; color: #b0b0b5; }
.tool-card-input {
  font-family: 'SF Mono', 'Menlo', monospace;
  font-size: 11px;
  color: #a0a0a5;
  background: rgba(0,0,0,0.2);
  padding: 6px 8px;
  border-radius: 4px;
  max-height: 120px;
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-all;
}

/* --- Tool result --- */
.tool-result {
  border-left: 3px solid rgba(48,209,88,0.4);
  padding: 8px 12px;
  margin-top: 6px;
  background: rgba(48,209,88,0.04);
  border-radius: 0 8px 8px 0;
  font-size: 13px;
}
.tool-result.error {
  border-left-color: rgba(255,69,58,0.4);
  background: rgba(255,69,58,0.04);
}
.tool-result-label {
  font-size: 11px;
  color: #86868b;
  margin-bottom: 4px;
}

/* --- Image --- */
.msg-image {
  max-width: 100%;
  border-radius: 8px;
  margin-top: 6px;
}

/* --- Plan (ExitPlanMode) --- */
.plan-block {
  border: 1px solid rgba(100,210,255,0.15);
  border-radius: 8px;
  padding: 10px 12px;
  margin-top: 6px;
  background: rgba(100,210,255,0.03);
}
.plan-label {
  font-size: 11px;
  color: #64d2ff;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}

/* --- Redacted thinking --- */
.redacted-block {
  padding: 8px 10px;
  border-radius: 8px;
  background: rgba(255,255,255,0.03);
  color: #555;
  font-size: 12px;
  font-style: italic;
  margin-top: 6px;
}

/* --- Input bar (always visible) --- */
.input-bar {
  display: flex;
  gap: 8px;
  flex-shrink: 0;
  padding-top: 10px;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.text-input {
  flex: 1;
  padding: 8px 12px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.08);
  color: #f5f5f7;
  font-size: 14px;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  outline: none;
}
.text-input::placeholder { color: rgba(255,255,255,0.3); }
.text-input:focus { border-color: rgba(100,210,255,0.5); background: rgba(255,255,255,0.12); }
.text-input:disabled { opacity: 0.4; cursor: not-allowed; }
.text-input { resize: none; }
.btn-send:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-send {
  padding: 8px 16px;
  border-radius: 8px;
  background: rgba(100,210,255,0.2);
  color: #64d2ff;
  border: 1px solid rgba(100,210,255,0.3);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  transition: all 0.15s ease;
}
.btn-send:hover { background: rgba(100,210,255,0.3); }
.btn-send:active { transform: scale(0.96); }

/* --- Log panel --- */
.log-viewer {
  flex: 1;
  overflow-y: auto;
  font-family: 'SF Mono', 'Menlo', monospace;
  font-size: 11px;
  line-height: 1.6;
  color: #a0a0a5;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.15) transparent;
}
.log-viewer::-webkit-scrollbar { width: 4px; }
.log-viewer::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
.log-entry { padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
.log-entry .ts { color: #555; margin-right: 8px; }
.log-entry.error { color: #ff453a; }
.log-entry.warn { color: #ffd60a; }
.log-entry.success { color: #30d158; }
.log-empty { color: #555; font-style: italic; padding: 20px 0; text-align: center; }
</style>
</head>
<body>
<canvas class="card-shadow dismissed" id="cardShadow"></canvas>
<div class="light-rig dismissed" id="lightRig">
  <div class="light-pole"></div>
  <div class="light-hook" id="lightHook"></div>
  <div class="light-cord" id="lightCord"></div>
  <button class="lightbulb" id="lightbulb" type="button" aria-label="Cycle light color">
    <span class="lightbulb-glow" id="lightGlow"></span>
    <span class="lightbulb-glass" id="lightGlass"></span>
    <span class="lightbulb-base"></span>
  </button>
</div>
<div class="card dismissed" id="card">
  <div class="card-lighting" id="cardLighting"></div>
  <div class="header" id="dragHandle">
    <div class="dot" id="dot"></div>
    <span id="header-text">AGENT</span>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="chat" onclick="switchTab('chat')">Chat</button>
    <button class="tab" data-tab="log" onclick="switchTab('log')">
      Log
      <span class="tab-badge" id="logBadge">0</span>
    </button>
  </div>

  <div class="panel active" id="panel-chat">
    <div class="messages" id="messages"></div>
    <div class="input-bar">
      <textarea class="text-input" id="userInput" placeholder="Type a message..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendUserInput()}" oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,80)+'px'" disabled></textarea>
      <button class="btn-send" onclick="sendUserInput()" disabled>Send</button>
    </div>
  </div>

  <div class="panel" id="panel-log">
    <div class="log-viewer" id="logViewer">
      <div class="log-empty">No log entries yet.</div>
    </div>
  </div>
</div>

<script>
var dismissed = true;
var activeTab = 'chat';
var unreadLogs = 0;
var pendingToolUseId = null;
var lightModes = [
  { name: 'white', color: [255, 244, 214], intensity: 1.0 },
  { name: 'red', color: [255, 86, 86], intensity: 0.95 },
  { name: 'green', color: [96, 233, 132], intensity: 0.92 },
  { name: 'blue', color: [95, 180, 255], intensity: 0.9 },
  { name: 'yellow', color: [255, 214, 74], intensity: 0.98 },
  { name: 'off', color: [120, 126, 138], intensity: 0.0 }
];
var scene = {
  pivotX: 0,
  pivotY: 22,
  bulbX: 0,
  bulbY: 0,
  lightIndex: 0,
  lastFrame: 0,
  pendulum: {
    length: 58,
    angle: 0,
    angularVelocity: 0,
    supportAx: 0,
    supportAy: 0
  },
  drag: {
    active: false,
    lastMoveTs: 0,
    lastVX: 0,
    lastVY: 0
  }
};

// ============================================================
// Minimal markdown renderer (no external dependencies)
// Handles: **bold**, *italic*, `code`, ```blocks```, links,
//          headers, lists, blockquotes, paragraphs
// ============================================================
function renderMarkdown(text) {
  if (!text) return '';
  var html = escapeHtml(text);

  // Fenced code blocks
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, function(m, lang, code) {
    return '<pre><code>' + code.replace(/\n$/, '') + '</code></pre>';
  });

  // Inline code (before other inline formatting)
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Headers
  html = html.replace(/^### (.+)$/gm, '<strong style="font-size:14px">$1</strong>');
  html = html.replace(/^## (.+)$/gm, '<strong style="font-size:15px">$1</strong>');
  html = html.replace(/^# (.+)$/gm, '<strong style="font-size:16px">$1</strong>');

  // Bold + italic
  html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Links (sanitize: only http, https, mailto schemes)
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, function(m, text, url) {
    if (/^(https?:|mailto:)/i.test(url)) {
      return '<a href="' + url + '" target="_blank">' + text + '</a>';
    }
    return text;
  });

  // Blockquotes
  html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

  // Unordered lists
  html = html.replace(/^[\-\*] (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, function(m) { return '<ul>' + m + '</ul>'; });

  // Ordered lists
  html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');

  // Paragraphs (double newlines)
  html = html.replace(/\n\n+/g, '</p><p>');
  // Single newlines to <br> (within paragraphs)
  html = html.replace(/\n/g, '<br>');

  return '<p>' + html + '</p>';
}

// ============================================================
// headsup message convention
// ============================================================
window.headsup = {
  manifest: { name: 'chat', accepts: ['assistant', 'user', 'status', 'clear'], emits: ['response', 'tts', 'ready'] },
  receive: function(b64) {
    try {
      // atob() returns Latin-1, not UTF-8. Decode properly for emoji/accented text.
      var bytes = Uint8Array.from(atob(b64), function(c) { return c.charCodeAt(0); });
      var text = new TextDecoder().decode(bytes);
      var msg = JSON.parse(text);
      dispatch(msg);
    } catch (e) {
      addLog('receive error: ' + e.message, 'error');
    }
  }
};

function emit(type, payload) {
  if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.headsup) {
    window.webkit.messageHandlers.headsup.postMessage(
      payload !== undefined ? { type: type, payload: payload } : { type: type }
    );
  }
}

// ============================================================
// Message dispatch
// ============================================================
function dispatch(msg) {
  showCard();

  if (msg.type === 'clear') {
    document.getElementById('messages').innerHTML = '';
    pendingToolUseId = null;
    setIdle();
    return;
  }

  if (msg.type === 'status') {
    addStatusMessage(msg.text || '');
    return;
  }

  if (msg.type === 'user') {
    addUserMessage(typeof msg.content === 'string' ? msg.content : JSON.stringify(msg.content));
    return;
  }

  if (msg.type === 'assistant' && Array.isArray(msg.content)) {
    for (var i = 0; i < msg.content.length; i++) {
      var block = msg.content[i];
      if (block.type === 'text') {
        addAssistantText(block.text);
      } else if (block.type === 'thinking') {
        addThinking(block.thinking);
      } else if (block.type === 'redacted_thinking') {
        addRedactedThinking();
      } else if (block.type === 'tool_use' && block.name === 'AskUserQuestion') {
        addAskUserQuestion(block.id, block.input);
      } else if (block.type === 'tool_use' && block.name === 'TodoWrite') {
        addTodoList(block.input);
      } else if (block.type === 'tool_use' && block.name === 'ExitPlanMode') {
        addPlan(block.input);
      } else if (block.type === 'tool_use') {
        addToolUseCard(block.name, block.input);
      } else if (block.type === 'tool_result') {
        addToolResult(block.content, block.is_error);
      } else if (block.type === 'image') {
        addImage(block.source);
      } else if (block.type === 'server_tool_use') {
        addToolUseCard(block.name, block.input);
      } else if (block.type === 'web_search_tool_result' || block.type === 'web_fetch_tool_result') {
        addToolResult(block.content, false);
      } else if (block.type === 'code_execution_tool_result' || block.type === 'bash_code_execution_tool_result') {
        addCodeExecutionResult(block.content);
      }
    }
    return;
  }

  // Fallback: treat as text
  if (typeof msg === 'string') {
    addAssistantText(msg);
  }
}

// ============================================================
// Message rendering
// ============================================================
function addAssistantText(text) {
  var div = document.createElement('div');
  div.className = 'msg assistant';
  div.innerHTML = renderMarkdown(text);
  appendMessage(div);
  setIdle();
}

function addUserMessage(text) {
  var div = document.createElement('div');
  div.className = 'msg user';
  div.textContent = text;
  appendMessage(div);
}

function addStatusMessage(text) {
  // Replace previous status message if exists
  var prev = document.querySelector('.msg.status');
  if (prev) prev.remove();

  if (!text) return;
  var div = document.createElement('div');
  div.className = 'msg status';
  div.textContent = text;
  appendMessage(div);
}

function addAskUserQuestion(toolUseId, input) {
  pendingToolUseId = toolUseId;
  setActive();

  if (!input || !input.questions || input.questions.length === 0) return;

  for (var qi = 0; qi < input.questions.length; qi++) {
    var q = input.questions[qi];
    var div = document.createElement('div');
    div.className = 'msg assistant';

    // Question text
    var qHtml = renderMarkdown(q.question || '');

    // Options as numbered buttons
    var optsHtml = '';
    if (q.options && q.options.length > 0) {
      optsHtml = '<div class="options">';
      for (var oi = 0; oi < q.options.length; oi++) {
        var opt = q.options[oi];
        var label = typeof opt === 'string' ? opt : (opt.label || '');
        var desc = (typeof opt === 'object' && opt.description) ? '<div class="opt-desc">' + escapeHtml(opt.description) + '</div>' : '';
        optsHtml += '<button class="opt-btn" data-value="' + escapeAttr(label) + '" onclick="respondOption(this)">'
          + '<span class="opt-num">' + (oi + 1) + '</span>'
          + '<span class="opt-label">' + escapeHtml(label) + desc + '</span>'
          + '</button>';
      }
      optsHtml += '</div>';
    }

    div.innerHTML = qHtml + optsHtml;
    appendMessage(div);
  }

  switchTab('chat');
}

function addThinking(text) {
  var div = document.createElement('div');
  div.className = 'msg assistant';
  div.innerHTML = '<div class="thinking-block">'
    + '<div class="thinking-header" onclick="this.parentElement.classList.toggle(\'open\')">'
    + '<span class="thinking-arrow">\u25B6</span> Thinking\u2026'
    + '</div>'
    + '<div class="thinking-body">' + renderMarkdown(text) + '</div>'
    + '</div>';
  appendMessage(div);
  setIdle();
}

function addRedactedThinking() {
  var div = document.createElement('div');
  div.className = 'msg assistant';
  div.innerHTML = '<div class="redacted-block">\uD83D\uDD12 Thinking (redacted)</div>';
  appendMessage(div);
  setIdle();
}

function addToolUseCard(name, input) {
  var div = document.createElement('div');
  div.className = 'msg assistant';
  var inputStr = '';
  try { inputStr = JSON.stringify(input, null, 2); } catch(e) { inputStr = String(input); }
  div.innerHTML = '<div class="tool-card">'
    + '<div class="tool-card-header">'
    + '<span class="tool-card-icon">\u2699</span>'
    + '<span class="tool-card-name">' + escapeHtml(name) + '</span>'
    + '</div>'
    + '<div class="tool-card-input">' + escapeHtml(inputStr) + '</div>'
    + '</div>';
  appendMessage(div);
  setIdle();
}

function addToolResult(content, isError) {
  var div = document.createElement('div');
  div.className = 'msg assistant';
  var text = '';
  if (typeof content === 'string') {
    text = content;
  } else if (Array.isArray(content)) {
    for (var i = 0; i < content.length; i++) {
      if (content[i].type === 'text') text += content[i].text + '\n';
    }
  } else if (content && typeof content === 'object') {
    try { text = JSON.stringify(content, null, 2); } catch(e) { text = String(content); }
  }
  div.innerHTML = '<div class="tool-result' + (isError ? ' error' : '') + '">'
    + '<div class="tool-result-label">' + (isError ? '\u274C Error' : '\u2705 Result') + '</div>'
    + renderMarkdown(text.trim())
    + '</div>';
  appendMessage(div);
  setIdle();
}

function addImage(source) {
  var div = document.createElement('div');
  div.className = 'msg assistant';
  if (source && source.type === 'base64') {
    div.innerHTML = '<img class="msg-image" src="data:' + (source.media_type || 'image/png') + ';base64,' + source.data + '">';
  } else if (source && source.type === 'url') {
    div.innerHTML = '<img class="msg-image" src="' + escapeAttr(source.url) + '">';
  } else {
    div.innerHTML = '<em>Image (unsupported source)</em>';
  }
  appendMessage(div);
  setIdle();
}

function addPlan(input) {
  var div = document.createElement('div');
  div.className = 'msg assistant';
  var planText = '';
  if (input && input.plan) planText = input.plan;
  else if (input && input.allowedPrompts) planText = 'Plan ready for approval.';
  div.innerHTML = '<div class="plan-block">'
    + '<div class="plan-label">\uD83D\uDCCB Plan</div>'
    + renderMarkdown(planText)
    + '</div>';
  appendMessage(div);
  setIdle();
}

function addCodeExecutionResult(content) {
  var div = document.createElement('div');
  div.className = 'msg assistant';
  var html = '<div class="tool-result">';
  if (content && content.stdout) {
    html += '<div class="tool-result-label">stdout</div><pre><code>' + escapeHtml(content.stdout) + '</code></pre>';
  }
  if (content && content.stderr) {
    html += '<div class="tool-result-label" style="color:#ff453a">stderr</div><pre><code>' + escapeHtml(content.stderr) + '</code></pre>';
  }
  if (content && content.return_code !== undefined) {
    var rc = content.return_code;
    html += '<div style="font-size:11px;color:' + (rc === 0 ? '#30d158' : '#ff453a') + ';margin-top:4px">exit ' + rc + '</div>';
  }
  html += '</div>';
  div.innerHTML = html;
  appendMessage(div);
  setIdle();
}

function addTodoList(input) {
  if (!input || !input.todos) return;
  var div = document.createElement('div');
  div.className = 'msg assistant';

  var html = '<div class="todo-list">';
  for (var i = 0; i < input.todos.length; i++) {
    var t = input.todos[i];
    var status = t.status || 'pending';
    var icon = status === 'completed' ? '\u2713' : status === 'in_progress' ? '\u25B6' : '';
    var text = status === 'in_progress' ? (t.activeForm || t.content) : t.content;
    html += '<div class="todo-item ' + status + '">'
      + '<span class="todo-icon">' + icon + '</span>'
      + '<span class="todo-text">' + escapeHtml(text) + '</span>'
      + '</div>';
  }
  html += '</div>';
  div.innerHTML = html;
  appendMessage(div);
  setIdle();
}

function appendMessage(el) {
  var container = document.getElementById('messages');
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
}

// ============================================================
// Response handling
// ============================================================
function respondOption(btn) {
  var value = btn.getAttribute('data-value');
  respond(value);
}

function respond(value) {
  if (!value || value.trim() === '') return;
  value = value.trim();

  addUserMessage(value);

  var payload = { type: 'response', value: value };
  if (pendingToolUseId) {
    payload.tool_use_id = pendingToolUseId;
    pendingToolUseId = null;
  }
  emit('response', payload);

  // Disable option buttons in the last assistant message
  var btns = document.querySelectorAll('.opt-btn');
  for (var i = 0; i < btns.length; i++) {
    btns[i].style.pointerEvents = 'none';
    btns[i].style.opacity = '0.5';
  }

  setIdle();
  document.getElementById('userInput').value = '';
}

function sendUserInput() {
  var input = document.getElementById('userInput');
  respond(input.value);
}

// ============================================================
// State indicators
// ============================================================
function setActive() {
  var dot = document.getElementById('dot');
  dot.classList.add('active');
  // Enable input when agent is asking a question
  document.getElementById('userInput').disabled = false;
  document.querySelector('.btn-send').disabled = false;
}

function setIdle() {
  var dot = document.getElementById('dot');
  dot.classList.remove('active');
  // Disable input when no pending question — events would be lost
  if (!pendingToolUseId) {
    document.getElementById('userInput').disabled = true;
    document.querySelector('.btn-send').disabled = true;
  }
}

function showCard() {
  if (dismissed) {
    document.getElementById('card').classList.remove('dismissed');
    document.getElementById('cardShadow').classList.remove('dismissed');
    dismissed = false;
  }
}

function dismiss() {
  document.getElementById('card').classList.add('dismissed');
  document.getElementById('cardShadow').classList.add('dismissed');
  dismissed = true;
}

// ============================================================
// Tab switching
// ============================================================
function switchTab(name) {
  activeTab = name;
  document.querySelectorAll('.tab').forEach(function(t) {
    t.classList.toggle('active', t.dataset.tab === name);
  });
  document.querySelectorAll('.panel').forEach(function(p) {
    p.classList.toggle('active', p.id === 'panel-' + name);
  });
  if (name === 'log') {
    unreadLogs = 0;
    var badge = document.getElementById('logBadge');
    badge.style.display = 'none';
    badge.textContent = '0';
  }
}

// ============================================================
// Log
// ============================================================
function addLog(message, level) {
  var viewer = document.getElementById('logViewer');
  var empty = viewer.querySelector('.log-empty');
  if (empty) empty.remove();
  var entry = document.createElement('div');
  entry.className = 'log-entry' + (level ? ' ' + level : '');
  var now = new Date();
  var ts = now.toLocaleTimeString('en-US', {hour12:false, hour:'2-digit', minute:'2-digit', second:'2-digit'});
  entry.innerHTML = '<span class="ts">' + ts + '</span>' + escapeHtml(message);
  viewer.appendChild(entry);
  viewer.scrollTop = viewer.scrollHeight;
  if (activeTab !== 'log') {
    unreadLogs++;
    var badge = document.getElementById('logBadge');
    badge.textContent = unreadLogs > 99 ? '99+' : unreadLogs;
    badge.style.display = 'flex';
  }
}

// ============================================================
// Utilities
// ============================================================
function escapeHtml(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function escapeAttr(s) {
  return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;');
}

function clamp(value, min, max) {
  return Math.min(max, Math.max(min, value));
}

function rgba(rgb, alpha) {
  return 'rgba(' + rgb[0] + ',' + rgb[1] + ',' + rgb[2] + ',' + alpha + ')';
}

function currentLightMode() {
  return lightModes[scene.lightIndex];
}

function updateBulbColor() {
  var mode = currentLightMode();
  var glass = document.getElementById('lightGlass');
  var glow = document.getElementById('lightGlow');
  var bulb = document.getElementById('lightbulb');
  var color = mode.color;
  var coreAlpha = mode.intensity > 0 ? (0.94 - mode.intensity * 0.12) : 0.18;
  glass.style.background =
    'radial-gradient(circle at 35% 30%, rgba(255,255,255,' + (mode.intensity > 0 ? '0.96' : '0.36') + '), '
    + rgba(color, coreAlpha) + ' 38%, '
    + rgba(color, mode.intensity > 0 ? 0.56 : 0.16) + ' 72%, rgba(0,0,0,0.18))';
  glass.style.boxShadow =
    'inset -6px -8px 12px rgba(0,0,0,0.12), 0 0 18px ' + rgba(color, mode.intensity * 0.26);
  glow.style.background =
    'radial-gradient(circle, '
    + rgba(color, mode.intensity * 0.46) + ', '
    + rgba(color, mode.intensity * 0.18) + ' 35%, '
    + rgba(color, 0) + ' 72%)';
  glow.style.opacity = mode.intensity > 0 ? (0.45 + mode.intensity * 0.5) : 0.08;
  bulb.title = 'Light: ' + mode.name;
}

function cycleLightMode() {
  scene.lightIndex = (scene.lightIndex + 1) % lightModes.length;
  updateBulbColor();
}

function updateBulbPosition() {
  scene.bulbX = scene.pivotX + Math.sin(scene.pendulum.angle) * scene.pendulum.length;
  scene.bulbY = scene.pivotY + Math.cos(scene.pendulum.angle) * scene.pendulum.length;
}

function positionSceneAnchors() {
  scene.pivotX = window.innerWidth * 0.5;
  scene.pivotY = 24;

  var hook = document.getElementById('lightHook');
  hook.style.left = scene.pivotX + 'px';
  hook.style.top = (scene.pivotY - 5) + 'px';
}

function registerDragImpulse(dx, dy) {
  var now = performance.now();
  var drag = scene.drag;
  var dt = drag.lastMoveTs ? Math.max((now - drag.lastMoveTs) / 1000, 1 / 240) : 1 / 60;
  var vx = dx / dt;
  var vy = dy / dt;
  var ax = (vx - drag.lastVX) / dt;
  var ay = (vy - drag.lastVY) / dt;

  scene.pendulum.supportAx = clamp(ax, -4200, 4200);
  scene.pendulum.supportAy = clamp(ay, -2400, 2400);
  scene.pendulum.angle = clamp(scene.pendulum.angle - dx * 0.0019, -0.75, 0.75);
  scene.pendulum.angularVelocity += clamp((-dx * 0.032) - (vx * 0.00011), -0.26, 0.26);

  drag.active = true;
  drag.lastMoveTs = now;
  drag.lastVX = vx;
  drag.lastVY = vy;
}

function stepPendulum(now) {
  if (!scene.lastFrame) scene.lastFrame = now;
  var dt = Math.min((now - scene.lastFrame) / 1000, 0.033);
  scene.lastFrame = now;

  var p = scene.pendulum;
  var gravity = 1850;
  var damping = 4.6;
  var angularAccel =
    -((gravity + p.supportAy) / p.length) * Math.sin(p.angle)
    - (p.supportAx / p.length) * Math.cos(p.angle)
    - damping * p.angularVelocity;

  p.angularVelocity += angularAccel * dt;
  p.angle += p.angularVelocity * dt;
  p.angle = clamp(p.angle, -0.82, 0.82);

  var supportDecay = Math.pow(0.018, dt);
  p.supportAx *= supportDecay;
  p.supportAy *= supportDecay;

  if (!scene.drag.active) {
    p.angularVelocity *= Math.pow(0.992, dt * 60);
  }

  if (!scene.drag.active &&
      Math.abs(p.angle) < 0.0005 &&
      Math.abs(p.angularVelocity) < 0.0005 &&
      Math.abs(p.supportAx) < 0.25 &&
      Math.abs(p.supportAy) < 0.25) {
    p.angle = 0;
    p.angularVelocity = 0;
  }

  updateBulbPosition();
}

function syncLightRig() {
  var bulb = document.getElementById('lightbulb');
  var cord = document.getElementById('lightCord');
  var dx = scene.bulbX - scene.pivotX;
  var dy = scene.bulbY - scene.pivotY;
  var cordLength = Math.max(Math.sqrt(dx * dx + dy * dy), 1);
  var angle = Math.atan2(dx, dy);

  cord.style.left = (scene.pivotX - 1) + 'px';
  cord.style.top = scene.pivotY + 'px';
  cord.style.height = cordLength + 'px';
  cord.style.transform = 'rotate(' + angle + 'rad)';

  bulb.style.transform =
    'translate(' + (scene.bulbX - 17) + 'px,' + (scene.bulbY - 20) + 'px) rotate(' + scene.pendulum.angle + 'rad)';
}

function syncCardLighting(cardRect) {
  var lighting = document.getElementById('cardLighting');
  var mode = currentLightMode();
  var intensity = mode.intensity;
  var localX = scene.bulbX - cardRect.left;
  var localY = scene.bulbY - cardRect.top;

  if (dismissed) {
    lighting.style.opacity = '0';
    return;
  }

  lighting.style.opacity = '0.96';
  lighting.style.background =
    'radial-gradient(circle 240px at ' + localX.toFixed(1) + 'px ' + localY.toFixed(1) + 'px, '
    + rgba(mode.color, intensity * 0.26) + ' 0%, '
    + rgba(mode.color, intensity * 0.14) + ' 24%, '
    + rgba(mode.color, intensity * 0.04) + ' 48%, rgba(0,0,0,0) 72%), '
    + 'linear-gradient(180deg, rgba(255,255,255,' + (0.02 + intensity * 0.06) + '), rgba(0,0,0,0) 42%, rgba(0,0,0,0.14) 100%)';
  lighting.style.boxShadow =
    'inset 0 1px 0 rgba(255,255,255,' + (0.10 + intensity * 0.10) + '), '
    + 'inset 0 -34px 48px rgba(0,0,0,' + (0.16 - intensity * 0.05) + ')';
}

// ============================================================
// Drag handling
// ============================================================
(function() {
  var handle = document.getElementById('dragHandle');
  var dragging = false;
  var lastX = 0;
  var lastY = 0;

  handle.addEventListener('mousedown', function(e) {
    if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    dragging = true;
    scene.drag.active = true;
    scene.drag.lastMoveTs = 0;
    scene.drag.lastVX = 0;
    scene.drag.lastVY = 0;
    lastX = e.screenX;
    lastY = e.screenY;
    e.preventDefault();
  });

  document.addEventListener('mousemove', function(e) {
    if (!dragging) return;
    var dx = e.screenX - lastX;
    var dy = e.screenY - lastY;
    lastX = e.screenX;
    lastY = e.screenY;
    if (dx === 0 && dy === 0) return;

    registerDragImpulse(dx, dy);
    window.webkit.messageHandlers.headsup.postMessage({ type: 'move', dx: dx, dy: dy });
  });

  document.addEventListener('mouseup', function() {
    dragging = false;
    scene.drag.active = false;
    scene.drag.lastVX = 0;
    scene.drag.lastVY = 0;
    scene.drag.lastMoveTs = 0;
  });
})();

// ============================================================
// Keyboard shortcuts for numbered options
// ============================================================
document.addEventListener('keydown', function(e) {
  if (dismissed || !pendingToolUseId) return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  var num = parseInt(e.key, 10);
  if (num >= 1 && num <= 9) {
    var btns = document.querySelectorAll('.opt-btn');
    if (num <= btns.length) {
      btns[num - 1].click();
    }
  }
});

// ============================================================
// Canvas-drawn shadow (WKWebView breaks CSS box-shadow rounding)
// ============================================================
function drawShadow(cardRect) {
  var canvas = document.getElementById('cardShadow');
  if (!canvas) return;

  var canvasRect = canvas.getBoundingClientRect();
  var width = Math.max(1, Math.round(canvasRect.width));
  var height = Math.max(1, Math.round(canvasRect.height));
  var dpr = window.devicePixelRatio || 1;

  if (canvas.width !== width * dpr || canvas.height !== height * dpr) {
    canvas.width = width * dpr;
    canvas.height = height * dpr;
  }

  var ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, width, height);

  if (!cardRect || dismissed) return;

  var mode = currentLightMode();
  var x = cardRect.left - canvasRect.left;
  var y = cardRect.top - canvasRect.top;
  var w = cardRect.width;
  var h = cardRect.height;
  var radius = 14;
  var centerX = x + w * 0.5;
  var centerY = y + h * 0.5;
  var toCenterX = centerX - scene.bulbX;
  var toCenterY = centerY - scene.bulbY;
  var distance = Math.max(Math.sqrt(toCenterX * toCenterX + toCenterY * toCenterY), 1);
  var dirX = toCenterX / distance;
  var dirY = toCenterY / distance;
  var intensity = mode.intensity;
  var shadowDx = dirX * (12 + intensity * 18);
  var shadowDy = 8 + dirY * (8 + intensity * 16);
  var layers = 28;
  var spread = 26 + intensity * 12;
  var baseAlpha = 0.022 + intensity * 0.016;

  for (var i = layers; i >= 0; i--) {
    var t = i / layers;
    var expand = t * spread;
    var alpha = baseAlpha * (1 - t) * (1.08 - t * 0.28);
    ctx.fillStyle = 'rgba(0,0,0,' + alpha.toFixed(4) + ')';
    roundRect(
      ctx,
      x + shadowDx - expand,
      y + shadowDy - expand,
      w + expand * 2,
      h + expand * 2,
      radius + expand * 0.55
    );
    ctx.fill();
  }

  ctx.fillStyle = 'rgba(0,0,0,' + (0.08 + intensity * 0.06).toFixed(4) + ')';
  roundRect(ctx, x + shadowDx * 0.55, y + shadowDy * 0.55, w, h, radius);
  ctx.fill();
}

function roundRect(ctx, x, y, w, h, r) {
  var radius = Math.max(0, Math.min(r, Math.min(w, h) * 0.5));
  ctx.beginPath();
  ctx.moveTo(x + radius, y);
  ctx.lineTo(x + w - radius, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
  ctx.lineTo(x + w, y + h - radius);
  ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
  ctx.lineTo(x + radius, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
  ctx.lineTo(x, y + radius);
  ctx.quadraticCurveTo(x, y, x + radius, y);
  ctx.closePath();
}

function renderScene(now) {
  positionSceneAnchors();
  stepPendulum(now || performance.now());
  syncLightRig();

  var card = document.getElementById('card');
  var cardRect = card ? card.getBoundingClientRect() : null;
  if (cardRect && cardRect.width && cardRect.height) {
    syncCardLighting(cardRect);
    drawShadow(cardRect);
  }

  window.requestAnimationFrame(renderScene);
}

window.addEventListener('resize', function() {
  positionSceneAnchors();
});

document.getElementById('lightbulb').addEventListener('click', function(e) {
  e.preventDefault();
  e.stopPropagation();
  cycleLightMode();
});

var _origShowCard = showCard;
showCard = function() {
  _origShowCard();
  document.getElementById('lightRig').classList.remove('dismissed');
};

var _origDismiss = dismiss;
dismiss = function() {
  _origDismiss();
  document.getElementById('lightRig').classList.add('dismissed');
};

updateBulbColor();
positionSceneAnchors();
updateBulbPosition();
window.requestAnimationFrame(renderScene);

// Start dismissed -- overlay appears when first message arrives
emit('ready', window.headsup.manifest);
</script>
</body>
