# validator — Codex provider manifest
# Source of truth: ai-agents/agents/validator.md

name        = "validator"
description = "Runs tests, linters, and verification steps. Produces a pass/fail report. Does not write new code — only executes and reports."
nickname_candidates = ["Validator", "Tester", "QA"]

[model]
name   = "gpt-5.5"
effort = "low"

[sandbox]
mode = "workspace-write"

[behavior]
no_new_code   = true
execute_only  = true
output_format = "test-report"
