model = "gpt-5.5"
model_reasoning_effort = "medium"
personality = "pragmatic"
approval_policy = "never"
sandbox_mode = "danger-full-access"
notify = []

[features]
hooks = true
goals = true
multi_agent = true
js_repl = true
guardian_approval = true
prevent_idle_sleep = true

[agents]
max_threads = 6
max_depth = 1

[agents.gdi]
config_file = "../.docks/foreman/.codex/agents/gdi.toml"
description = "Deterministic implementation worker. Executes bounded work-card instructions, runs verification, and reports completion evidence to Foreman."

[agents.operator]
config_file = "../.docks/foreman/.codex/agents/operator.toml"
description = "Supervised HITL inspector. Probes live surfaces, evaluates stop conditions, and returns concise evidence to Foreman."

[agents.explorer]
config_file = "../.docks/foreman/.codex/agents/explorer.toml"
description = "Read-only codebase scanner. Maps surfaces, locates patterns, and returns raw findings. Makes no decisions and writes no files."

[notice]
hide_full_access_warning = true
