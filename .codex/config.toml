model = "gpt-5.5"
model_reasoning_effort = "medium"
personality = "pragmatic"
approval_policy = "never"
sandbox_mode = "danger-full-access"

[features]
hooks = true
goals = true
multi_agent = true
js_repl = true
guardian_approval = true
prevent_idle_sleep = true

[agents]
max_depth = 1

[agents.gdi]
config_file = "agents/gdi.toml"
description = "Deterministic implementation worker. Executes bounded work-card instructions, runs verification, and reports completion evidence to Foreman."

[agents.operator]
config_file = "agents/operator.toml"
description = "Supervised HITL inspector. Probes live surfaces, evaluates stop conditions, and returns concise evidence to Foreman."

[agents.explorer]
config_file = "agents/explorer.toml"
description = "Read-only codebase scanner. Maps surfaces, locates patterns, and returns raw findings. Makes no decisions and writes no files."

[agents.validator]
config_file = "agents/validator.toml"
description = "Bounded verification worker. Runs named checks, inspects evidence, and reports pass/fail facts without editing files."

[agents.github-steward]
config_file = "agents/github-steward.toml"
description = "Routine Git/GitHub hygiene worker. Reads branch/ref/PR facts, performs explicitly assigned narrow mutations, and returns a compact signal packet."

[agents.reviewer]
config_file = "agents/reviewer.toml"
description = "Routine review worker. Reviews assigned diffs/files/PR evidence, returns findings first, and never edits files or mutates GitHub."

[notice]
hide_full_access_warning = true
