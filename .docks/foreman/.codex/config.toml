model = "gpt-5.5"
model_reasoning_effort = "xhigh"

[features]
goals = false

[tui]
status_line = ["current-dir", "git-branch", "context-remaining", "model-with-reasoning"]
terminal_title = ["current-dir", "activity", "git-branch", "model"]

# Subagent definitions live inside .docks/foreman/ so they are owned by the
# dock that spawns them. Each role points to a TOML config layer that defines
# the subagent's model, effort, and developer_instructions.
#
# Foreman invokes these by name in natural language ("spawn gdi", "spawn explorer").
# The Codex runtime resolves the name to the matching agents/*.toml file.
#
# Paths are relative to THIS config file's directory (.docks/foreman/.codex/).
# Per docs: "relative paths resolve from the config file that declares the role."
#
# These are NOT replacements for separate GDI/Operator CLI sessions.
# Use subagent spawning for:
#   - small bounded tasks where a full CLI session is more overhead than value;
#   - parallel reconnaissance (explorer) that would exhaust Foreman's context;
#   - single-probe Operator inspections.
# Use separate CLI sessions for:
#   - non-trivial multi-milestone work cards;
#   - multi-step HITL runs;
#   - any work that benefits from /goal iteration or /review in GDI.

[agents.gdi]
config_file = "agents/gdi.toml"
description = "Deterministic implementation worker. Executes bounded work-card instructions, runs verification, and reports completion evidence to Foreman."

[agents.operator]
config_file = "agents/operator.toml"
description = "Supervised HITL inspector. Probes live surfaces, evaluates stop conditions, and returns concise evidence to Foreman."

[agents.explorer]
config_file = "agents/explorer.toml"
description = "Read-only codebase scanner. Maps surfaces, locates patterns, and returns raw findings. Makes no decisions and writes no files."
