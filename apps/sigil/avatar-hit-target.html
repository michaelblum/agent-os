<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  background: transparent;
  overflow: hidden;
}
body {
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
}
</style>
</head>
<body tabindex="0"></body>
<script>
window.headsup = {
  manifest: { name: 'avatar-hit-target', accepts: [], emits: ['local_input', 'ready'] }
};

function emit(type, payload) {
  if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.headsup) {
    window.webkit.messageHandlers.headsup.postMessage(
      payload !== undefined ? { type: type, payload: payload } : { type: type }
    );
  }
}

var leftDown = false;

function emitLocalInput(type, event, extra) {
  var payload = Object.assign({
    type: type,
    x: event ? event.clientX : 0,
    y: event ? event.clientY : 0
  }, extra || {});
  emit('local_input', payload);
}

document.addEventListener('contextmenu', function(event) {
  event.preventDefault();
});

document.addEventListener('mousedown', function(event) {
  document.body.focus();
  if (event.button === 0) {
    leftDown = true;
    emitLocalInput('left_mouse_down', event);
  } else if (event.button === 2) {
    emitLocalInput('right_mouse_down', event);
  }
  event.preventDefault();
});

document.addEventListener('mousemove', function(event) {
  if (!leftDown) return;
  emitLocalInput('left_mouse_dragged', event);
});

document.addEventListener('mouseup', function(event) {
  if (event.button !== 0) return;
  leftDown = false;
  emitLocalInput('left_mouse_up', event);
});

window.addEventListener('blur', function() {
  leftDown = false;
});

document.addEventListener('keydown', function(event) {
  if (event.key !== 'Escape') return;
  emitLocalInput('key_down', null, { keyCode: 53 });
  event.preventDefault();
});

emit('ready', window.headsup.manifest);
</script>
</html>
