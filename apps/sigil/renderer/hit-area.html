<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
html, body { margin: 0; width: 100%; height: 100%; background: transparent; overflow: hidden; cursor: pointer; }
</style>
</head>
<body>
<script>
// Minimal absorber page. Exists where canvas.update puts it so clicks land
// here instead of passing through to the desktop.
window.headsup = window.headsup || {};
const HIT_SOURCE = 'sigil-hit';
const HIT_PARAMS = new URLSearchParams(window.location.search);
const HIT_PARENT_ID = HIT_PARAMS.get('parent') || 'avatar-main';
const HIT_ID = HIT_PARAMS.get('id') || null;

function emit(kind, event) {
    const rect = document.body.getBoundingClientRect();
    const payload = {
        source: HIT_SOURCE,
        kind,
        screenX: Number.isFinite(event.screenX) ? event.screenX : null,
        screenY: Number.isFinite(event.screenY) ? event.screenY : null,
        offsetX: Math.max(0, Math.min(rect.width, event.clientX - rect.left)),
        offsetY: Math.max(0, Math.min(rect.height, event.clientY - rect.top)),
    };
    if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.headsup) {
        window.webkit.messageHandlers.headsup.postMessage({
            type: 'canvas.send',
            payload: {
                target: HIT_PARENT_ID,
                message: {
                    type: 'canvas_message',
                    id: HIT_ID,
                    payload,
                },
            },
        });
    }
}

let activePointerId = null;
let lastRightPointerDownAt = 0;

document.addEventListener('pointerdown', (event) => {
    if (event.button === 2) {
        event.preventDefault();
        lastRightPointerDownAt = performance.now();
        emit('right_mouse_down', event);
        return;
    }
    if (event.button !== 0) return;
    activePointerId = event.pointerId;
    document.body.setPointerCapture?.(event.pointerId);
    emit('left_mouse_down', event);
});

document.addEventListener('pointermove', (event) => {
    if (activePointerId !== event.pointerId) return;
    emit('left_mouse_dragged', event);
});

document.addEventListener('pointerup', (event) => {
    if (activePointerId !== event.pointerId) return;
    emit('left_mouse_up', event);
    document.body.releasePointerCapture?.(event.pointerId);
    activePointerId = null;
});

document.addEventListener('pointercancel', (event) => {
    if (activePointerId !== event.pointerId) return;
    emit('left_mouse_up', event);
    activePointerId = null;
});

document.addEventListener('contextmenu', (event) => {
    event.preventDefault();
    if (performance.now() - lastRightPointerDownAt < 750) return;
    emit('right_mouse_down', event);
});

window.headsup.receive = function(b64) {
    try {
        const json = JSON.parse(atob(b64));
        if (json.type === 'lifecycle') {
            if (json.action === 'resume') {
                // ACK immediately — no rAF loop to restart
                if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.headsup) {
                    window.webkit.messageHandlers.headsup.postMessage({ type: 'lifecycle.complete', payload: { action: 'resume' } });
                }
            }
            // suspend is a no-op — no render loop to pause
        }
    } catch (e) { /* ignore malformed messages */ }
};
console.log('[avatar-hit] ready');
</script>
</body>
</html>
