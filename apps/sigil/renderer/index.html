// === LIVE SCENE ===
// (from live/js/scene.js)

function initScene() {
    state.scene = new THREE.Scene();
    const aspect = window.innerWidth / window.innerHeight;

    state.perspCamera = new THREE.PerspectiveCamera(45, aspect, 0.1, 1000);
    state.perspCamera.position.z = 7.5;
    state.camera = state.perspCamera;

    state.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    state.renderer.setSize(window.innerWidth, window.innerHeight);
    state.renderer.setPixelRatio(window.devicePixelRatio);
    state.renderer.setClearColor(0x000000, 0);
    document.body.appendChild(state.renderer.domElement);

    // No skybox — transparent background

    state.polyGroup = new THREE.Group();
    state.scene.add(state.polyGroup);

    // Lighting
    state.pointLight = new THREE.PointLight(0xffffff, 1.5, 10);
    state.polyGroup.add(state.pointLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
    dirLight.position.set(5, 5, 5);
    state.scene.add(dirLight);
    state.scene.add(new THREE.AmbientLight(0x444444));

    // Initialize THREE.Vector3 state fields
    state.quickSpinAxis = new THREE.Vector3();
    state.dragMomentumAxis = new THREE.Vector3();
    state.targetPosition = new THREE.Vector3(0, 0, 0);
    state.moveRotationAxis = new THREE.Vector3(0, 1, 0);

    window.addEventListener('resize', onWindowResize);
}

function onWindowResize() {
    const aspect = window.innerWidth / window.innerHeight;
    state.perspCamera.aspect = aspect;
    state.perspCamera.updateProjectionMatrix();
    state.renderer.setSize(window.innerWidth, window.innerHeight);
}

function screenToScene(px, py) {
    const vFov = state.perspCamera.fov * Math.PI / 180;
    const dist = state.perspCamera.position.z;
    const visibleHeight = 2 * Math.tan(vFov / 2) * dist;
    const visibleWidth = visibleHeight * state.perspCamera.aspect;

    const sx = (px / window.innerWidth - 0.5) * visibleWidth;
    const sy = -(py / window.innerHeight - 0.5) * visibleHeight;
    return { x: sx, y: sy };
}

// === LIVE PATHING ===
// (from live/js/pathing.js)

const _pathingSpinAxis = new THREE.Vector3(0.5, 1.0, 0).normalize();

function animatePathing(dt) {
    if (state.isPaused) return;

    if (!state.isDestroyed) {
        let activeRotationSpeed = state.idleSpinSpeed;

        if (state.quickSpinActive) {
            let timeRemaining = state.quickSpinEndTime - performance.now();
            if (timeRemaining > 0) {
                let t = timeRemaining / 2000;
                activeRotationSpeed += state.quickSpinSpeed * t * t;
                state.polyGroup.rotateOnWorldAxis(state.quickSpinAxis, state.quickSpinSpeed * t * t);
            } else {
                state.quickSpinActive = false;
            }
        }

        state.polyGroup.rotateOnWorldAxis(_pathingSpinAxis, activeRotationSpeed);
    }

    state.polyGroup.quaternion.normalize();
}

function setScenePosition(sx, sy) {
    state.polyGroup.position.x = sx;
    state.polyGroup.position.y = sy;
}

// === LIVE MAIN ===
// (from live/js/main.js)

function init() {
    initScene();
    createAuraObjects();
    createParticleObjects();
    createPhenomena();
    createLightning();
    createMagneticField();
    createOmega();

    updateGeometry(state.currentGeometryType);
    updateAllColors();

    state.polyGroup.scale.set(state.z_depth, state.z_depth, state.z_depth);

    setupLiveJs();
    animate();
}

function animate() {
    requestAnimationFrame(animate);
    const dt = 0.016;

    state.globalTime += dt;

    liveJsTick();

    // Nova scale calculation
    if (state.collapseTime > 0 && state.wasFullCharge) {
        let t = Math.max(0, state.collapseTime) / 0.75;
        state.novaScale = t * t * t;
    } else if (state.isDestroyed) {
        state.novaScale = 0.0;
    } else if (state.isRespawning) {
        state.respawnTimer += dt;
        let progress = Math.min(state.respawnTimer / 2.0, 1.0);
        let c4 = (2.0 * Math.PI) / 3;
        state.novaScale = progress === 0 ? 0 : progress === 1 ? 1 :
            Math.pow(2, -10 * progress) * Math.sin((progress * 10 - 0.75) * c4) + 1;
        if (progress >= 1.0) state.isRespawning = false;
    } else {
        state.novaScale = 1.0;
    }

    // Module animations (no skybox, grid, swarm, or camera transition in live mode)
    animatePathing(dt);
    animateParticles(dt);
    animatePhenomena(dt);
    animateAura(dt);
    animateLightning(dt);
    animateMagneticField(dt);
    animateOmega(dt);
    animateSkins(dt);
    animateTrails(dt);

    // Check for deferred fire signals from aura collapse
    if (state._fireSuperNova) {
        state._fireSuperNova = false;
        fireSuperNova();
    }
    if (state._fireExplosion) {
        state._fireExplosion = false;
        fireExplosion();
    }

    // Apply unified scale
    state.polyGroup.scale.setScalar(state.z_depth * state.novaScale);

    state.renderer.render(state.scene, state.camera);
}

// === SIGIL-1 LIVE-JS RUNTIME ===
// The renderer runs as a full-display passthrough canvas launched directly by
// `aos show create` (no Swift host). Subscribes to input_event +
// display_geometry, owns its own state machine, spawns avatar-hit as a child
// canvas.

function postToHost(type, payload) {
    if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.headsup) {
        window.webkit.messageHandlers.headsup.postMessage(
            payload !== undefined ? { type: type, payload: payload } : { type: type }
        );
    }
}

// Cursor tracking — target is last reported screen position, current lerps
// toward it. setScenePosition runs in animate() when state machine allows.
const liveJs = {
    cursorTarget: { x: 0, y: 0, valid: false },
    currentCursor: { x: 0, y: 0, valid: false },
    followAlpha: 0.12, // matches Swift behaviorFollowCursor's smoothing:0.12

    // Avatar screen position (what we consider "where the avatar is").
    // Equals currentCursor in IDLE; during GOTO/fast-travel/drag it's
    // driven by the state machine rather than the cursor.
    avatarPos: { x: 0, y: 0, valid: false },
    avatarHitRadius: 40, // "on avatar" = within 40px of avatarPos

    // State machine.
    state: 'IDLE', // 'IDLE' | 'PRESS' | 'DRAG' | 'GOTO'
    mousedownPos: null,        // where the left button went down
    mousedownAvatarPos: null,  // avatar position at mousedown (for drag-cancel zone)
    dragThreshold: 6,          // pixels; middle of brief's 4-8 range
    dragCancelRadius: 40,      // release within this of mousedownAvatarPos cancels menu

    // Fast-travel animation state (T5 fills in).
    travel: null,

    // Hit-area child canvas (avatar-hit).
    hitReady: false,
    hitSize: 80,
    hitInteractive: false, // last value we pushed; used to debounce updates

    // Placeholder UI overlay (dashed ring in GOTO; circle in DRAG).
    ui: null,
    gotoRingRadius: 60,
    menuRingRadius: 120,

    // Display geometry (from AOS-1). Used to clamp fast-travel targets so
    // the avatar stays on-screen.
    displays: null, // last received snapshot
};

function setupLiveJs() {
    window.headsup = window.headsup || {};
    window.headsup.receive = function(b64) {
        try {
            const msg = JSON.parse(atob(b64));
            handleLiveJsMessage(msg);
        } catch (e) {
            console.error('[sigil-1] IPC parse error:', e);
        }
    };

    // Subscribe to input_event fan-out. Payload shape (per AOS-2):
    // {type: "mouse_move"|"mouse_down"|"key_down"|..., x?, y?, button?,
    //  key_code?, flags: {shift, ctrl, cmd, opt, fn}}
    //
    // Also subscribe to wiki_page_changed so the avatar can live-reload
    // when its agent doc is edited on disk (Task 9). Payload shape (per
    // forwardWikiPageChangedToCanvases in unified.swift):
    //   {type: "wiki_page_changed", path: "sigil/agents/<id>.md",
    //    op: "created"|"updated"|"deleted", wiki_type?: string}
    postToHost('subscribe', { events: ['input_event', 'display_geometry', 'wiki_page_changed'] });

    // 2D UI overlay for GOTO/DRAG placeholder rings. Lives above the
    // Three.js canvas and is pointer-events:none so the full-display
    // canvas stays passthrough.
    const ui = document.createElement('canvas');
    ui.style.position = 'absolute';
    ui.style.inset = '0';
    ui.style.pointerEvents = 'none';
    document.body.appendChild(ui);
    liveJs.ui = ui;
    const resizeUi = () => {
        const dpr = window.devicePixelRatio || 1;
        ui.width = Math.floor(window.innerWidth * dpr);
        ui.height = Math.floor(window.innerHeight * dpr);
        ui.style.width = window.innerWidth + 'px';
        ui.style.height = window.innerHeight + 'px';
        ui.getContext('2d').setTransform(dpr, 0, 0, dpr, 0, 0);
    };
    resizeUi();
    window.addEventListener('resize', resizeUi);

    // Spawn avatar-hit as our child canvas. Initial frame is off-screen;
    // liveJsTick starts repositioning once hitReady flips true.
    postToHost('canvas.create', {
        id: 'avatar-hit',
        url: 'aos://sigil/renderer/hit-area.html',
        frame: [-1000, -1000, liveJs.hitSize, liveJs.hitSize],
        interactive: false,
        request_id: 'create-hit',
    });

    console.log('[sigil-1] renderer setup complete; subscribed to input_event');
}

// Task 8 helpers: union-of-displays bookkeeping.
//
// `computeUnion(displays)` returns the bounding rect over every display's
// `visible_bounds`. Shape: `{minX, minY, maxX, maxY, w, h}`. Missing/empty
// input collapses to a zero rect so callers can safely skip clamping.
//
// `unionSize(union)` returns a stable string signature for topology-change
// detection. We include min corners so that moving a monitor (same w/h,
// different origin) still counts as a material change.
function computeUnion(displays) {
    if (!Array.isArray(displays) || displays.length === 0) {
        return { minX: 0, minY: 0, maxX: 0, maxY: 0, w: 0, h: 0 };
    }
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (const d of displays) {
        const vb = d && d.visible_bounds;
        if (!vb) continue;
        if (vb.x < minX) minX = vb.x;
        if (vb.y < minY) minY = vb.y;
        if (vb.x + vb.w > maxX) maxX = vb.x + vb.w;
        if (vb.y + vb.h > maxY) maxY = vb.y + vb.h;
    }
    if (!Number.isFinite(minX)) {
        return { minX: 0, minY: 0, maxX: 0, maxY: 0, w: 0, h: 0 };
    }
    return { minX, minY, maxX, maxY, w: maxX - minX, h: maxY - minY };
}
function unionSize(union) {
    if (!union) return '0,0,0,0';
    return union.minX + ',' + union.minY + ',' + union.w + ',' + union.h;
}

function handleLiveJsMessage(msg) {
    // Cursor position tracking: any event with x/y updates the target.
    if (typeof msg.x === 'number' && typeof msg.y === 'number') {
        liveJs.cursorTarget.x = msg.x;
        liveJs.cursorTarget.y = msg.y;
        liveJs.cursorTarget.valid = true;
        if (!liveJs.currentCursor.valid) {
            liveJs.currentCursor.x = msg.x;
            liveJs.currentCursor.y = msg.y;
            liveJs.currentCursor.valid = true;
        }
    }

    // Dispatch state-machine transitions by event type.
    switch (msg.type) {
        case 'left_mouse_down':
            smHandleMouseDown(msg.x, msg.y);
            break;
        case 'left_mouse_up':
            smHandleMouseUp(msg.x, msg.y);
            break;
        case 'left_mouse_dragged':
        case 'mouse_moved':
            smHandleMouseMove(msg.x, msg.y);
            break;
        case 'right_mouse_down':
            smHandleCancel('right_click');
            break;
        case 'key_down':
            if (msg.key_code === 53 /* ESC */) smHandleCancel('escape');
            break;
        case 'canvas.response':
            // Existing avatar-hit flow
            if (msg.request_id === 'create-hit') {
                if (msg.status === 'ok') {
                    liveJs.hitReady = true;
                    console.log('[sigil-1] avatar-hit ready');
                } else {
                    console.error('[sigil-1] avatar-hit create failed:', msg.code, msg.message);
                }
                break;
            }
            // Generic waiter dispatch (currently used by the boot module's
            // lastPosition lookup). Waiters self-remove from _lpWaiters via
            // their done() callback; return values are ignored. Iterate
            // over a snapshot to avoid mutation-during-iteration.
            if (Array.isArray(liveJs._lpWaiters)) {
                for (const handler of liveJs._lpWaiters.slice()) {
                    try { handler(msg); } catch (e) { console.error('[sigil] waiter threw:', e); }
                }
            }
            break;
        case 'display_geometry':
            liveJs.displays = msg.displays || [];
            console.log('[sigil-1] display_geometry snapshot:',
                liveJs.displays.length, 'display(s)');
            // First-broadcast hook for the live-js boot sequence (Task 6).
            // awaitFirstDisplayGeometry() sets `_resolveFirstDisplayGeometry`
            // before starting the subscription; we fire it once then clear.
            if (typeof liveJs._resolveFirstDisplayGeometry === 'function') {
                const resolver = liveJs._resolveFirstDisplayGeometry;
                liveJs._resolveFirstDisplayGeometry = null;
                resolver(liveJs.displays);
            }
            // Task 8: recompute union, clamp avatarPos if it is now outside
            // the visible bounds (e.g. operator unplugged the display the
            // avatar was parked on), and log an advisory if the topology
            // changed since boot.
            {
                const union = computeUnion(liveJs.displays);
                liveJs.globalBounds = union;
                if (liveJs.avatarPos.valid && union.w > 0 && union.h > 0) {
                    const outside =
                        liveJs.avatarPos.x < union.minX || liveJs.avatarPos.x > union.maxX ||
                        liveJs.avatarPos.y < union.minY || liveJs.avatarPos.y > union.maxY;
                    if (outside) {
                        const clampedX = Math.max(union.minX, Math.min(union.maxX, liveJs.avatarPos.x));
                        const clampedY = Math.max(union.minY, Math.min(union.maxY, liveJs.avatarPos.y));
                        console.info('[sigil] avatarPos outside union; clamping',
                            '(' + liveJs.avatarPos.x.toFixed(1) + ',' + liveJs.avatarPos.y.toFixed(1) + ')',
                            '→',
                            '(' + clampedX.toFixed(1) + ',' + clampedY.toFixed(1) + ')');
                        liveJs.avatarPos.x = clampedX;
                        liveJs.avatarPos.y = clampedY;
                        // avatarPos.valid remains true — clamping does not invalidate.
                    }
                }
                if (liveJs.globalBoundsAtBoot &&
                    unionSize(union) !== unionSize(liveJs.globalBoundsAtBoot)) {
                    console.info('[sigil] global bounds changed since boot; restart avatar for full canvas coverage');
                }
            }
            break;
        case 'wiki_page_changed': {
            // Live reload (Task 9). Filter to this avatar's agent doc,
            // mark a pending reload, and flush immediately if we are in
            // the parked state. Mid-gesture edits defer until the next
            // transition back to IDLE (flushReload is also called from
            // smSet when transitioning into IDLE and from tickFastTravel
            // when the travel animation completes).
            const agentId = liveJs.currentAgentId;
            if (!agentId) break; // boot hasn't finished resolving the agent yet
            const expected = 'sigil/agents/' + agentId + '.md';
            if (msg.path !== expected) break;
            liveJs.pendingReload = true;
            console.log('[sigil] wiki_page_changed for current agent:', msg.path, '(' + msg.op + ')');
            if (liveJs.state === 'IDLE' && !liveJs.travel) {
                flushReload();
            }
            break;
        }
        default:
            break;
    }
}

// === STATE MACHINE ===

function smSet(next, reason) {
    if (liveJs.state === next) return;
    console.log('[sigil-1] state:', liveJs.state, '→', next, reason ? '(' + reason + ')' : '');
    liveJs.state = next;
    // Task 9: on every transition INTO IDLE, try to flush any pending
    // wiki_page_changed reload. If fast-travel was kicked off on this
    // same mouseup (drag-release→fast-travel, goto-release→fast-travel)
    // the state is IDLE but liveJs.travel is truthy — flushReload's
    // internal gate defers until the travel animation completes
    // (tickFastTravel retries the flush on completion).
    if (next === 'IDLE') {
        flushReload();
        postLastPositionToDaemon();
    }
}

// Fire-and-forget: tell the daemon where the avatar currently sits so
// subsequent spawns of this agent (within the daemon's lifetime) resume
// here instead of falling back to birthplace. Skipped if currentAgentId
// hasn't been set yet (boot race) or if avatarPos isn't valid (during
// fast-travel transit the position may be in a stale frame).
function postLastPositionToDaemon() {
    const agentId = liveJs.currentAgentId;
    if (!agentId) return;
    const p = liveJs.avatarPos;
    if (!p || !p.valid || typeof p.x !== 'number' || typeof p.y !== 'number') return;
    postToHost('position.set', { key: agentId, x: p.x, y: p.y });
}

// Live-reload flush. Delegates to the module-scope helper installed on
// window.__sigilFlushReload by the boot module (which owns the loadAgent
// + applyAppearance imports). Gated: only runs if a reload is pending,
// the avatar is truly parked (IDLE and not animating), and the module
// helper is installed.
function flushReload() {
    if (!liveJs.pendingReload) return;
    if (liveJs.state !== 'IDLE') return;
    if (liveJs.travel) return;
    if (typeof window.__sigilFlushReload !== 'function') return;
    liveJs.pendingReload = false;
    window.__sigilFlushReload().catch((e) => {
        // Restore pending flag so a later IDLE tick can retry.
        console.error('[sigil] flushReload failed:', e);
        liveJs.pendingReload = true;
    });
}

function smIsOnAvatar(x, y) {
    if (!liveJs.avatarPos.valid) return false;
    const dx = x - liveJs.avatarPos.x;
    const dy = y - liveJs.avatarPos.y;
    return (dx * dx + dy * dy) <= (liveJs.avatarHitRadius * liveJs.avatarHitRadius);
}

function smDistance(ax, ay, bx, by) {
    const dx = ax - bx, dy = ay - by;
    return Math.sqrt(dx * dx + dy * dy);
}

function smHandleMouseDown(x, y) {
    switch (liveJs.state) {
        case 'IDLE':
            if (smIsOnAvatar(x, y)) {
                liveJs.mousedownPos = { x: x, y: y };
                liveJs.mousedownAvatarPos = {
                    x: liveJs.avatarPos.x,
                    y: liveJs.avatarPos.y,
                };
                smSet('PRESS', 'mousedown-on-avatar');
            }
            // mousedown off-avatar in IDLE is ignored (passthrough territory).
            break;
        case 'GOTO':
            // Any click in GOTO = either fast-travel target or cancel-on-avatar.
            if (smIsOnAvatar(x, y)) {
                smSet('IDLE', 'goto-click-on-avatar');
            } else {
                // Commit to fast-travel at mouseup (not down) — this is mousedown;
                // hold context so mouseup fires the travel.
                liveJs.mousedownPos = { x: x, y: y };
            }
            break;
        // PRESS/DRAG ignore additional mousedowns.
        default: break;
    }
}

function smHandleMouseUp(x, y) {
    switch (liveJs.state) {
        case 'PRESS': {
            // Short, stationary click — treat as click-on-avatar → GOTO.
            smSet('GOTO', 'press→click');
            liveJs.mousedownPos = null;
            break;
        }
        case 'DRAG': {
            // Release decision:
            // - within drag-cancel zone of avatar origin → cancel
            // - on menu ring (not yet implemented for selection) → log + IDLE
            // - elsewhere → fast-travel
            const origin = liveJs.mousedownAvatarPos;
            const distFromOrigin = origin ? smDistance(x, y, origin.x, origin.y) : 99999;
            if (distFromOrigin <= liveJs.dragCancelRadius) {
                smSet('IDLE', 'drag-cancel-in-origin-zone');
            } else {
                const dx = x - (origin ? origin.x : x);
                const dy = y - (origin ? origin.y : y);
                const angle = Math.atan2(dy, dx);
                console.log('[sigil-1] menu release angle=' + angle.toFixed(3) + ' radius=' + distFromOrigin.toFixed(0));
                // Sigil-1: no slices → default to fast-travel on any non-cancel release.
                startFastTravel(x, y);
                smSet('IDLE', 'drag-release→fast-travel');
            }
            liveJs.mousedownPos = null;
            liveJs.mousedownAvatarPos = null;
            break;
        }
        case 'GOTO': {
            if (!smIsOnAvatar(x, y)) {
                // Mousedown+up both off-avatar = fast-travel to release point.
                startFastTravel(x, y);
                smSet('IDLE', 'goto-release→fast-travel');
            }
            liveJs.mousedownPos = null;
            break;
        }
        default: break;
    }
}

function smHandleMouseMove(x, y) {
    if (liveJs.state === 'PRESS' && liveJs.mousedownPos) {
        const d = smDistance(x, y, liveJs.mousedownPos.x, liveJs.mousedownPos.y);
        if (d >= liveJs.dragThreshold) {
            smSet('DRAG', 'press+move≥threshold');
        }
    }
}

function smHandleCancel(reason) {
    if (liveJs.state === 'GOTO' || liveJs.state === 'DRAG' || liveJs.state === 'PRESS') {
        smSet('IDLE', reason);
        liveJs.mousedownPos = null;
        liveJs.mousedownAvatarPos = null;
    }
}

// Fast travel: duration = clamp(dist / 5000, 0.12, 0.3)s, easing easeOutQuart.
function easeOutQuart(t) { return 1 - Math.pow(1 - t, 4); }

function clampToVisibleBounds(x, y) {
    const displays = liveJs.displays;
    if (!displays || displays.length === 0) return { x, y };
    // Find the display whose visible_bounds contains the target, else clamp
    // to the nearest visible_bounds rect.
    let best = null, bestD = Infinity;
    for (const d of displays) {
        const vb = d.visible_bounds || d.bounds;
        if (!vb) continue;
        const inside = x >= vb.x && x < vb.x + vb.width
            && y >= vb.y && y < vb.y + vb.height;
        if (inside) return { x, y };
        const cx = Math.max(vb.x, Math.min(x, vb.x + vb.width - 1));
        const cy = Math.max(vb.y, Math.min(y, vb.y + vb.height - 1));
        const dd = (x - cx) ** 2 + (y - cy) ** 2;
        if (dd < bestD) { bestD = dd; best = { x: cx, y: cy }; }
    }
    return best || { x, y };
}

function startFastTravel(toX, toY) {
    const clamped = clampToVisibleBounds(toX, toY);
    toX = clamped.x; toY = clamped.y;
    const fromX = liveJs.avatarPos.valid ? liveJs.avatarPos.x : toX;
    const fromY = liveJs.avatarPos.valid ? liveJs.avatarPos.y : toY;
    const dist = Math.sqrt((toX - fromX) ** 2 + (toY - fromY) ** 2);
    const durationMs = Math.max(120, Math.min(300, dist / 5000 * 1000));
    liveJs.travel = {
        fromX, fromY, toX, toY,
        startMs: performance.now(),
        durationMs,
    };
    // Kick off ghost trails.
    state.isOmegaEnabled = true;
    state.omegaInterDimensional = true;
}

function tickFastTravel() {
    const t = liveJs.travel;
    if (!t) return;
    const elapsed = performance.now() - t.startMs;
    const u = Math.max(0, Math.min(1, elapsed / t.durationMs));
    const e = easeOutQuart(u);
    const x = t.fromX + (t.toX - t.fromX) * e;
    const y = t.fromY + (t.toY - t.fromY) * e;
    liveJs.avatarPos.x = x;
    liveJs.avatarPos.y = y;
    liveJs.avatarPos.valid = true;

    if (u >= 1) {
        // Landed. Snap cursor tracking to target so IDLE resumes from here.
        liveJs.currentCursor.x = t.toX;
        liveJs.currentCursor.y = t.toY;
        liveJs.cursorTarget.x = t.toX;
        liveJs.cursorTarget.y = t.toY;
        liveJs.travel = null;
        state.omegaInterDimensional = false;
        // Task 9: travel animation ended. State is already IDLE (set at
        // the mouseup that started the travel), so any deferred
        // wiki_page_changed reload now has its moment.
        flushReload();
    }
}

// Per-tick: in IDLE the avatar is parked — its position is fixed at its
// parked coordinate (spawn resolution or post-travel destination) until a
// state transition moves it. During fast-travel
// animation the state machine drives avatarPos. The cursor lerp tracks
// the latest cursor so GOTO-click math has a smoothed reference, but
// does not feed into IDLE. avatarPos is the source of truth for "where
// the avatar is" (hit-testing, menu origin, etc.).
function liveJsTick() {
    // Cursor smoothing only runs once we've seen at least one cursor
    // event; IDLE no longer depends on cursor data, so the rest of the
    // tick (scene position, hit frame) must proceed regardless.
    if (liveJs.currentCursor.valid && liveJs.cursorTarget.valid) {
        const a = liveJs.followAlpha;
        liveJs.currentCursor.x += (liveJs.cursorTarget.x - liveJs.currentCursor.x) * a;
        liveJs.currentCursor.y += (liveJs.cursorTarget.y - liveJs.currentCursor.y) * a;
    }

    if (liveJs.travel) {
        tickFastTravel(); // overrides avatarPos during travel
    } else if (liveJs.state === 'IDLE') {
        // Parked: avatarPos is not modified. currentCursor tracks for GOTO-click math.
    }

    if (liveJs.avatarPos.valid) {
        const p = screenToScene(liveJs.avatarPos.x, liveJs.avatarPos.y);
        setScenePosition(p.x, p.y);
    }

    // Drive avatar-hit frame every frame (fire-and-forget, same pattern as
    // Phase 3 draw.html). Flip interactive lazily — only push on change.
    if (liveJs.hitReady && liveJs.avatarPos.valid) {
        const half = liveJs.hitSize / 2;
        const wantInteractive =
            liveJs.state === 'PRESS' || liveJs.state === 'DRAG';
        const update = {
            id: 'avatar-hit',
            frame: [
                Math.round(liveJs.avatarPos.x - half),
                Math.round(liveJs.avatarPos.y - half),
                liveJs.hitSize,
                liveJs.hitSize,
            ],
        };
        if (wantInteractive !== liveJs.hitInteractive) {
            update.interactive = wantInteractive;
            liveJs.hitInteractive = wantInteractive;
        }
        postToHost('canvas.update', update);
    }

    drawLiveJsUi();
}

function drawLiveJsUi() {
    const ui = liveJs.ui;
    if (!ui) return;
    const ctx = ui.getContext('2d');
    ctx.clearRect(0, 0, ui.width, ui.height);

    if (liveJs.state === 'GOTO' && liveJs.avatarPos.valid) {
        // Placeholder goto-mode cue: dashed ring around avatar.
        ctx.beginPath();
        ctx.setLineDash([6, 6]);
        ctx.strokeStyle = 'rgba(180, 220, 255, 0.8)';
        ctx.lineWidth = 2;
        ctx.arc(liveJs.avatarPos.x, liveJs.avatarPos.y, liveJs.gotoRingRadius, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
    } else if (liveJs.state === 'DRAG' && liveJs.mousedownAvatarPos) {
        // Placeholder menu ring: solid circle at drag origin.
        ctx.beginPath();
        ctx.strokeStyle = 'rgba(255, 180, 220, 0.9)';
        ctx.lineWidth = 2;
        ctx.arc(liveJs.mousedownAvatarPos.x, liveJs.mousedownAvatarPos.y, liveJs.menuRingRadius, 0, Math.PI * 2);
        ctx.stroke();
        // Inner cancel zone visual.
        ctx.beginPath();
        ctx.strokeStyle = 'rgba(255, 180, 220, 0.35)';
        ctx.lineWidth = 1;
        ctx.arc(liveJs.mousedownAvatarPos.x, liveJs.mousedownAvatarPos.y, liveJs.dragCancelRadius, 0, Math.PI * 2);
        ctx.stroke();
    }
}

// Boot dispatch lives in the module script below so we can await the agent
// loader + first display_geometry broadcast before the scene is fully staged.
// See the `<script type="module">` block at the end of <body>.
//
// Expose the module-local `state` and `liveJs` bindings on `window` so the
// boot module can read/write them. Classic inline <script> `const` bindings
// do not hoist to the global object by default.
window.state = state;
window.liveJs = liveJs;
window.computeUnion = computeUnion;
window.unionSize = unionSize;
</script>
<script type="module">
// ============================================================
// LIVE-JS BOOT SEQUENCE (Task 6)
// ============================================================
// Load the agent wiki doc, apply appearance, await the first
// display_geometry snapshot from the AOS daemon, then resolve the spawn
// position (daemon-side lastPosition if present, else birthplace) and
// stamp it onto liveJs.avatarPos.
//
// The bundled inline <script> above has already defined init(), setupLiveJs,
// handleLiveJsMessage, the `liveJs` namespace, and `state`. This module
// script defers until the DOM + inline script have both loaded (that's the
// default for `type="module"`), so those symbols are guaranteed available
// via `window`.
// ============================================================

import { loadAgent } from './agent-loader.js';
import { applyAppearance } from './appearance.js';
import { resolveBirthplace } from './birthplace-resolver.js';
import moduleState from './state.js';
import { createPhenomena, animatePhenomena, updatePulsars, updateGammaRays, updateAccretion, updateNeutrinos, getTurbulence } from './phenomena.js';
window.createPhenomena = createPhenomena;
window.animatePhenomena = animatePhenomena;
window.updatePulsars = updatePulsars;
window.updateGammaRays = updateGammaRays;
window.updateAccretion = updateAccretion;
window.updateNeutrinos = updateNeutrinos;
window.getTurbulence = getTurbulence;

// The bundled inline <script> defines its own `state` singleton which owns
// the live Three.js object references (polyGroup, scene, renderer, etc).
// `appearance.js` imports the separate module-scope `state.js` singleton.
// Bridge the two so applyAppearance's writes land on the object the inline
// renderer actually reads from.
//
// Strategy:
//   - Before applyAppearance: copy scalar state from the inline bundled
//     `state` (window.state) into `moduleState` so applyAppearance's ??
//     fallbacks see current values, not the state.js defaults.
//   - After applyAppearance: copy every field applyAppearance wrote back
//     to window.state so the inline render loop reads the agent's values.
//   - Re-run the INLINE update hooks (phenomena counts etc.) against the
//     now-updated window.state to rebuild objects the module path does not own.
//     Geometry is owned by the module path: syncWindowStateToModule seeds
//     moduleState.polyGroup before applyAppearance, so geometry.js operates
//     on the real scene directly.
function syncWindowStateToModule() {
    for (const k of Object.keys(window.state)) {
        if (k in moduleState) moduleState[k] = window.state[k];
    }
}
function syncModuleStateToWindow() {
    // Write back every field applyAppearance is known to touch. Using a
    // property list rather than a blanket Object.assign avoids clobbering
    // window.state keys that carry inline-only Three.js object refs.
    const APPEARANCE_FIELDS = [
        // Size
        'avatarBase', 'avatarMin', 'avatarMax',
        // Omega
        'isOmegaEnabled', 'omegaGeometryType', 'omegaStellationFactor', 'omegaScale',
        'omegaOpacity', 'omegaEdgeOpacity', 'omegaIsMaskEnabled', 'omegaIsInteriorEdgesEnabled',
        'omegaIsSpecularEnabled', 'omegaCounterSpin', 'omegaLockPosition',
        'omegaInterDimensional', 'omegaGhostCount', 'omegaGhostMode', 'omegaGhostDuration',
        'omegaLagFactor',
        // Swarm
        'isSwarmEnabled', 'swarmCount', 'swarmGravity', 'swarmEventHorizon',
        'swarmTimeScale', 'isBlackHoleMode',
        // Grid
        'gridMode', 'grid3dRenderMode', 'grid3dDensity', 'grid3dRenderRadius',
        'grid3dSnowGlobe', 'grid3dShowProbe', 'grid3dRelativeMotion', 'grid3dTimeScale',
    ];
    for (const k of APPEARANCE_FIELDS) {
        if (k in moduleState) window.state[k] = moduleState[k];
    }
}
function rebuildInlineVisualsAfterAppearance() {
}

function awaitFirstDisplayGeometry() {
    // Promise resolves when the first `display_geometry` message lands in
    // handleLiveJsMessage — which stashes the snapshot on liveJs.displays
    // and, if this resolver is armed, fires it with the displays array.
    // Handles the race where the broadcast arrives between subscribe and
    // await: if `liveJs.displays` is already an array, resolve immediately.
    const liveJs = window.liveJs;
    if (!liveJs) return Promise.reject(new Error('liveJs namespace not initialized'));
    if (Array.isArray(liveJs.displays)) {
        return Promise.resolve(liveJs.displays);
    }
    return new Promise((resolve) => {
        liveJs._resolveFirstDisplayGeometry = resolve;
    });
}

async function boot() {
    const params = new URLSearchParams(window.location.search);
    const agentPath = params.get('agent') ?? 'sigil/agents/default';
    const currentAgentId = agentPath.split('/').pop(); // e.g. 'default'

    // 1. Start the scene. init() calls setupLiveJs() which opens the
    //    display_geometry/input_event subscription. We need the scene
    //    built before applyAppearance() can mutate meshes/materials,
    //    and the subscription open before awaitFirstDisplayGeometry().
    window.init();

    // 2. Fetch + parse the agent wiki doc. loadAgent is robust: any
    //    fetch/parse failure falls back to MINIMAL_DEFAULT.
    let agent;
    try {
        agent = await loadAgent(agentPath);
        console.log('[sigil] loaded agent:', agent.id, 'from', agentPath);
    } catch (e) {
        console.error('[sigil] loadAgent threw unexpectedly:', e);
        // loadAgent is supposed to not throw, but belt-and-suspenders.
        const mod = await import('./agent-loader.js');
        agent = { ...mod.MINIMAL_DEFAULT };
    }

    // 3. Apply appearance. applyAppearance writes into the module-scope
    //    state.js singleton (imported by appearance.js). Sync state in,
    //    apply, sync state back, then rebuild inline visuals so the live
    //    bundled renderer reflects the agent's appearance blob.
    try {
        syncWindowStateToModule();
        applyAppearance(agent.appearance);
        syncModuleStateToWindow();
        rebuildInlineVisualsAfterAppearance();
    } catch (e) {
        console.error('[sigil] applyAppearance pipeline threw:', e);
    }

    // 4. Await the first display_geometry broadcast, then resolve position.
    //    Subscription was opened inside init() → setupLiveJs().
    try {
        const displays = await awaitFirstDisplayGeometry();
        // Set currentAgentId early so that in-flight IDLE transitions
        // during boot (uncommon but possible) have a valid id to post under.
        const liveJs = window.liveJs;
        liveJs.currentAgentId = currentAgentId;
        const pos = await resolvePosition({ ...agent, id: currentAgentId }, displays);
        liveJs.avatarPos = { x: pos.x, y: pos.y, valid: true };
        liveJs.avatarSize = agent.instance.size;
        // Task 8 (foundation): snapshot union-of-displays for topology change detection
        if (typeof window.computeUnion === 'function') {
            liveJs.globalBoundsAtBoot = window.computeUnion(displays);
            liveJs.globalBounds = liveJs.globalBoundsAtBoot;
        }
        console.log('[sigil] position resolved:',
            'pos=(' + pos.x.toFixed(1) + ',' + pos.y.toFixed(1) + ')',
            'size=' + agent.instance.size,
            'agent=' + currentAgentId);
    } catch (e) {
        console.error('[sigil] position resolution failed:', e);
    }
}

// Request/response over the canvas IPC bridge to ask the daemon for the
// agent's lastPosition. Resolves with {x, y} if present, null if not, and
// null on timeout or malformed response. 250ms timeout is generous — the
// daemon's dispatch is synchronous on the main thread.
async function getLastPositionFromDaemon(agentId) {
    const requestId = 'lp-get-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8);
    return new Promise((resolve) => {
        let settled = false;
        const done = (value) => {
            if (settled) return;
            settled = true;
            clearTimeout(timer);
            // Best-effort cleanup of the one-shot response handler
            const idx = window.liveJs._lpWaiters?.indexOf?.(handler);
            if (idx > -1) window.liveJs._lpWaiters.splice(idx, 1);
            resolve(value);
        };
        const handler = (msg) => {
            if (msg?.type !== 'canvas.response') return;
            if (msg.request_id !== requestId) return;
            if (msg.status !== 'ok') { done(null); return; }
            const p = msg.position;
            if (!p || typeof p.x !== 'number' || typeof p.y !== 'number') { done(null); return; }
            done({ x: p.x, y: p.y });
        };
        window.liveJs._lpWaiters = window.liveJs._lpWaiters || [];
        window.liveJs._lpWaiters.push(handler);
        const timer = setTimeout(() => done(null), 250);
        postToHost('position.get', { key: agentId, request_id: requestId });
    });
}

// Resolve the avatar's initial position. Tries the daemon's lastPosition
// map first (populated during this daemon's lifetime by IDLE transitions);
// falls back to resolveBirthplace(agent.instance.birthplace, displays) for
// first-spawn-ever and post-daemon-restart cases.
async function resolvePosition(agent, displays) {
    try {
        const lp = await getLastPositionFromDaemon(agent.id);
        if (lp) return lp;
    } catch (e) {
        console.warn('[sigil] lastPosition lookup failed; falling back to birthplace:', e);
    }
    return resolveBirthplace(agent.instance.birthplace, displays);
}

// Expose a live-reload helper for the classic-script flushReload() in
// handleLiveJsMessage. Reloads the current agent doc, re-applies its
// appearance blob, and refreshes the inline renderer's visuals. Position
// is deliberately NOT re-resolved here — birthplace applies only at spawn,
// and lastPosition is the live coordinate, not a wiki-sourced value.
async function sigilReloadCurrentAgent() {
    const liveJs = window.liveJs;
    if (!liveJs || !liveJs.currentAgentId) {
        throw new Error('sigilReloadCurrentAgent: currentAgentId not set');
    }
    const agentPath = 'sigil/agents/' + liveJs.currentAgentId;
    const agent = await loadAgent(agentPath);
    syncWindowStateToModule();
    applyAppearance(agent.appearance);
    syncModuleStateToWindow();
    rebuildInlineVisualsAfterAppearance();
    liveJs.avatarSize = agent.instance.size;
    console.log('[sigil] live-reloaded agent:', liveJs.currentAgentId);
}
window.__sigilFlushReload = sigilReloadCurrentAgent;

import { createAuraObjects, computeAuraPosition, animateAura } from './aura.js';
window.createAuraObjects = createAuraObjects;
window.computeAuraPosition = computeAuraPosition;
window.animateAura = animateAura;

import { createParticleObjects, animateParticles, animateTrails, fireExplosion, fireSuperNova } from './particles.js';
window.createParticleObjects = createParticleObjects;
window.animateParticles = animateParticles;
window.animateTrails = animateTrails;
window.fireExplosion = fireExplosion;
window.fireSuperNova = fireSuperNova;

import { createLightning, animateLightning, updateLightningColors } from './lightning.js';
window.createLightning = createLightning;
window.animateLightning = animateLightning;
window.updateLightningColors = updateLightningColors;

import { createMagneticField, animateMagneticField, updateMagneticColors } from './magnetic.js';
window.createMagneticField = createMagneticField;
window.animateMagneticField = animateMagneticField;
window.updateMagneticColors = updateMagneticColors;

// Module scripts are deferred by default (run after DOMContentLoaded and
// after any preceding classic inline scripts). init() and liveJs will
// both be defined at this point.
boot();
</script>
</body>
