const simplex3D = /* glsl */ `
vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
vec4 permute(vec4 x) { return mod289(((x * 34.0) + 1.0) * x); }
vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }

float snoise(vec3 v) {
  const vec2 C = vec2(1.0 / 6.0, 1.0 / 3.0);
  const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);

  vec3 i  = floor(v + dot(v, C.yyy));
  vec3 x0 = v - i + dot(i, C.xxx);

  vec3 g = step(x0.yzx, x0.xyz);
  vec3 l = 1.0 - g;
  vec3 i1 = min(g.xyz, l.zxy);
  vec3 i2 = max(g.xyz, l.zxy);

  vec3 x1 = x0 - i1 + C.xxx;
  vec3 x2 = x0 - i2 + C.yyy;
  vec3 x3 = x0 - D.yyy;

  i = mod289(i);
  vec4 p = permute(permute(permute(
              i.z + vec4(0.0, i1.z, i2.z, 1.0))
            + i.y + vec4(0.0, i1.y, i2.y, 1.0))
            + i.x + vec4(0.0, i1.x, i2.x, 1.0)));

  float n_ = 0.142857142857;
  vec3 ns = n_ * D.wyz - D.xzx;

  vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
  vec4 x_ = floor(j * ns.z);
  vec4 y_ = floor(j - 7.0 * x_);

  vec4 x = x_ * ns.x + ns.yyyy;
  vec4 y = y_ * ns.x + ns.yyyy;
  vec4 h = 1.0 - abs(x) - abs(y);

  vec4 b0 = vec4(x.xy, y.xy);
  vec4 b1 = vec4(x.zw, y.zw);

  vec4 s0 = floor(b0) * 2.0 + 1.0;
  vec4 s1 = floor(b1) * 2.0 + 1.0;
  vec4 sh = -step(h, vec4(0.0));

  vec4 a0 = b0.xzyw + s0.xzyw * sh.xxyy;
  vec4 a1 = b1.xzyw + s1.xzyw * sh.zzww;

  vec3 p0 = vec3(a0.xy, h.x);
  vec3 p1 = vec3(a0.zw, h.y);
  vec3 p2 = vec3(a1.xy, h.z);
  vec3 p3 = vec3(a1.zw, h.w);

  vec4 norm = taylorInvSqrt(vec4(dot(p0, p0), dot(p1, p1), dot(p2, p2), dot(p3, p3)));
  p0 *= norm.x;
  p1 *= norm.y;
  p2 *= norm.z;
  p3 *= norm.w;

  vec4 m = max(0.5 - vec4(dot(x0, x0), dot(x1, x1), dot(x2, x2), dot(x3, x3)), 0.0);
  m = m * m;
  return 105.0 * dot(m * m, vec4(dot(p0, x0), dot(p1, x1), dot(p2, x2), dot(p3, x3)));
}
`;

const fbm = /* glsl */ `
float fbm(vec3 p, int octaves) {
  float value = 0.0;
  float amplitude = 0.5;
  float frequency = 1.0;

  for (int i = 0; i < 6; i++) {
    if (i >= octaves) break;
    value += amplitude * snoise(p * frequency);
    frequency *= 2.0;
    amplitude *= 0.5;
  }

  return value;
}
`;

// (from js/shaders/fresnel.js)

const fresnel = /* glsl */ `
float fresnelEdge(vec3 normal, vec3 viewDir, float power) {
  float f = abs(dot(normalize(normal), normalize(viewDir)));
  return pow(1.0 - clamp(f, 0.0, 1.0), power);
}

float limbDarkening(vec3 normal, vec3 viewDir, float power) {
  float cosAngle = max(dot(normalize(normal), normalize(viewDir)), 0.0);
  return pow(cosAngle, power);
}
`;

const skinVertexShader = /* glsl */ `
varying vec3 vPosition;
varying vec3 vNormal;
varying vec3 vWorldPosition;
varying vec2 vUv;

void main() {
  vPosition = position;
  vNormal = normalize(mat3(modelMatrix) * normal);
  vUv = uv;

  vec4 worldPosition = modelMatrix * vec4(position, 1.0);
  vWorldPosition = worldPosition.xyz;

  gl_Position = projectionMatrix * viewMatrix * worldPosition;
}
`;

const skinFragmentShader = /* glsl */ `
${simplex3D}
${fbm}
${fresnel}

uniform float time;
uniform float noiseScale;
uniform int noiseOctaves;
uniform float roughness;
uniform sampler2D colorRamp;
uniform int skinType;        // 0=rocky, 1=gas-giant, 2=ice, 3=volcanic, 4=solar
uniform vec3 lightPosition;
uniform float uOpacity;
uniform float uSpecular;

varying vec3 vPosition;
varying vec3 vNormal;
varying vec3 vWorldPosition;
varying vec2 vUv;

void main() {
  vec3 viewDir = normalize(cameraPosition - vWorldPosition);

  // -- Solar (type 4): self-luminous, no external lighting --
  if (skinType == 4) {
    vec3 noisePos = vPosition * noiseScale + vec3(time * 0.03, time * 0.021, 0.0);
    float noise = fbm(noisePos, 4);
    float largeCells = snoise(vPosition * noiseScale * 0.3 + vec3(time * 0.006));
    float surfaceBrightness = 0.7 + noise * 0.25 + largeCells * 0.15;
    float hotSpots = smoothstep(0.3, 0.6, noise) * 0.4;
    surfaceBrightness += hotSpots;

    vec3 baseColor = texture2D(colorRamp, vec2(0.5, 0.5)).rgb;
    vec3 hotColor = mix(baseColor, vec3(1.0), 0.5);
    vec3 coolColor = baseColor * 0.6;
    vec3 surfaceColor = mix(coolColor, hotColor, surfaceBrightness);

    float limb = limbDarkening(vNormal, viewDir, 0.6);
    surfaceColor *= (0.4 + 0.6 * limb);

    float edgeGlow = fresnelEdge(vNormal, viewDir, 3.0);
    surfaceColor += baseColor * edgeGlow * 0.3;

    gl_FragColor = vec4(surfaceColor, uOpacity);
    return;
  }

  // -- Planet types (0-3): externally lit --
  float noise = 0.0;

  if (skinType == 1) {
    float latitude = vPosition.y * 3.0;
    float bands = sin(latitude * 8.0 + snoise(vPosition * 2.0) * 0.5) * 0.5 + 0.5;
    float storms = smoothstep(0.4, 0.6, snoise(vPosition * noiseScale * 0.5 + vec3(time * 0.02, 0.0, 0.0)));
    noise = bands * 0.7 + storms * 0.3;
  } else if (skinType == 3) {
    float terrain = fbm(vPosition * noiseScale, 4);
    float cracks = 1.0 - smoothstep(0.0, 0.1, abs(terrain));
    noise = terrain * 0.5 + 0.5;
    if (cracks > 0.3) {
      noise = 0.95;
    }
  } else {
    noise = fbm(vPosition * noiseScale, noiseOctaves);
    noise = noise * 0.5 + 0.5;
    noise += snoise(vPosition * noiseScale * 8.0) * roughness * 0.1;
  }

  if (skinType == 2) {
    float polar = abs(vPosition.y) / max(length(vPosition), 0.001);
    float iceCap = smoothstep(0.5, 0.8, polar);
    noise = mix(noise, 1.0, iceCap);
  }

  noise = clamp(noise, 0.0, 1.0);
  vec3 surfaceColor = texture2D(colorRamp, vec2(noise, 0.5)).rgb;

  vec3 lightDir = normalize(lightPosition - vWorldPosition);
  float diffuse = max(dot(vNormal, lightDir), 0.0);

  vec3 halfDir = normalize(lightDir + viewDir);
  float spec = pow(max(dot(vNormal, halfDir), 0.0), 32.0) * 0.4 * uSpecular;

  float lighting = diffuse * 1.4 + spec;

  if (skinType == 3) {
    float terrain = fbm(vPosition * noiseScale, 4);
    float cracks = 1.0 - smoothstep(0.0, 0.08, abs(terrain));
    surfaceColor += vec3(1.0, 0.3, 0.0) * cracks * 2.0;
  }

  gl_FragColor = vec4(surfaceColor * lighting, uOpacity);
}
`;

function hexToRgba(hex, alpha) {
    let c;
    if (/^#([A-Fa-f0-9]{3}){1,2}$/.test(hex)) {
        c = hex.substring(1).split('');
        if (c.length === 3) {
            c = [c[0], c[0], c[1], c[1], c[2], c[2]];
        }
        c = '0x' + c.join('');
        return 'rgba(' + [(c >> 16) & 255, (c >> 8) & 255, c & 255].join(',') + ',' + alpha + ')';
    }
    return `rgba(255,255,255,${alpha})`;
}

function updateMaterialTexture(material, canvasDrawer) {
    const canvas = document.createElement('canvas');
    canvasDrawer(canvas, canvas.getContext('2d'));
    const newTexture = new THREE.CanvasTexture(canvas);
    if (material.map) material.map.dispose();
    material.map = newTexture;
    material.color.setHex(0xffffff);
    material.needsUpdate = true;
    return newTexture;
}

function drawAuraTexture(canvas, ctx, c1, c2, isCore) {
    canvas.width = 128; canvas.height = 128;
    const grad = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
    if (isCore) {
        grad.addColorStop(0, hexToRgba(c1, 1.0));
        grad.addColorStop(0.5, hexToRgba(c2, 0.4));
        grad.addColorStop(1, 'rgba(0,0,0,0)');
    } else {
        grad.addColorStop(0, hexToRgba(c1, 0.8));
        grad.addColorStop(0.5, hexToRgba(c2, 0.2));
        grad.addColorStop(1, 'rgba(0,0,0,0)');
    }
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 128, 128);
}

function drawPulsarTexture(canvas, ctx, c1, c2) {
    canvas.width = 16; canvas.height = 256;
    const grad = ctx.createLinearGradient(0, 0, 0, 256);
    grad.addColorStop(0, hexToRgba(c2, 0));
    grad.addColorStop(0.5, hexToRgba(c1, 1));
    grad.addColorStop(1, hexToRgba(c2, 0));
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 16, 256);
}

function drawGammaTexture(canvas, ctx, c1, c2) {
    canvas.width = 16; canvas.height = 256;
    const grad = ctx.createLinearGradient(0, 0, 0, 256);
    grad.addColorStop(0, hexToRgba(c2, 0));
    grad.addColorStop(0.3, hexToRgba(c2, 0.05));
    grad.addColorStop(0.5, hexToRgba(c1, 1));
    grad.addColorStop(0.7, hexToRgba(c2, 0.05));
    grad.addColorStop(1, hexToRgba(c2, 0));
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 16, 256);
}

    grad.addColorStop(1, hexToRgba(c2, 0));
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 512, 512);
}

function updateFaceVertexColors() {
    if (!state.coreMesh) return;
    if (state.currentSkin !== 'none' && state.skinMaterial) { updateSkinColorRamp(false); return; }
    const geo = state.coreMesh.geometry;
    const count = geo.attributes.position.count;
    if (!geo.attributes.color || geo.attributes.color.count !== count) {
        geo.setAttribute('color', new THREE.BufferAttribute(new Float32Array(count * 3), 3));
    }
    const col = geo.attributes.color;
    geo.computeBoundingBox();
    const min = geo.boundingBox.min.y;
    const range = (geo.boundingBox.max.y - min) || 1;
    const c1 = new THREE.Color(state.colors.face[0]);
    const c2 = new THREE.Color(state.colors.face[1]);
    const tC = new THREE.Color();
    for (let i = 0; i < count; i++) {
        tC.copy(c1).lerp(c2, (geo.attributes.position.getY(i) - min) / range);
        col.setXYZ(i, tC.r, tC.g, tC.b);
    }
    col.needsUpdate = true;
    state.coreMesh.material.vertexColors = true;
    state.coreMesh.material.color.setHex(0xffffff);
    if (state.coreMesh.material.map) { state.coreMesh.material.map.dispose(); state.coreMesh.material.map = null; }
    state.coreMesh.material.needsUpdate = true;
}

function updateEdgeVertexColors() {
    if (!state.wireframeMesh) return;
    const geo = state.wireframeMesh.geometry;
    const count = geo.attributes.position.count;
    if (!geo.attributes.color || geo.attributes.color.count !== count) {
        geo.setAttribute('color', new THREE.BufferAttribute(new Float32Array(count * 3), 3));
    }
    const col = geo.attributes.color;
    geo.computeBoundingBox();
    const min = geo.boundingBox.min.y;
    const range = (geo.boundingBox.max.y - min) || 1;
    const c1 = new THREE.Color(state.colors.edge[0]);
    const c2 = new THREE.Color(state.colors.edge[1]);
    const tC = new THREE.Color();
    for (let i = 0; i < count; i++) {
        tC.copy(c1).lerp(c2, (geo.attributes.position.getY(i) - min) / range);
        col.setXYZ(i, tC.r, tC.g, tC.b);
    }
    col.needsUpdate = true;
    state.wireframeMesh.material.vertexColors = true;
    state.wireframeMesh.material.color.setHex(0xffffff);
    state.wireframeMesh.material.needsUpdate = true;
}

function updateAllColors() {
    updateFaceVertexColors();
    updateEdgeVertexColors();

    // Update grid colors (grid not used in live mode, skip if missing)
    if (state.gridHelper && state.gridHelper.visible) {
        const pos = state.gridHelper.geometry.attributes.basePosition;
        const col = state.gridHelper.geometry.attributes.color;
        const c1 = new THREE.Color(state.colors.grid[0]);
        const c2 = new THREE.Color(state.colors.grid[1]);
        const tC = new THREE.Color();
        for (let i = 0; i < pos.count; i++) {
            let dist = Math.sqrt(Math.pow(pos.getX(i), 2) + Math.pow(pos.getY(i), 2));
            tC.copy(c1).lerp(c2, Math.min(dist / 50.0, 1.0));
            col.setXYZ(i, tC.r, tC.g, tC.b);
        }
        col.needsUpdate = true;
    }

    // Point light
    state.pointLight.color.copy(
        new THREE.Color(state.colors.face[0]).lerp(new THREE.Color(state.colors.face[1]), 0.5)
    );

    // Path line
    if (state.pathLine) state.pathLine.material.color.copy(new THREE.Color(state.colors.edge[0]));

    // Aura textures (guarded — refs live in module state after aura.js migration)
    if (state.glowSprite) {
        updateMaterialTexture(state.glowSprite.material, (canv, ctx) =>
            drawAuraTexture(canv, ctx, state.colors.aura[0], state.colors.aura[1], false));
        let coreTex = updateMaterialTexture(state.coreSprite.material, (canv, ctx) =>
            drawAuraTexture(canv, ctx, state.colors.aura[0], state.colors.aura[1], true));
        updateMaterialTexture(state.chargeSpheroid.material, (canv, ctx) =>
            drawAuraTexture(canv, ctx, '#ffffff', state.colors.aura[0], true));
        state.trailSprites.forEach(s => s.material.map = coreTex);
    }

    // Phenomena textures (guarded — refs live in module state after phenomena.js migration)
    if (state.beamMat) {
        updateMaterialTexture(state.beamMat, (canv, ctx) =>
            drawPulsarTexture(canv, ctx, state.colors.pulsar[0], state.colors.pulsar[1]));
        updateMaterialTexture(state.gammaBeamMat, (canv, ctx) =>
            drawGammaTexture(canv, ctx, state.colors.gamma[0], state.colors.gamma[1]));
        updateMaterialTexture(state.diskMat, (canv, ctx) =>
            drawAccretionTexture(canv, ctx, state.colors.accretion[0], state.colors.accretion[1]));
        updateMaterialTexture(state.neutrinoMat, (canv, ctx) =>
            drawAuraTexture(canv, ctx, state.colors.neutrino[0], state.colors.neutrino[1], true));
    }

    // Lightning, magnetic, omega colors
    updateLightningColors();
    updateMagneticColors();
    updateOmegaColors();
}

// === SKINS ===
// (from js/skins.js)

const SKIN_TYPE_MAP = {
    'rocky': 0,
    'gas-giant': 1,
    'ice': 2,
    'volcanic': 3,
    'solar': 4
};

function createColorRampTexture(hex1, hex2) {
    const data = new Uint8Array(256 * 4);
    const c1 = new THREE.Color(hex1);
    const c2 = new THREE.Color(hex2);
    const tmp = new THREE.Color();

    for (let i = 0; i < 256; i++) {
        const t = i / 255;
        tmp.copy(c1).lerp(c2, t);
        data[i * 4 + 0] = Math.round(tmp.r * 255);
        data[i * 4 + 1] = Math.round(tmp.g * 255);
        data[i * 4 + 2] = Math.round(tmp.b * 255);
        data[i * 4 + 3] = 255;
    }

    const tex = new THREE.DataTexture(data, 256, 1, THREE.RGBAFormat);
    tex.minFilter = THREE.LinearFilter;
    tex.magFilter = THREE.LinearFilter;
    tex.needsUpdate = true;
    return tex;
}

function updateSkinColorRamp(isOmega) {
    const ramp = isOmega ? state.omegaSkinColorRamp : state.skinColorRamp;
    if (!ramp) return;

    const colors = isOmega ? state.colors.omegaFace : state.colors.face;
    const c1 = new THREE.Color(colors[0]);
    const c2 = new THREE.Color(colors[1]);
    const tmp = new THREE.Color();
    const data = ramp.image.data;

    for (let i = 0; i < 256; i++) {
        const t = i / 255;
        tmp.copy(c1).lerp(c2, t);
        data[i * 4 + 0] = Math.round(tmp.r * 255);
        data[i * 4 + 1] = Math.round(tmp.g * 255);
        data[i * 4 + 2] = Math.round(tmp.b * 255);
    }
    ramp.needsUpdate = true;
}

function createSkinMaterial(skinName, faceColors, opacity, isSpecular) {
    const skinType = SKIN_TYPE_MAP[skinName];
    if (skinType === undefined) return null;

    const colorRamp = createColorRampTexture(faceColors[0], faceColors[1]);

    const material = new THREE.ShaderMaterial({
        uniforms: {
            time: { value: 0.0 },
            noiseScale: { value: 3.0 },
            noiseOctaves: { value: 4 },
            roughness: { value: 0.3 },
            colorRamp: { value: colorRamp },
            skinType: { value: skinType },
            lightPosition: { value: new THREE.Vector3(5, 5, 5) },
            uOpacity: { value: opacity },
            uSpecular: { value: isSpecular ? 1.0 : 0.0 }
        },
        vertexShader: skinVertexShader,
        fragmentShader: skinFragmentShader,
        transparent: opacity < 0.99,
        depthWrite: opacity >= 0.99,
        side: opacity >= 0.99 ? THREE.FrontSide : THREE.DoubleSide,
        polygonOffset: true,
        polygonOffsetFactor: 1,
        polygonOffsetUnits: 1
    });

    return { material, colorRamp };
}

function applySkin(skinName, isOmega) {
    const mesh = isOmega ? state.omegaCoreMesh : state.coreMesh;
    if (!mesh) return;

    if (isOmega) {
        state.omegaSkin = skinName;
    } else {
        state.currentSkin = skinName;
    }

    if (skinName === 'none') {
        const oldMat = isOmega ? state.omegaSkinMaterial : state.skinMaterial;
        const oldRamp = isOmega ? state.omegaSkinColorRamp : state.skinColorRamp;
        if (oldMat) oldMat.dispose();
        if (oldRamp) oldRamp.dispose();

        if (isOmega) {
            state.omegaSkinMaterial = null;
            state.omegaSkinColorRamp = null;
        } else {
            state.skinMaterial = null;
            state.skinColorRamp = null;
        }

        const opacity = isOmega ? state.omegaOpacity : state.currentOpacity;
        const specEnabled = isOmega ? state.omegaIsSpecularEnabled : state.isSpecularEnabled;
        const isSolid = opacity >= 0.99;
        const newMat = new THREE.MeshPhongMaterial({
            transparent: !isSolid,
            opacity: opacity,
            shininess: specEnabled ? 80 : 0,
            specular: specEnabled ? new THREE.Color(0x333333) : new THREE.Color(0x000000),
            side: isSolid ? THREE.FrontSide : THREE.DoubleSide,
            depthWrite: isSolid,
            polygonOffset: true,
            polygonOffsetFactor: 1,
            polygonOffsetUnits: 1
        });
        mesh.material = newMat;
        return;
    }

    const opacity = isOmega ? state.omegaOpacity : state.currentOpacity;
    const specEnabled = isOmega ? state.omegaIsSpecularEnabled : state.isSpecularEnabled;
    const faceColors = isOmega ? state.colors.omegaFace : state.colors.face;

    const result = createSkinMaterial(skinName, faceColors, opacity, specEnabled);
    if (!result) return;

    const oldMat = mesh.material;
    if (oldMat) oldMat.dispose();
    const oldRamp = isOmega ? state.omegaSkinColorRamp : state.skinColorRamp;
    if (oldRamp) oldRamp.dispose();

    mesh.material = result.material;

    if (isOmega) {
        state.omegaSkinMaterial = result.material;
        state.omegaSkinColorRamp = result.colorRamp;
    } else {
        state.skinMaterial = result.material;
        state.skinColorRamp = result.colorRamp;
    }
}

function animateSkins(dt) {
    [state.skinMaterial, state.omegaSkinMaterial].forEach(mat => {
        if (!mat) return;
        mat.uniforms.time.value += dt;
        mat.uniforms.lightPosition.value.set(5, 5, 5);
    });
}

// === GEOMETRY ===
// (from js/geometry.js)

function createStellatedGeometry(baseGeometry, factor) {
    const nonIndexed = baseGeometry.toNonIndexed();
    if (Math.abs(factor) < 0.01) { nonIndexed.computeVertexNormals(); return nonIndexed; }
    const positionAttribute = nonIndexed.getAttribute('position');
    const count = positionAttribute.count;
    const newVertices = [];
    const vA = new THREE.Vector3(), vB = new THREE.Vector3(), vC = new THREE.Vector3();
    const centroid = new THREE.Vector3(), normal = new THREE.Vector3();
    const cb = new THREE.Vector3(), ab = new THREE.Vector3();

    for (let i = 0; i < count; i += 3) {
        vA.fromBufferAttribute(positionAttribute, i);
        vB.fromBufferAttribute(positionAttribute, i + 1);
        vC.fromBufferAttribute(positionAttribute, i + 2);
        centroid.copy(vA).add(vB).add(vC).divideScalar(3);
        cb.subVectors(vC, vB); ab.subVectors(vA, vB);
        normal.crossVectors(cb, ab).normalize();
        const peak = new THREE.Vector3().copy(centroid).add(normal.multiplyScalar(factor));

        newVertices.push(vA.x, vA.y, vA.z, vB.x, vB.y, vB.z, peak.x, peak.y, peak.z);
        newVertices.push(vB.x, vB.y, vB.z, vC.x, vC.y, vC.z, peak.x, peak.y, peak.z);
        newVertices.push(vC.x, vC.y, vC.z, vA.x, vA.y, vA.z, peak.x, peak.y, peak.z);
    }
    const stellatedGeometry = new THREE.BufferGeometry();
    stellatedGeometry.setAttribute('position', new THREE.Float32BufferAttribute(newVertices, 3));
    stellatedGeometry.computeVertexNormals();
    return stellatedGeometry;
}

function createTetartoid(size, a, b, c) {
    const params = [Math.abs(a), Math.abs(b), Math.abs(c)].sort((x, y) => x - y);
    const pa = params[0], pb = params[1], pc = params[2];

    const n  = pa * pa * pc - pb * pc * pc;
    const d1 = pa * pa - pa * pb + pb * pb + pa * pc - 2 * pb * pc;
    const d2 = pa * pa + pa * pb + pb * pb - pa * pc - 2 * pb * pc;

    if (Math.abs(n * d1 * d2) < 1e-10) {
        return new THREE.DodecahedronGeometry(size, 0);
    }

    const r2 = n / d1;
    const r3 = n / d2;

    const seed = [
        [pa, pb, pc],
        [-pa, -pb, pc],
        [-r2, -r2, r2],
        [-pc, -pa, pb],
        [-r3, r3, r3],
    ];

    const rotations = [
        ([x, y, z]) => [ x,  y,  z],
        ([x, y, z]) => [-x, -y,  z],
        ([x, y, z]) => [-x,  y, -z],
        ([x, y, z]) => [ x, -y, -z],
        ([x, y, z]) => [ z,  x,  y],
        ([x, y, z]) => [-z, -x,  y],
        ([x, y, z]) => [-z,  x, -y],
        ([x, y, z]) => [ z, -x, -y],
        ([x, y, z]) => [ y,  z,  x],
        ([x, y, z]) => [-y,  z, -x],
        ([x, y, z]) => [ y, -z, -x],
        ([x, y, z]) => [-y, -z,  x],
    ];

    const faces = [];
    for (const rot of rotations) {
        faces.push(seed.map(v => rot(v)));
    }

    const EPS = 1e-8;
    const uniqueVerts = [];
    const vertIndex = new Map();

    function getVertIndex(v) {
        const key = v.map(c => Math.round(c / EPS) * EPS).join(',');
        if (vertIndex.has(key)) return vertIndex.get(key);
        const idx = uniqueVerts.length;
        uniqueVerts.push(v);
        vertIndex.set(key, idx);
        return idx;
    }

    const faceIndices = [];
    for (const face of faces) {
        faceIndices.push(face.map(v => getVertIndex(v)));
    }

    const positions = [];
    for (const fi of faceIndices) {
        for (let t = 1; t < 4; t++) {
            const v0 = uniqueVerts[fi[0]];
            const v1 = uniqueVerts[fi[t]];
            const v2 = uniqueVerts[fi[t + 1]];
            positions.push(v0[0], v0[1], v0[2]);
            positions.push(v1[0], v1[1], v1[2]);
            positions.push(v2[0], v2[1], v2[2]);
        }
    }

    let maxR = 0;
    for (const v of uniqueVerts) {
        const r = Math.sqrt(v[0] * v[0] + v[1] * v[1] + v[2] * v[2]);
        if (r > maxR) maxR = r;
    }
    const scale = maxR > 0 ? size / maxR : size;
    for (let i = 0; i < positions.length; i++) {
        positions[i] *= scale;
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    geo.computeVertexNormals();
    return geo;
}

function updateGeometry(type) {
    if (state.coreMesh) state.polyGroup.remove(state.coreMesh);
    if (state.wireframeMesh) state.polyGroup.remove(state.wireframeMesh);
    if (state.depthMesh) state.polyGroup.remove(state.depthMesh);

    let baseGeometry;
    const size = 1.0;
    switch (type) {
        case 4: baseGeometry = new THREE.TetrahedronGeometry(size); break;
        case 8: baseGeometry = new THREE.OctahedronGeometry(size); break;
        case 12: baseGeometry = new THREE.DodecahedronGeometry(size); break;
        case 20: baseGeometry = new THREE.IcosahedronGeometry(size); break;
        case 90: baseGeometry = createTetartoid(size, state.tetartoidA, state.tetartoidB, state.tetartoidC); break;
        case 91: baseGeometry = new THREE.TorusKnotGeometry(size * 0.6, size * 0.25, 64, 8); break;
        case 92: baseGeometry = new THREE.TorusGeometry(size * state.torusRadius, size * state.torusTube, 32, 48, state.torusArc * Math.PI * 2); break;
        case 93: baseGeometry = new THREE.CylinderGeometry(size * state.cylinderTopRadius, size * state.cylinderBottomRadius, size * state.cylinderHeight, state.cylinderSides); break;
        case 100: baseGeometry = new THREE.SphereGeometry(size, 32, 32); break;
        default: baseGeometry = new THREE.BoxGeometry(size * state.boxWidth, size * state.boxHeight, size * state.boxDepth); break;
    }

    const finalGeometry = createStellatedGeometry(baseGeometry, state.stellationFactor);

    const depthMat = new THREE.MeshBasicMaterial({
        colorWrite: false, side: THREE.FrontSide, depthWrite: true,
        polygonOffset: true, polygonOffsetFactor: 1, polygonOffsetUnits: 1
    });
    state.depthMesh = new THREE.Mesh(finalGeometry, depthMat);
    state.depthMesh.renderOrder = 2;
    state.depthMesh.visible = !state.isInteriorEdgesEnabled;
    state.polyGroup.add(state.depthMesh);

    const isSolid = state.currentOpacity >= 0.99;
    const coreMat = new THREE.MeshPhongMaterial({
        transparent: !isSolid, opacity: state.currentOpacity,
        shininess: state.isSpecularEnabled ? 80 : 0,
        specular: state.isSpecularEnabled ? new THREE.Color(0x333333) : new THREE.Color(0x000000),
        side: isSolid ? THREE.FrontSide : THREE.DoubleSide,
        depthWrite: isSolid,
        polygonOffset: true, polygonOffsetFactor: 1, polygonOffsetUnits: 1
    });
    state.coreMesh = new THREE.Mesh(finalGeometry, coreMat);
    state.coreMesh.renderOrder = 3;
    state.coreMesh.visible = !state.isMaskEnabled;
    state.polyGroup.add(state.coreMesh);

    const edgeGeo = new THREE.EdgesGeometry(finalGeometry);
    const edgeMat = new THREE.LineBasicMaterial({
        linewidth: 2, depthTest: true, transparent: true, opacity: state.currentEdgeOpacity
    });
    state.wireframeMesh = new THREE.LineSegments(edgeGeo, edgeMat);
    state.wireframeMesh.renderOrder = 4;
    state.polyGroup.add(state.wireframeMesh);

    updateFaceVertexColors();
    updateEdgeVertexColors();
    if (state.currentSkin !== 'none') applySkin(state.currentSkin, false);
}

function updateOmegaGeometry(type) {
    if (state.omegaCoreMesh) state.omegaGroup.remove(state.omegaCoreMesh);
    if (state.omegaWireframeMesh) state.omegaGroup.remove(state.omegaWireframeMesh);
    if (state.omegaDepthMesh) state.omegaGroup.remove(state.omegaDepthMesh);

    let baseGeometry;
    const size = 1.0;
    switch (type) {
        case 4: baseGeometry = new THREE.TetrahedronGeometry(size); break;
        case 8: baseGeometry = new THREE.OctahedronGeometry(size); break;
        case 12: baseGeometry = new THREE.DodecahedronGeometry(size); break;
        case 20: baseGeometry = new THREE.IcosahedronGeometry(size); break;
        case 90: baseGeometry = createTetartoid(size, state.tetartoidA, state.tetartoidB, state.tetartoidC); break;
        case 91: baseGeometry = new THREE.TorusKnotGeometry(size * 0.6, size * 0.25, 64, 8); break;
        case 92: baseGeometry = new THREE.TorusGeometry(size * state.torusRadius, size * state.torusTube, 32, 48, state.torusArc * Math.PI * 2); break;
        case 93: baseGeometry = new THREE.CylinderGeometry(size * state.cylinderTopRadius, size * state.cylinderBottomRadius, size * state.cylinderHeight, state.cylinderSides); break;
        case 100: baseGeometry = new THREE.SphereGeometry(size, 32, 32); break;
        default: baseGeometry = new THREE.BoxGeometry(size * state.boxWidth, size * state.boxHeight, size * state.boxDepth); break;
    }

    const finalGeometry = createStellatedGeometry(baseGeometry, state.omegaStellationFactor);

    const depthMat = new THREE.MeshBasicMaterial({
        colorWrite: false, side: THREE.FrontSide, depthWrite: true,
        polygonOffset: true, polygonOffsetFactor: 1, polygonOffsetUnits: 1
    });
    state.omegaDepthMesh = new THREE.Mesh(finalGeometry, depthMat);
    state.omegaDepthMesh.renderOrder = 2;
    state.omegaDepthMesh.visible = !state.omegaIsInteriorEdgesEnabled;
    state.omegaGroup.add(state.omegaDepthMesh);

    const isSolid = state.omegaOpacity >= 0.99;
    const coreMat = new THREE.MeshPhongMaterial({
        transparent: !isSolid, opacity: state.omegaOpacity,
        shininess: state.omegaIsSpecularEnabled ? 80 : 0,
        specular: state.omegaIsSpecularEnabled ? new THREE.Color(0x333333) : new THREE.Color(0x000000),
        side: isSolid ? THREE.FrontSide : THREE.DoubleSide,
        depthWrite: isSolid,
        polygonOffset: true, polygonOffsetFactor: 1, polygonOffsetUnits: 1
    });
    state.omegaCoreMesh = new THREE.Mesh(finalGeometry, coreMat);
    state.omegaCoreMesh.renderOrder = 3;
    state.omegaCoreMesh.visible = !state.omegaIsMaskEnabled;
    state.omegaGroup.add(state.omegaCoreMesh);

    const edgeGeo = new THREE.EdgesGeometry(finalGeometry);
    const edgeMat = new THREE.LineBasicMaterial({
        linewidth: 2, depthTest: true, transparent: true, opacity: state.omegaEdgeOpacity
    });
    state.omegaWireframeMesh = new THREE.LineSegments(edgeGeo, edgeMat);
    state.omegaWireframeMesh.renderOrder = 4;
    state.omegaGroup.add(state.omegaWireframeMesh);

    _updateOmegaFaceVertexColors();
    _updateOmegaEdgeVertexColors();
    if (state.omegaSkin !== 'none') applySkin(state.omegaSkin, true);
}

function _updateOmegaFaceVertexColors() {
    if (!state.omegaCoreMesh) return;
    if (state.omegaSkin !== 'none' && state.omegaSkinMaterial) { updateSkinColorRamp(true); return; }
    const geo = state.omegaCoreMesh.geometry;
    const count = geo.attributes.position.count;
    if (!geo.attributes.color || geo.attributes.color.count !== count) {
        geo.setAttribute('color', new THREE.BufferAttribute(new Float32Array(count * 3), 3));
    }
    const col = geo.attributes.color;
    geo.computeBoundingBox();
    const min = geo.boundingBox.min.y;
    const range = (geo.boundingBox.max.y - min) || 1;
    const c1 = new THREE.Color(state.colors.omegaFace[0]);
    const c2 = new THREE.Color(state.colors.omegaFace[1]);
    const tC = new THREE.Color();
    for (let i = 0; i < count; i++) {
        tC.copy(c1).lerp(c2, (geo.attributes.position.getY(i) - min) / range);
        col.setXYZ(i, tC.r, tC.g, tC.b);
    }
    col.needsUpdate = true;
    state.omegaCoreMesh.material.vertexColors = true;
    state.omegaCoreMesh.material.color.setHex(0xffffff);
    if (state.omegaCoreMesh.material.map) { state.omegaCoreMesh.material.map.dispose(); state.omegaCoreMesh.material.map = null; }
    state.omegaCoreMesh.material.needsUpdate = true;
}

function _updateOmegaEdgeVertexColors() {
    if (!state.omegaWireframeMesh) return;
    const geo = state.omegaWireframeMesh.geometry;
    const count = geo.attributes.position.count;
    if (!geo.attributes.color || geo.attributes.color.count !== count) {
        geo.setAttribute('color', new THREE.BufferAttribute(new Float32Array(count * 3), 3));
    }
    const col = geo.attributes.color;
    geo.computeBoundingBox();
    const min = geo.boundingBox.min.y;
    const range = (geo.boundingBox.max.y - min) || 1;
    const c1 = new THREE.Color(state.colors.omegaEdge[0]);
    const c2 = new THREE.Color(state.colors.omegaEdge[1]);
    const tC = new THREE.Color();
    for (let i = 0; i < count; i++) {
        tC.copy(c1).lerp(c2, (geo.attributes.position.getY(i) - min) / range);
        col.setXYZ(i, tC.r, tC.g, tC.b);
    }
    col.needsUpdate = true;
    state.omegaWireframeMesh.material.vertexColors = true;
    state.omegaWireframeMesh.material.color.setHex(0xffffff);
    state.omegaWireframeMesh.material.needsUpdate = true;
}

// === OMEGA ===
// (from js/omega.js)

const _omegaLastPos = new THREE.Vector3();
const _omegaCounterSpinAxis = new THREE.Vector3(0.5, 1.0, 0).normalize();
let _omegaLastPosInitialized = false;
let _omegaWasCounterSpin = false;
let _omegaCounterSpinAngle = 0;

function createOmega() {
    state.omegaGroup = new THREE.Group();
    state.omegaGroup.visible = false;
    state.scene.add(state.omegaGroup);

    updateOmegaGeometry(state.omegaGeometryType);

    state.omegaGhosts = [];
}

function animateOmega(dt) {
    if (!state.omegaGroup) return;

    if (!state.isOmegaEnabled) {
        state.omegaGroup.visible = false;
        _cleanupAllGhosts();
        _omegaLastPosInitialized = false;
        return;
    }
    state.omegaGroup.visible = true;

    state.omegaGroup.scale.setScalar(state.omegaScale * state.z_depth * state.novaScale);

    if (state.omegaInterDimensional) {
        state.omegaGroup.position.lerp(state.polyGroup.position, state.omegaLagFactor);
    } else {
        state.omegaGroup.position.copy(state.polyGroup.position);
    }

    if (state.omegaLockPosition) {
        _omegaWasCounterSpin = false;
    } else if (state.omegaCounterSpin) {
        if (!_omegaWasCounterSpin) {
            _omegaCounterSpinAngle = 0;
            _omegaWasCounterSpin = true;
        }
        _omegaCounterSpinAngle -= state.idleSpinSpeed;
        state.omegaGroup.quaternion.setFromAxisAngle(_omegaCounterSpinAxis, _omegaCounterSpinAngle);
    } else {
        state.omegaGroup.quaternion.copy(state.polyGroup.quaternion);
        _omegaWasCounterSpin = false;
    }

    if (state.omegaInterDimensional) {
        _animateGhosts(dt);
    } else {
        _cleanupAllGhosts();
    }
}

function _animateGhosts(dt) {
    if (!_omegaLastPosInitialized) {
        _omegaLastPos.copy(state.omegaGroup.position);
        _omegaLastPosInitialized = true;
    }
    const delta = state.omegaGroup.position.distanceTo(_omegaLastPos);
    _omegaLastPos.copy(state.omegaGroup.position);

    if (delta > 0.01) {
        state.omegaGhostTimer -= dt;
        if (state.omegaGhostTimer <= 0) {
            _spawnGhost();
            const interval = state.omegaGhostDuration / Math.max(state.omegaGhostCount, 1);
            state.omegaGhostTimer = interval;
        }
    }

    for (let i = state.omegaGhosts.length - 1; i >= 0; i--) {
        const ghost = state.omegaGhosts[i];
        ghost.life -= dt;

        if (ghost.life <= 0) {
            state.scene.remove(ghost.mesh);
            ghost.mesh.geometry.dispose();
            ghost.mesh.material.dispose();
            state.omegaGhosts.splice(i, 1);
            continue;
        }

        const progress = ghost.life / ghost.maxLife;

        switch (state.omegaGhostMode) {
            case 'fade':
                ghost.mesh.material.opacity = progress;
                break;

            case 'shrink':
                ghost.mesh.scale.setScalar(ghost.startScale * progress);
                break;

            case 'edgeScatter': {
                ghost.mesh.material.opacity = progress;
                const positions = ghost.mesh.geometry.attributes.position.array;
                const orig = ghost.originalPositions;
                const scatterAmount = 2.0;
                const t = 1 - progress;
                for (let v = 0; v < positions.length; v += 3) {
                    positions[v]     = orig[v]     + (orig[v]     - ghost.centroid.x) * t * scatterAmount;
                    positions[v + 1] = orig[v + 1] + (orig[v + 1] - ghost.centroid.y) * t * scatterAmount;
                    positions[v + 2] = orig[v + 2] + (orig[v + 2] - ghost.centroid.z) * t * scatterAmount;
                }
                ghost.mesh.geometry.attributes.position.needsUpdate = true;
                break;
            }

            case 'vertexDissolve': {
                ghost.mesh.material.opacity = progress;
                const positions = ghost.mesh.geometry.attributes.position.array;
                const orig = ghost.originalPositions;
                const jitterAmount = 0.5;
                const t = 1 - progress;
                for (let v = 0; v < positions.length; v += 3) {
                    positions[v]     = orig[v]     + (Math.random() - 0.5) * jitterAmount * t;
                    positions[v + 1] = orig[v + 1] + (Math.random() - 0.5) * jitterAmount * t;
                    positions[v + 2] = orig[v + 2] + (Math.random() - 0.5) * jitterAmount * t;
                }
                ghost.mesh.geometry.attributes.position.needsUpdate = true;
                break;
            }

            case 'scaleWarp': {
                ghost.mesh.material.opacity = progress;
                const t = 1 - progress;
                const stretchFactor = 1 + t * 2;
                const compressFactor = 1 / Math.sqrt(stretchFactor);
                const axis = ghost.randomAxis;
                const sx = 1 + Math.abs(axis.x) * (stretchFactor - 1) + (1 - Math.abs(axis.x)) * (compressFactor - 1);
                const sy = 1 + Math.abs(axis.y) * (stretchFactor - 1) + (1 - Math.abs(axis.y)) * (compressFactor - 1);
                const sz = 1 + Math.abs(axis.z) * (stretchFactor - 1) + (1 - Math.abs(axis.z)) * (compressFactor - 1);
                ghost.mesh.scale.set(
                    ghost.startScale * sx,
                    ghost.startScale * sy,
                    ghost.startScale * sz
                );
                break;
            }

            default:
                ghost.mesh.material.opacity = progress;
                break;
        }
    }

    while (state.omegaGhosts.length > state.omegaGhostCount) {
        const oldest = state.omegaGhosts.shift();
        state.scene.remove(oldest.mesh);
        oldest.mesh.geometry.dispose();
        oldest.mesh.material.dispose();
    }
}

function _spawnGhost() {
    if (!state.omegaWireframeMesh) return;

    const ghostGeo = state.omegaWireframeMesh.geometry.clone();
    const originalPositions = new Float32Array(ghostGeo.attributes.position.array);

    let cx = 0, cy = 0, cz = 0;
    const posCount = originalPositions.length / 3;
    for (let i = 0; i < originalPositions.length; i += 3) {
        cx += originalPositions[i];
        cy += originalPositions[i + 1];
        cz += originalPositions[i + 2];
    }
    cx /= posCount;
    cy /= posCount;
    cz /= posCount;

    const ghostMat = new THREE.LineBasicMaterial({
        color: new THREE.Color(state.colors.omegaEdge[0]),
        transparent: true,
        opacity: 1.0,
        depthWrite: false,
        blending: THREE.NormalBlending
    });

    if (state.omegaWireframeMesh.geometry.attributes.color) {
        ghostGeo.setAttribute('color', state.omegaWireframeMesh.geometry.attributes.color.clone());
        ghostMat.vertexColors = true;
        ghostMat.color.setHex(0xffffff);
    }

    const ghostMesh = new THREE.LineSegments(ghostGeo, ghostMat);

    ghostMesh.position.copy(state.omegaGroup.position);
    ghostMesh.quaternion.copy(state.omegaGroup.quaternion);

    const currentScale = state.omegaScale * state.z_depth * state.novaScale;
    ghostMesh.scale.setScalar(currentScale);

    state.scene.add(ghostMesh);

    state.omegaGhosts.push({
        mesh: ghostMesh,
        life: state.omegaGhostDuration,
        maxLife: state.omegaGhostDuration,
        startScale: currentScale,
        randomAxis: new THREE.Vector3(
            Math.random() - 0.5,
            Math.random() - 0.5,
            Math.random() - 0.5
        ).normalize(),
        originalPositions: originalPositions,
        centroid: new THREE.Vector3(cx, cy, cz)
    });
}

function _cleanupAllGhosts() {
    for (const ghost of state.omegaGhosts) {
        state.scene.remove(ghost.mesh);
        ghost.mesh.geometry.dispose();
        ghost.mesh.material.dispose();
    }
    state.omegaGhosts.length = 0;
    state.omegaGhostTimer = 0;
}

function updateOmegaColors() {
    if (state.omegaCoreMesh) {
        const geo = state.omegaCoreMesh.geometry;
        const count = geo.attributes.position.count;
        if (!geo.attributes.color || geo.attributes.color.count !== count) {
            geo.setAttribute('color', new THREE.BufferAttribute(new Float32Array(count * 3), 3));
        }
        const col = geo.attributes.color;
        geo.computeBoundingBox();
        const min = geo.boundingBox.min.y;
        const range = (geo.boundingBox.max.y - min) || 1;
        const c1 = new THREE.Color(state.colors.omegaFace[0]);
        const c2 = new THREE.Color(state.colors.omegaFace[1]);
        const tC = new THREE.Color();
        for (let i = 0; i < count; i++) {
            tC.copy(c1).lerp(c2, (geo.attributes.position.getY(i) - min) / range);
            col.setXYZ(i, tC.r, tC.g, tC.b);
        }
        col.needsUpdate = true;
        state.omegaCoreMesh.material.vertexColors = true;
        state.omegaCoreMesh.material.color.setHex(0xffffff);
        if (state.omegaCoreMesh.material.map) { state.omegaCoreMesh.material.map.dispose(); state.omegaCoreMesh.material.map = null; }
        state.omegaCoreMesh.material.needsUpdate = true;
    }

    if (state.omegaWireframeMesh) {
        const geo = state.omegaWireframeMesh.geometry;
        const count = geo.attributes.position.count;
        if (!geo.attributes.color || geo.attributes.color.count !== count) {
            geo.setAttribute('color', new THREE.BufferAttribute(new Float32Array(count * 3), 3));
        }
        const col = geo.attributes.color;
        geo.computeBoundingBox();
        const min = geo.boundingBox.min.y;
        const range = (geo.boundingBox.max.y - min) || 1;
        const c1 = new THREE.Color(state.colors.omegaEdge[0]);
        const c2 = new THREE.Color(state.colors.omegaEdge[1]);
        const tC = new THREE.Color();
        for (let i = 0; i < count; i++) {
            tC.copy(c1).lerp(c2, (geo.attributes.position.getY(i) - min) / range);
            col.setXYZ(i, tC.r, tC.g, tC.b);
        }
        col.needsUpdate = true;
        state.omegaWireframeMesh.material.vertexColors = true;
        state.omegaWireframeMesh.material.color.setHex(0xffffff);
        state.omegaWireframeMesh.material.needsUpdate = true;
    }
}
