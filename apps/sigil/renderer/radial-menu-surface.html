<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
:root {
    color-scheme: dark;
    --sigil-radial-focus: rgba(140, 248, 255, 0.95);
}

html,
body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
}

.radial-surface {
    position: relative;
    width: 100vw;
    height: 100vh;
}

.radial-empty {
    position: absolute;
    inset: 0;
    pointer-events: none;
}

.radial-item {
    position: absolute;
    display: flex;
    align-items: center;
    justify-content: center;
    transform: translate(-50%, -50%);
    min-width: 56px;
    min-height: 56px;
    border: 0;
    border-radius: 999px;
    background: transparent;
    cursor: pointer;
    pointer-events: auto;
    padding: 0;
    appearance: none;
}

.radial-item[data-active="true"] {
    background: transparent;
}

.radial-item:focus-visible {
    outline: 3px solid var(--sigil-radial-focus);
    outline-offset: 3px;
}
</style>
</head>
<body>
<div id="radial-surface" class="radial-surface" role="group" aria-label="Sigil radial menu"></div>
<script type="module">
window.headsup = window.headsup || {};

import { toolkitSpecifier } from './live-modules/content-roots.js';

const { applySemanticTargetAttributes } = await import(toolkitSpecifier('runtime/semantic-targets.js', {
    local: '../../../packages/toolkit/runtime/semantic-targets.js',
}));

const PARAMS = new URLSearchParams(window.location.search);
const PARENT_ID = PARAMS.get('parent') || 'avatar-main';
const SURFACE_ID = PARAMS.get('id') || 'sigil-radial-menu';
const root = document.getElementById('radial-surface');
const buttons = new Map();
let latestItems = [];
let activePointerId = null;

function emit(kind, payload = {}) {
    window.webkit?.messageHandlers?.headsup?.postMessage({
        type: 'canvas.send',
        payload: {
            target: PARENT_ID,
            message: {
                type: 'canvas_message',
                id: SURFACE_ID,
                payload: {
                    source: 'sigil-radial-menu-surface',
                    source_origin: 'canvas',
                    source_canvas_id: SURFACE_ID,
                    sourceCanvasId: SURFACE_ID,
                    owner_canvas_id: PARENT_ID,
                    ownerCanvasId: PARENT_ID,
                    source_event: kind,
                    sourceEvent: kind,
                    kind,
                    ...payload,
                },
            },
        },
    });
}

function surfaceBoundsPayload() {
    const rect = root.getBoundingClientRect();
    return {
        x: Math.round(rect.x),
        y: Math.round(rect.y),
        w: Math.round(rect.width),
        h: Math.round(rect.height),
    };
}

function eventPayload(event) {
    return {
        offsetX: Math.round(Number(event.offsetX) || 0),
        offsetY: Math.round(Number(event.offsetY) || 0),
        clientX: Math.round(Number(event.clientX) || 0),
        clientY: Math.round(Number(event.clientY) || 0),
        button: Number.isFinite(Number(event.button)) ? Number(event.button) : null,
        buttons: Number.isFinite(Number(event.buttons)) ? Number(event.buttons) : null,
        surfaceBounds: surfaceBoundsPayload(),
    };
}

function itemPayload(item, event = null) {
    return {
        itemId: item.id,
        itemAction: item.action || null,
        itemLabel: item.label || item.name || item.ariaLabel || item.id || null,
        itemX: Math.round(Number(item.x) || 0),
        itemY: Math.round(Number(item.y) || 0),
        itemSize: Math.round(Number(item.size) || 0),
        ...(event ? eventPayload(event) : {}),
    };
}

function latestItemFor(id, fallback) {
    return latestItems.find((item) => item?.id === id) || fallback;
}

function safeId(value) {
    return String(value || 'item').replace(/[^a-zA-Z0-9_-]/g, '-');
}

function createButton(item) {
    const button = document.createElement('button');
    button.className = 'radial-item';
    button.dataset.radialItemId = item.id;
    button.addEventListener('pointerdown', (event) => {
        activePointerId = event.pointerId;
        button.setPointerCapture?.(event.pointerId);
        emit('radial_item_pointer_down', itemPayload(latestItemFor(item.id, item), event));
    });
    button.addEventListener('pointermove', (event) => {
        emit('radial_item_pointer_move', itemPayload(latestItemFor(item.id, item), event));
    });
    button.addEventListener('pointerenter', (event) => {
        emit('radial_item_pointer_enter', itemPayload(latestItemFor(item.id, item), event));
    });
    button.addEventListener('pointerleave', (event) => {
        emit('radial_item_pointer_leave', itemPayload(latestItemFor(item.id, item), event));
    });
    button.addEventListener('pointerup', (event) => {
        if (activePointerId === event.pointerId) activePointerId = null;
        button.releasePointerCapture?.(event.pointerId);
        emit('radial_item_pointer_up', itemPayload(latestItemFor(item.id, item), event));
    });
    button.addEventListener('pointercancel', (event) => {
        if (activePointerId === event.pointerId) activePointerId = null;
        button.releasePointerCapture?.(event.pointerId);
        emit('radial_cancel', itemPayload(latestItemFor(item.id, item), event));
    });
    button.addEventListener('click', (event) => {
        event.preventDefault();
        event.stopPropagation();
        emit('radial_item_click', itemPayload(latestItemFor(item.id, item), event));
    });

    root.append(button);
    buttons.set(item.id, button);
    return button;
}

root.addEventListener('pointermove', (event) => {
    emit('radial_surface_pointer_move', eventPayload(event));
});

function updateButton(button, item) {
    const size = Math.max(44, Math.round(Number(item.size) || 56));
    button.style.left = `${Math.round(Number(item.x) || 0)}px`;
    button.style.top = `${Math.round(Number(item.y) || 0)}px`;
    button.style.width = `${size}px`;
    button.style.height = `${size}px`;
    button.dataset.active = item.active ? 'true' : 'false';
    applySemanticTargetAttributes(button, {
        id: item.id,
        role: item.role || 'AXButton',
        name: item.name || item.ariaLabel || item.label || item.id || 'Radial item',
        action: item.action,
        ref: item.ref || `sigil-radial-item-${safeId(item.id)}`,
        surface: item.surface || SURFACE_ID,
        parent_canvas_id: PARENT_ID,
        current: item.active ? true : null,
    }, {
        idPrefix: 'sigil-radial-item',
        surface: SURFACE_ID,
        parent_canvas_id: PARENT_ID,
    });
    button.dataset.radialItemId = item.id;
    if (item.action) {
        button.dataset.radialAction = item.action;
    } else {
        delete button.dataset.radialAction;
    }
}

function render(payload = {}) {
    const items = Array.isArray(payload.items) ? payload.items : [];
    latestItems = items;
    const liveIds = new Set(items.map((item) => item.id));
    for (const [id, button] of buttons) {
        if (liveIds.has(id)) continue;
        button.remove();
        buttons.delete(id);
    }
    root.hidden = items.length === 0;
    for (const item of items) {
        const button = buttons.get(item.id) || createButton(item);
        updateButton(button, item);
    }
}

window.headsup.receive = function receive(b64) {
    try {
        const message = JSON.parse(atob(b64));
        if (message.type === 'radial_menu.surface.update') {
            render(message.payload || {});
            return;
        }
        if (message.type === 'lifecycle' && message.action === 'resume') {
            window.webkit?.messageHandlers?.headsup?.postMessage({
                type: 'lifecycle.complete',
                payload: { action: 'resume' },
            });
        }
    } catch (error) {
        console.warn('[sigil-radial-menu-surface] failed to handle message', error);
    }
};

render({ items: [] });
emit('radial_surface_ready', { surfaceId: SURFACE_ID });
console.log('[sigil-radial-menu-surface] ready');
</script>
</body>
</html>
