<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Sigil Agent Terminal</title>
  <script>
    const params = new URLSearchParams(location.search);
    params.set('surface', 'sigil');
    const toolkitRoot = params.get('toolkit-root') || 'toolkit';
    params.delete('toolkit-root');
    location.replace(`aos://${toolkitRoot}/components/agent-terminal/index.html?${params.toString()}${location.hash}`);
  </script>
</head>
<body></body>
</html>
