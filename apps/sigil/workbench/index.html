<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>SIGIL</title>
<style>
/* Iframe surfaces — workbench-specific content for current Sigil tabs */
.surface-shell {
  display: flex;
  flex-direction: column;
  width: 100%;
  height: 100%;
}
.surface-toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 10px;
  font-size: var(--font-size-small);
  border-bottom: 1px solid var(--border-subtle);
}
.surface-title {
  color: var(--text-secondary);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.surface-desc { color: var(--text-muted); }
.surface-actions { margin-left: auto; }
.surface-btn {
  appearance: none;
  border: 1px solid var(--border-subtle);
  border-radius: 3px;
  background: transparent;
  color: var(--text-secondary);
  padding: 2px 6px;
  font: var(--font-size-small) var(--font-mono);
  cursor: pointer;
}
.surface-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.surface-frame-wrap { flex: 1; min-height: 0; }
.surface-frame { width: 100%; height: 100%; border: 0; background: transparent; }
.surface-path {
  font-size: var(--font-size-small);
  font-family: var(--font-mono);
  color: var(--text-muted);
  padding: 4px 10px;
  border-top: 1px solid var(--border-subtle);
}
</style>
</head>
<body>
<script type="module">
  import { toolkitSpecifier, toolkitUrl, sigilUrl } from '../renderer/live-modules/content-roots.js'

  for (const href of [
    toolkitUrl('components/_base/theme.css'),
    toolkitUrl('panel/defaults.css'),
    toolkitUrl('components/surface-inspector/styles.css'),
    toolkitUrl('components/log-console/styles.css'),
    toolkitUrl('components/integration-hub/styles.css'),
    toolkitUrl('components/wiki-kb/styles.css'),
  ]) {
    const link = document.createElement('link')
    link.rel = 'stylesheet'
    link.href = href
    document.head.append(link)
  }

  const { mountPanel, Tabs } = await import(toolkitSpecifier('panel/index.js', {
    local: '../../../packages/toolkit/panel/index.js',
  }))
  const { subscribe, wireBridge } = await import(toolkitSpecifier('runtime/index.js', {
    local: '../../../packages/toolkit/runtime/index.js',
  }))
  const { default: CanvasInspector } = await import(toolkitSpecifier('components/surface-inspector/index.js', {
    local: '../../../packages/toolkit/components/surface-inspector/index.js',
  }))
  const { default: IntegrationHub } = await import(toolkitSpecifier('components/integration-hub/index.js', {
    local: '../../../packages/toolkit/components/integration-hub/index.js',
  }))
  const { default: LogConsole } = await import(toolkitSpecifier('components/log-console/index.js', {
    local: '../../../packages/toolkit/components/log-console/index.js',
  }))
  const { default: WikiKB } = await import(toolkitSpecifier('components/wiki-kb/index.js', {
    local: '../../../packages/toolkit/components/wiki-kb/index.js',
  }))

  const workbenchState = {
    activationCount: 0,
    displays: [],
    lastActivation: null,
    lastStage: null,
    legacyConfigSurfaceSequestered: true,
  }
  window.__sigilWorkbenchState = workbenchState

  function normalizeDisplay(display = {}) {
    const visible = display.visible_bounds || display.bounds || {}
    return {
      ...display,
      uuid: display.uuid ?? display.display_uuid ?? null,
      is_main: Boolean(display.is_main),
      visible_bounds: {
        x: visible.x ?? 0,
        y: visible.y ?? 0,
        w: visible.w ?? visible.width ?? 0,
        h: visible.h ?? visible.height ?? 0,
      },
    }
  }

  function syncWorkbenchState(patch = {}) {
    Object.assign(workbenchState, patch)
    window.__sigilWorkbenchState = workbenchState
  }

  wireBridge((msg) => {
    if (msg?.type !== 'display_geometry') return
    const payload = msg.payload || msg
    syncWorkbenchState({
      displays: (payload.displays || []).map(normalizeDisplay),
      lastDisplayUpdateAt: Date.now(),
    })
  })
  subscribe(['display_geometry'], { snapshot: true })

  function iframeContent({ name, title, src, description }) {
    return function SurfaceTab() {
      let frame = null
      let pathEl = null

      function hardReload() {
        if (!frame) return
        const bust = `__wb=${Date.now()}`
        frame.src = src.includes('?') ? `${src}&${bust}` : `${src}?${bust}`
        if (pathEl) pathEl.textContent = frame.src
      }

      return {
        manifest: { name, title, channelPrefix: name, accepts: [], emits: [] },

        render() {
          const root = document.createElement('div')
          root.className = 'surface-shell'

          const toolbar = document.createElement('div')
          toolbar.className = 'surface-toolbar'
          toolbar.innerHTML =
            `<span class="surface-title">${title}</span>` +
            `<span class="surface-desc">${description}</span>`

          const actions = document.createElement('span')
          actions.className = 'surface-actions'
          const btn = document.createElement('button')
          btn.type = 'button'
          btn.className = 'surface-btn'
          btn.textContent = 'Reload'
          btn.addEventListener('click', hardReload)
          actions.appendChild(btn)
          toolbar.appendChild(actions)

          const wrap = document.createElement('div')
          wrap.className = 'surface-frame-wrap'
          frame = document.createElement('iframe')
          frame.className = 'surface-frame'
          frame.src = src
          wrap.appendChild(frame)

          pathEl = document.createElement('div')
          pathEl.className = 'surface-path'
          pathEl.textContent = src

          root.appendChild(toolbar)
          root.appendChild(wrap)
          root.appendChild(pathEl)
          return root
        },
      }
    }
  }

  function knowledgeBaseContent() {
    const inner = WikiKB()
    let refreshTimer = null
    let innerHost = null

    async function loadGraph(host) {
      try {
        const res = await fetch('/wiki/.graph?raw=1')
        if (!res.ok) throw new Error(`wiki graph request failed: ${res.status}`)
        const payload = await res.json()
        inner.onMessage?.({ type: 'graph', payload }, host)
        syncWorkbenchState({
          wikiGraphLoadedAt: Date.now(),
          wikiGraphError: null,
        })
      } catch (error) {
        console.error('[sigil/workbench] failed to load wiki graph', error)
        syncWorkbenchState({
          wikiGraphLoadedAt: Date.now(),
          wikiGraphError: String(error),
        })
      }
    }

    return {
      manifest: {
        ...inner.manifest,
        name: 'wiki-kb',
        title: 'Knowledge Base',
        requires: ['wiki_page_changed'],
      },

      render(host) {
        innerHost = {
          ...host,
          emit(type, payload) {
            if (type === 'selection') {
              syncWorkbenchState({
                lastWikiSelection: payload || null,
                lastWikiSelectionAt: Date.now(),
              })
            }
            host.emit(type, payload)
          },
        }
        const rendered = inner.render(innerHost)
        void loadGraph(innerHost)
        return rendered
      },

      onMessage(msg, host) {
        if (msg?.type === 'wiki_page_changed') {
          if (refreshTimer) window.clearTimeout(refreshTimer)
          refreshTimer = window.setTimeout(() => {
            void loadGraph(innerHost || host)
          }, 150)
          return
        }
        inner.onMessage?.(msg, innerHost || host)
      },
    }
  }

  const workbenchLayout = Tabs([
    knowledgeBaseContent,
    iframeContent({
      name: 'sigil-chat',
      title: 'Chat',
      src: sigilUrl('chat/index.html'),
      description: 'Conversation surface.',
    }),
    () => IntegrationHub({ brokerUrl: 'http://127.0.0.1:47231' }),
    CanvasInspector,
    LogConsole,
  ], {
    onActivate(info) {
      const previous = workbenchState.lastActivation
      const activationCount = workbenchState.activationCount + 1
      syncWorkbenchState({
        activationCount,
        lastActivation: {
          index: info.index,
          title: info.title,
          name: info.manifest?.name ?? null,
          at: Date.now(),
        },
      })
    },
  })

  mountPanel({
    title: 'SIGIL',
    layout: workbenchLayout,
  })
</script>
</body>
</html>
