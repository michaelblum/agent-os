<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>SIGIL</title>
<link rel="stylesheet" href="/toolkit/components/_base/theme.css">
<link rel="stylesheet" href="/toolkit/panel/defaults.css">
<link rel="stylesheet" href="/toolkit/components/canvas-inspector/styles.css">
<link rel="stylesheet" href="/toolkit/components/log-console/styles.css">
<link rel="stylesheet" href="/toolkit/components/wiki-kb/styles.css">
<style>
/* Iframe surfaces — workbench-specific content for Studio + Chat tabs */
.surface-shell {
  display: flex;
  flex-direction: column;
  width: 100%;
  height: 100%;
}
.surface-toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 10px;
  font-size: var(--font-size-small);
  border-bottom: 1px solid var(--border-subtle);
}
.surface-title {
  color: var(--text-secondary);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.surface-desc { color: var(--text-muted); }
.surface-actions { margin-left: auto; }
.surface-btn {
  appearance: none;
  border: 1px solid var(--border-subtle);
  border-radius: 3px;
  background: transparent;
  color: var(--text-secondary);
  padding: 2px 6px;
  font: var(--font-size-small) var(--font-mono);
  cursor: pointer;
}
.surface-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.surface-frame-wrap { flex: 1; min-height: 0; }
.surface-frame { width: 100%; height: 100%; border: 0; background: transparent; }
.surface-path {
  font-size: var(--font-size-small);
  font-family: var(--font-mono);
  color: var(--text-muted);
  padding: 4px 10px;
  border-top: 1px solid var(--border-subtle);
}
</style>
</head>
<body>
<script type="module">
  import { mountPanel, Tabs } from '/toolkit/panel/index.js'
  import { evalCanvas, subscribe, wireBridge } from '/toolkit/runtime/index.js'
  import CanvasInspector from '/toolkit/components/canvas-inspector/index.js'
  import LogConsole from '/toolkit/components/log-console/index.js'
  import WikiKB from '/toolkit/components/wiki-kb/index.js'
  import { resolveBirthplace } from '/sigil/renderer/birthplace-resolver.js'

  const AVATAR_ID = 'avatar-main'
  const workbenchState = {
    activationCount: 0,
    displays: [],
    lastActivation: null,
    lastStage: null,
    studioReady: false,
    pendingStudioAgentId: null,
  }
  let studioFrame = null
  window.__sigilWorkbenchState = workbenchState

  function normalizeDisplay(display = {}) {
    const visible = display.visible_bounds || display.bounds || {}
    return {
      ...display,
      uuid: display.uuid ?? display.display_uuid ?? null,
      is_main: Boolean(display.is_main),
      visible_bounds: {
        x: visible.x ?? 0,
        y: visible.y ?? 0,
        w: visible.w ?? visible.width ?? 0,
        h: visible.h ?? visible.height ?? 0,
      },
    }
  }

  function syncWorkbenchState(patch = {}) {
    Object.assign(workbenchState, patch)
    window.__sigilWorkbenchState = workbenchState
  }

  async function restageAvatarToStudioHome() {
    if (workbenchState.displays.length === 0) {
      syncWorkbenchState({
        lastStage: { status: 'no-displays', at: Date.now() },
      })
      return
    }
    const target = resolveBirthplace({
      anchor: 'nonant',
      nonant: 'top-left',
      display: 'main',
    }, workbenchState.displays)
    syncWorkbenchState({
      lastStage: { status: 'pending', target, at: Date.now() },
    })
    const js = `(() => {
      if (!window.liveJs) return 'no-liveJs'
      const p = { x: ${JSON.stringify(target.x)}, y: ${JSON.stringify(target.y)}, valid: true }
      liveJs.travel = null
      liveJs.avatarPos = p
      liveJs.currentCursor = p
      liveJs.cursorTarget = p
      if (typeof postLastPositionToDaemon === 'function') postLastPositionToDaemon()
      return JSON.stringify(p)
    })()`
    try {
      const result = await evalCanvas(AVATAR_ID, js)
      syncWorkbenchState({
        lastStage: { status: 'ok', target, result, at: Date.now() },
      })
    } catch (error) {
      syncWorkbenchState({
        lastStage: {
          status: 'error',
          target,
          message: String(error),
          at: Date.now(),
        },
      })
    }
  }

  wireBridge((msg) => {
    if (msg?.type !== 'display_geometry') return
    const payload = msg.payload || msg
    syncWorkbenchState({
      displays: (payload.displays || []).map(normalizeDisplay),
      lastDisplayUpdateAt: Date.now(),
    })
  })
  subscribe(['display_geometry'], { snapshot: true })

  function extractAgentIdFromPath(path) {
    if (typeof path !== 'string' || !path.startsWith('sigil/agents/')) return null
    return path.replace(/^sigil\/agents\//, '').replace(/\.md$/, '')
  }

  function flushStudioSelection() {
    if (!studioFrame?.contentWindow) return false
    if (!workbenchState.studioReady) return false
    if (!workbenchState.pendingStudioAgentId) return false
    studioFrame.contentWindow.postMessage({
      type: 'studio/select-agent',
      agentId: workbenchState.pendingStudioAgentId,
    }, window.location.origin)
    return true
  }

  window.addEventListener('message', (event) => {
    if (event.source !== studioFrame?.contentWindow) return
    if (event.data?.type !== 'studio/ready') return
    syncWorkbenchState({ studioReady: true })
    flushStudioSelection()
  })

  function iframeContent({ name, title, src, description }) {
    return function SurfaceTab() {
      let frame = null
      let pathEl = null

      function hardReload() {
        if (!frame) return
        const bust = `__wb=${Date.now()}`
        frame.src = src.includes('?') ? `${src}&${bust}` : `${src}?${bust}`
        if (pathEl) pathEl.textContent = frame.src
      }

      return {
        manifest: { name, title, channelPrefix: name, accepts: [], emits: [] },

        render() {
          const root = document.createElement('div')
          root.className = 'surface-shell'

          const toolbar = document.createElement('div')
          toolbar.className = 'surface-toolbar'
          toolbar.innerHTML =
            `<span class="surface-title">${title}</span>` +
            `<span class="surface-desc">${description}</span>`

          const actions = document.createElement('span')
          actions.className = 'surface-actions'
          const btn = document.createElement('button')
          btn.type = 'button'
          btn.className = 'surface-btn'
          btn.textContent = 'Reload'
          btn.addEventListener('click', hardReload)
          actions.appendChild(btn)
          toolbar.appendChild(actions)

          const wrap = document.createElement('div')
          wrap.className = 'surface-frame-wrap'
          frame = document.createElement('iframe')
          frame.className = 'surface-frame'
          frame.src = src
          if (name === 'sigil-studio') {
            studioFrame = frame
            syncWorkbenchState({ studioReady: false })
            frame.addEventListener('load', () => {
              syncWorkbenchState({ studioReady: false })
            })
          }
          wrap.appendChild(frame)

          pathEl = document.createElement('div')
          pathEl.className = 'surface-path'
          pathEl.textContent = src

          root.appendChild(toolbar)
          root.appendChild(wrap)
          root.appendChild(pathEl)
          return root
        },
      }
    }
  }

  function knowledgeBaseContent() {
    const inner = WikiKB()
    let refreshTimer = null
    let innerHost = null

    function routeSelectionToStudio(payload) {
      const agentId = extractAgentIdFromPath(payload?.path)
      if (!agentId) return false
      syncWorkbenchState({ pendingStudioAgentId: agentId })
      workbenchLayout.activate({ name: 'sigil-studio' })
      flushStudioSelection()
      return true
    }

    async function loadGraph(host) {
      try {
        const res = await fetch('/wiki/.graph?raw=1')
        if (!res.ok) throw new Error(`wiki graph request failed: ${res.status}`)
        const payload = await res.json()
        inner.onMessage?.({ type: 'graph', payload }, host)
        syncWorkbenchState({
          wikiGraphLoadedAt: Date.now(),
          wikiGraphError: null,
        })
      } catch (error) {
        console.error('[sigil/workbench] failed to load wiki graph', error)
        syncWorkbenchState({
          wikiGraphLoadedAt: Date.now(),
          wikiGraphError: String(error),
        })
      }
    }

    return {
      manifest: {
        ...inner.manifest,
        name: 'wiki-kb',
        title: 'Knowledge Base',
        requires: ['wiki_page_changed'],
      },

      render(host) {
        innerHost = {
          ...host,
          emit(type, payload) {
            if (type === 'selection') {
              syncWorkbenchState({
                lastWikiSelection: payload || null,
                lastWikiSelectionAt: Date.now(),
              })
              if (routeSelectionToStudio(payload)) {
                inner.onMessage?.({ type: 'clear-selection' }, innerHost)
                return
              }
            }
            host.emit(type, payload)
          },
        }
        const rendered = inner.render(innerHost)
        void loadGraph(innerHost)
        return rendered
      },

      onMessage(msg, host) {
        if (msg?.type === 'wiki_page_changed') {
          if (refreshTimer) window.clearTimeout(refreshTimer)
          refreshTimer = window.setTimeout(() => {
            void loadGraph(innerHost || host)
          }, 150)
          return
        }
        inner.onMessage?.(msg, innerHost || host)
      },
    }
  }

  const workbenchLayout = Tabs([
    iframeContent({
      name: 'sigil-studio',
      title: 'Studio',
      src: '/sigil/studio/index.html',
      description: 'Roster, geometry, color, effects, agent state.',
    }),
    iframeContent({
      name: 'sigil-chat',
      title: 'Chat',
      src: '/sigil/chat/index.html',
      description: 'Conversation surface.',
    }),
    knowledgeBaseContent,
    CanvasInspector,
    LogConsole,
  ], {
    onActivate(info) {
      const previous = workbenchState.lastActivation
      const activationCount = workbenchState.activationCount + 1
      syncWorkbenchState({
        activationCount,
        lastActivation: {
          index: info.index,
          title: info.title,
          name: info.manifest?.name ?? null,
          at: Date.now(),
        },
      })
      if (info.title === 'Studio' && activationCount > 1 && previous?.title !== 'Studio') {
        void restageAvatarToStudioHome()
      }
      if (info.manifest?.name === 'sigil-studio') {
        flushStudioSelection()
      }
    },
  })

  mountPanel({
    title: 'SIGIL',
    layout: workbenchLayout,
  })
</script>
</body>
</html>
